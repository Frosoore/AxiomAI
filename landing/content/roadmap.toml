# =============================================================================
#  ROADMAP — single source of truth for the Dev page roadmap.
#  Edit this file and push: the Dev page (dev-updates.html) rebuilds automatically
#  (GitHub Action), and `python landing/build_site.py` regenerates it locally.
#
#  Each item is one [[item]] block. Fields:
#    status : "next" | "far" | "done"   (which column it lands in)
#             next = actively working toward · far = bigger bets, further out
#             done = recently shipped (moved here from next/far when finished)
#    title  : short title. Inline HTML allowed (e.g. <code>SHN</code>).
#    desc   : one-sentence explanation. Inline HTML allowed.
#    date   : OPTIONAL "YYYY-MM" — only shown on "done" items.
#
#  To "move" an item along the lifecycle, just change its `status`
#  (far -> next -> done). Order within a column follows file order.
# =============================================================================

