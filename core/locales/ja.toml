# TICKET-057 — doc enrichment (Studio sub-pages + details)
doc_page_creator_meta_t = "Studio · Metadata"
doc_page_creator_meta = "世界のアイデンティティと全体的なふるまい。<b>ここにあるもの：</b>語り手が常に覚えている背景ロア、任意のシステムプロンプト上書き、新規ゲームの導入シーン、コンパニオンモード、語りを調整するつまみ（緊張・温度・top-p・冗長さ）。<b>使い方：</b>まず World Lore を書き（すべての土台）、緊張で雰囲気を決め、語りが不自然でない限り AI のつまみは既定のままに。各項目の詳細は「情報」を押してください。"
doc_page_creator_stats_t = "Studio · ステータス"
doc_page_creator_stats = "エンティティが持てるステータスを定義します——体力、コイン、評判、あなたが考えるもの。<b>各ステータス：</b>名前、既定の開始値、任意の最小/最大の範囲。<b>なぜ大切か：</b>ステータスはルールエンジンと語り手が推論する対象です——ここで定義したステータスは物語に変えられ、ルールに照合されます。<b>例：</b>「コイン」（最小 0）を定義すれば世界は宿代を請求でき、「体力」（0–100）を定義すればルールタブで 0 を死にできます。<b>注意：</b>新しいキャラクターは定義済みの各ステータスを既定値から始めます。"
doc_page_creator_entities_t = "Studio · エンティティ"
doc_page_creator_entities = "世界の登場人物と物：キャラクター（NPC）、勢力、アイテム、注目すべき物。<b>各エンティティ：</b>id、名前、種類、語り手が読む説明、そして自身のステータス。<b>使い方：</b>重要な NPC には少しのステータスと鋭い説明を——長いキャンペーンで一貫性を保つ鍵です。<b>例：</b>生き生きとした説明と「気質」ステータスを持つ宿屋の主人は、物語が戻るたびに同じ振る舞いをします。Populate タブからエンティティを生成することもできます。"
doc_page_creator_map_t = "Studio · マップ"
doc_page_creator_map = "世界の場所とそのつながり。<b>定義するもの：</b>場所（スケール——地域・都市・関心地点——と親を持つ）と、それらの間の接続。<b>なぜ大切か：</b>語り手はマップで地理と移動の整合を保ち、ゲーム内時計は接続を使って旅の所要時間を見積もれます。<b>使い方：</b>まず大きな場所（国とその都市）を描き、次に遊びに関わる道や部屋を加えます。Populate が初期マップを生成できます。"
doc_page_creator_rules_t = "Studio · ルール"
doc_page_creator_rules = "エンジンが毎ターン適用する決定論的なルール——AI が自由に語る一方で世界を正直に保つ仕組みです。<b>ルールの仕組み：</b>エンティティのステータスが変わると、そのルールの条件が判定され、成立すれば動作が発火します（ステータス変更、状態の設定…）。<b>各ルールには</b>優先度、対象（特定のエンティティか、全体を表す「*」）、条件、動作があります。<b>例：</b>「体力 ≤ 0 なら → 状態 = 致命傷」とすれば、文章が何と言おうと死が確定します。<b>ヒント：</b>欠けたステータスは 0 と読まれるため、そのステータスを実際に持つエンティティだけに効かせたい効果には「≥」のしきい値が無難です。"
doc_page_creator_events_t = "Studio · イベント"
doc_page_creator_events = "プレイヤーの行動とは無関係に、選んだゲーム内時刻に発火する予定イベント。<b>設定するもの：</b>イベントがいつ起きるか（ゲーム内時間）と、それが何をする/語りに何を知らせるか。<b>なぜ大切か：</b>イベントは世界を時計で進めます——隊商が着き、期限が過ぎ、嵐が襲う——ので、世界はあなたを待つのではなく生きて感じられます。<b>例：</b>「砲兵物資が 3 日目に波止場へ届く」と予定すれば、あなたが見張っていなくても世界はその瞬間に至ります。"
doc_page_creator_setup_t = "Studio · 開始時の質問"
doc_page_creator_setup = "このユニバースで新規ゲームを始める際にプレイヤーが答える質問。<b>定義するもの：</b>各質問、その種類（単一選択・複数選択・自由記述）と選択肢。<b>なぜ大切か：</b>回答は開始ターンに注入され、プレイヤーが誰でどこから始まるかを決めます。<b>例：</b>「どこの出身？」という選択は開始地域を定め、最初の場面を彩ります。少なく、喚起的に——良い質問 3 つは平凡な 10 個に勝ります。"
doc_page_creator_lore_t = "Studio · Lore Book"
doc_page_creator_lore = "世界の百科：語り手が必要に応じて引き出す、検索できるロア項目（検索拡張メモリ）。<b>追加するもの：</b>歴史・勢力・魔法・場所の記事——それぞれにキーワード付き。<b>なぜ大切か：</b>常時有効な World Lore（Metadata）と違い、これらは関連時のみ取り込まれるので、毎回のプロンプトを膨らませずに膨大な背景を蓄えられます。<b>使い方：</b>主題ごとに焦点を絞った 1 項目を；エンジンが場面に合うものを引き出します。Populate が項目を下書きできます。"
doc_page_creator_populate_t = "Studio · Populate"
doc_page_creator_populate = "AI 支援のオーサリング：モデルにユニバースの一部を生成させます。<b>できること：</b>世界の前提からエンティティ・場所・ロア項目などを作成し、プレビューと差分（diff）を添えて、書き込み前にすべての変更を承認できます。<b>使い方：</b>まず強い World Lore を書き（Populate はそれを土台にします）、小さく的を絞ったバッチで生成し、差分を確認して気に入ったものを保存します。<b>なぜ大切か：</b>空のユニバースを数分で遊べるものに変えます——あとは手で磨く出発点です。"
doc_page_creator_files_t = "Studio · ファイル"
doc_page_creator_files = "あなたのユニバースの生のソース、テキストとして。Axiom は世界を <b>Universe-as-Code</b> として保存します：データベースにコンパイルされる、人が読める TOML/Markdown ファイル。<b>できること：</b>これらのソースファイルを直接開いて編集し、古いフラットなデータベースをソースツリーへ変換します。<b>なぜ大切か：</b>ユニバースはプレーンテキストなので、Git でバージョン管理し、差分を取り、コードのように共有できます。<b>上級者向け：</b>他のタブが行うことはすべてこれらのファイルに収まります——これは直接のビューです。"
doc_creator_meta_world_lore_d = "<b>働き：</b>このテキストは毎ターン語り手の文脈に前置きされるため、世界の恒久的な記憶です。<b>ここに入れる：</b>基調、大きな歴史、魔法/技術のルール、決して矛盾してはならない真実。<b>入れない：</b>長い百科的詳細——それは Lore Book（必要に応じて取得）へ。ここは軽く保ちます。<b>例：</b>「神々は死に、忘れられた。魔法は筋肉のように術者を疲れさせる。今は 5281 年。」<b>効果：</b>繰り返さなくても、各場面がこれらの事実を守ります。"
doc_creator_meta_system_prompt_d = "<b>働き：</b>このユニバースの語り手の組み込み指示を置き換えます——最も深く、最も高度な上書き。<b>使う時：</b>根本的に異なる語りの挙動が欲しい場合だけ（特定の形式、独特の語り口やルール）。<b>警告：</b>既定プロンプトは状態・ツール・整合性をすでに扱っています。不用意な上書きはそれらを壊しかねません。<b>推奨：</b>まず空のままにし、World Lore とつまみで世界を導いてください。他に手がない時だけこれに頼ります。"
doc_creator_meta_first_message_d = "<b>働き：</b>ここで全く新しいゲームを始めた時に表示される開幕の語り——幕開けです。<b>ここに入れる：</b>雰囲気を定め、プレイヤーを反応できる状況に放り込む場面。<b>使い方：</b>小さな引き（ドアのノック、選択）で締め、プレイヤーの最初の行動に足がかりを。<b>注意：</b>開始時に一度だけ表示。再開したセーブは独自の履歴を保ちます。<b>例：</b>夜明けの雨の波止場、見知らぬ者が封蝋の手紙を卓上で滑らせる。"
doc_creator_meta_companion_d = "<b>働き：</b>コンパニオンモードは Axiom を、選んだ主人公（ヒーロー）の副操縦士にします——純粋な開放サンドボックスではなく、AI がそのキャラクターの操縦を助けます。<b>使い方：</b>「有効」にチェックし、体験の中心となるヒーローのエンティティを選びます。<b>なぜ使う：</b>単一の主人公に焦点を当てた導かれた物語に最適。<b>オフのまま</b>なら、古典的な「あなたがプレイヤー、何でもどうぞ」です。"
doc_creator_meta_tension_d = "<b>働き：</b>世界がどれほど劇的に感じられるべきかを語り手に伝える 0.0–1.0 のつまみ。<b>0.0</b>＝穏やかな日常、<b>1.0</b>＝絶え間ない危険と高い賭け。<b>効果：</b>トラブルがプレイヤーを見つける頻度や場面の張り詰め具合を左右します——変えるのは雰囲気で、ルールではありません。<b>例：</b>のどかな村の謎は 0.2 付近、戦争寸前の都市は 0.7 付近。<b>ヒント：</b>舞台裏の Chronicler にも供給されるので、緊張した世界はあなたの不在中により波乱に富んで進みます。"
doc_creator_meta_llm_temp_d = "<b>働き：</b>このユニバースでの AI の創造性、0.0 から 1.0。<b>低</b>（≈0.2）＝集中・予測可能・レール上、<b>高</b>（≈0.8）＝独創的・意外・時に突飛。<b>調整：</b>語りが繰り返すなら上げ、脱線や矛盾があるなら下げます。<b>推奨：</b>たいていの物語に 0.6–0.8。これはユニバースの既定値で、ユニバースが未設定なら設定の全体値が適用されます。"
doc_creator_meta_llm_top_p_d = "<b>働き：</b>核サンプリング——AI が語彙のどれだけを使うかを制限する、もう一つの創造性コントロール（0.0–1.0）。<b>高</b>（≈0.95）＝多彩で完全なパレット、<b>低</b>（≈0.5）＝最も確からしい語だけ、つまりより平易で安全な文。<b>使い方：</b>通常は 0.9–1.0 付近に保ち、創造性は温度で形作ります。文が緩みすぎる時だけ下げます。<b>注意：</b>温度と top-p は相互作用します——一度に一方だけ変えましょう。"
doc_creator_meta_verbosity_d = "<b>働き：</b>語り手が 1 ターンに書く文章量。<b>短い</b>＝引き締まった速い展開、<b>バランス</b>＝しっかりした一段落、<b>多弁</b>＝豊かで描写的な場面。<b>選び方：</b>機敏なアクションや掲示板リレーの速度には短い、没入的で小説的なセッションには多弁。<b>効果：</b>長さと細部を変えますが、実際に起こることは変えません。これはユニバースの既定値です。"