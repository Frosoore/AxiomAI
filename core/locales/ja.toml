# -- pages ----------------------------------------------------------------
doc_page_hub_t = "ユニバースライブラリ"
doc_page_hub = "ホーム画面——あなたの世界のライブラリ。このマシンに導入された各ユニバースがカードとして表示されます。<b>できること：</b>新規ユニバースの作成、インポート（Axiom の .axiom パックや SillyTavern のキャラクターカード）、または各カードで プレイ／編集（Creator Studio を開く）／エクスポート（ファイルとして共有）／削除。<b>ヒント：</b>まず同梱の Myria ユニバースで全体の仕組みを掴んでから、自分の世界を作りましょう。"
doc_page_setup_t = "ゲーム準備"
doc_page_setup = "物語が始まる前にセッションを準備する場所。<b>2つの道：</b>既存のセーブを再開するか、最初から——ペルソナ（キャラクター外のプロフィール）を選び、キャラクター名と難易度を設定し、ユニバースの物語の質問に答えます。準備ができたら <b>開始</b> を押します。<b>なぜ大切か：</b>あなたの回答は最初のターンに書き込まれ、語りが開く時のあなたの居場所と人物を決めます。"
doc_page_tabletop_t = "ゲームテーブル"
doc_page_tabletop = "ゲームそのもの。<b>遊び方：</b>中央の欄にキャラクターの行動やセリフを書いて送信——AI が世界の応答を語り、続いて決定論的なルールエンジンが結果（体力・所持品・お金・時間…）を検証し、世界の整合性を保ちます。<b>卓上の周り：</b>左にステータスと所持品、右に検索できるロア百科、中央にターン履歴。<b>例：</b>「机を探して鍵を見つける」は時計を進めたり、アイテムを明かしたり、ステータスを変えたり——次のターンも世界はそれを覚えています。"
doc_page_creator_t = "Creator Studio"
doc_page_creator = "Creator Studio——ユニバースを構築・編集する場所。作業は上部のタブで整理され、<b>各タブには独自の情報ページ</b>があります（使っているタブで「情報」または F1 を押します）。<b>鉄則：</b>保存（Ctrl+S）するまで何も書き込まれません。<b>どこから始めるか：</b>Metadata が世界のアイデンティティと基調を定め、Stats と Entities が実体を与え、他のタブ（マップ・ルール・イベント・Setup・Lore・Populate・ファイル）がそれを練り上げ自動化します。"
doc_page_settings_t = "設定"
doc_page_settings = "アプリ全体の設定で、特定のユニバースに紐づきません。<b>ここで選ぶもの：</b>物語を書く AI（Ollama / LM Studio 経由のローカルモデル、またはクラウドのプロバイダ）、任意の挿絵生成、インターフェース言語、音声、表示。<b>重要：</b><b>保存</b>を押した時に選ばれているテキストバックエンドのタブが有効なバックエンドになります——本当に使いたいタブで終えてください。プレイ前に <b>接続テスト</b> で AI が応答するか確認しましょう。"
