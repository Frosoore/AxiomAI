doc_hub_import = "Importa nella tua biblioteca un universo condiviso come file .axiom."
doc_hub_create_t = "Nuovo universo"
doc_hub_create = "Crea un universo vuoto nuovo di zecca e lo apre nel Creator Studio perché tu possa costruirne il mondo."
doc_hub_card_play_t = "Gioca"
doc_hub_card_play = "Apre la schermata di preparazione per questo universo, per iniziare una nuova partita o riprenderne una salvata."
doc_hub_card_edit_t = "Modifica"
doc_hub_card_edit = "Apre questo universo nel Creator Studio per modificarne il contenuto."
doc_hub_card_export_t = "Esporta"
doc_hub_card_export = "Impacchetta questo universo in un unico file .axiom da condividere o conservare."
doc_hub_card_delete_t = "Elimina"
doc_hub_card_delete = "Elimina definitivamente questo universo, compresi tutti i salvataggi e le loro memorie. Non si può annullare."

# -- setup ----------------------------------------------------------------
doc_setup_tab_saves_t = "Scheda Salvataggi"
doc_setup_tab_saves = "Elenca tutte le partite salvate di questo universo. Selezionane una e premi Avvia (o doppio clic) per riprenderla. Clic destro su un salvataggio per altre azioni."
doc_setup_saves_list_t = "Elenco dei salvataggi"
doc_setup_saves_list = "Le tue partite salvate. I progressi vengono registrati di continuo dopo ogni turno: non esiste alcun pulsante Salva. Tastiera: Ctrl+A seleziona tutto, Canc elimina."
doc_setup_import_save_t = "Importa salvataggio"
doc_setup_import_save = "Importa una partita condivisa come file .axiomsave."
doc_setup_export_save_t = "Esporta salvataggio"
doc_setup_export_save = "Esporta il salvataggio selezionato come file .axiomsave, da condividere o conservare."
doc_setup_duplicate_save_t = "Duplica salvataggio"
doc_setup_duplicate_save = "Crea una copia indipendente (un fork) del salvataggio selezionato — utile per provare un'altra strada senza perdere l'originale."
doc_setup_rename_save_t = "Rinomina salvataggio"
doc_setup_rename_save = "Cambia il nome visualizzato del salvataggio selezionato."
doc_setup_edit_save_t = "Modifica salvataggio"
doc_setup_edit_save = "Apre lo stato grezzo del salvataggio in forma di testo per correggere o ritoccare i valori a mano. Vengono applicate solo le righe realmente modificate."
doc_setup_delete_save_t = "Elimina salvataggio"
doc_setup_delete_save = "Elimina definitivamente i salvataggi selezionati."
doc_setup_tab_persona_t = "Scheda Persona"
doc_setup_tab_persona = "Scegli chi interpreti. Una persona è una descrizione di personaggio riutilizzabile, condivisa fra tutti gli universi."
doc_setup_persona_list_t = "Elenco delle persona"
doc_setup_persona_list = "Le tue persona salvate. Scegli '-- No Persona --' per giocare senza un passato predefinito."
doc_setup_add_persona_t = "Aggiungi una persona"
doc_setup_add_persona = "Crea una nuova persona (nome + descrizione), salvata globalmente e riutilizzabile in qualsiasi universo."
doc_setup_player_name_t = "Nome del personaggio"
doc_setup_player_name = "Il nome del tuo personaggio per questa nuova partita. Viene usato anche come nome del salvataggio."
doc_setup_difficulty_t = "Difficoltà"
doc_setup_difficulty = "Normale: gioco standard. Hardcore: la morte è permanente — il salvataggio viene eliminato se muori. Compagno: un eroe IA guida la storia e tu interpreti il suo compagno (solo negli universi che lo attivano)."
doc_setup_tab_story_t = "Scheda Configurazione"
doc_setup_tab_story = "Domande definite dal creatore dell'universo (luogo di partenza, fazione...). Le tue risposte vengono intrecciate nella narrazione iniziale di una nuova partita."
doc_setup_launch_t = "Avvia la sessione"
doc_setup_launch = "Avvia il gioco: riprende il salvataggio selezionato nella scheda Salvataggi, oppure crea una nuova partita con persona, nome, difficoltà e risposte alla storia."
doc_setup_back_t = "Torna alla biblioteca"
doc_setup_back = "Torna alla biblioteca degli universi senza avviare una partita."

