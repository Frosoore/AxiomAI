doc_setup_back_t = "Torna alla biblioteca"
doc_setup_back = "Torna alla biblioteca degli universi senza avviare una partita."

# -- tabletop ---------------------------------------------------------------
doc_tabletop_turn_time_t = "Sessione, turno e orologio"
doc_tabletop_turn_time = "Mostra il salvataggio attivo, il numero del turno corrente e la data e l'ora nel gioco. L'orologio del mondo avanza con la storia."
doc_tabletop_player_selector_t = "Giocatore attivo"
doc_tabletop_player_selector = "Quando l'universo definisce più personaggi-giocatore, seleziona per quale parla il tuo prossimo messaggio."
doc_tabletop_verbosity_t = "Verbosità"
doc_tabletop_verbosity = "Lunghezza delle risposte del narratore: Corte, Equilibrate o Loquaci. Memorizzata con l'universo."
doc_tabletop_canon_auto_t = "Canone automatico"
doc_tabletop_canon_auto = "Se spuntato, dopo ogni turno i fatti importanti della storia vengono scritti silenziosamente nella definizione dell'universo (il suo canone)."
doc_tabletop_canonize_t = "Canonizza"
doc_tabletop_canonize = "Estrae i fatti importanti della storia recente e li propone come modifiche alla definizione dell'universo — esamini un diff prima che qualcosa venga applicato."
doc_tabletop_rewind_t = "Riavvolgi"
doc_tabletop_rewind = "Viaggia indietro nel tempo: scegli un turno precedente e l'intero stato del mondo viene ripristinato esattamente com'era (Ctrl+Z)."
doc_tabletop_back_t = "Torna alla biblioteca"
doc_tabletop_back = "Lascia il tavolo e torna alla biblioteca. I progressi sono già salvati dopo ogni turno — non si perde nulla."
doc_tabletop_sidebar_stats_t = "Pannello Statistiche"
doc_tabletop_sidebar_stats = "Scheda in tempo reale di ogni entità tracciata: le statistiche si aggiornano automaticamente dopo ogni turno."
