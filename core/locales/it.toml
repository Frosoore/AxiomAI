doc_tabletop_chat_input = "Scrivi cosa dice o fa il tuo personaggio, poi premi Invio (Maiusc+Invio per una nuova riga)."
doc_tabletop_send_t = "Invia"
doc_tabletop_send = "Invia la tua azione al narratore (come premere Invio)."
doc_tabletop_mini_dico_t = "Mini-Dico (enciclopedia del lore)"
doc_tabletop_mini_dico = "Fai qualsiasi domanda sul mondo (luoghi, personaggi, storia). Risponde solo dal lore dell'universo — non vede mai la tua partita e non la influenza."

