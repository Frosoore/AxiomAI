# TICKET-057 — doc enrichment (Studio sub-pages + details)
doc_page_creator_meta_t = "Studio · Metadata"
doc_page_creator_meta = "L'identità e il comportamento globale del mondo. <b>Cosa vive qui:</b> il lore di fondo che il narratore ricorda sempre, una sostituzione opzionale del prompt di sistema, la scena d'apertura di una nuova partita, la modalità Compagno e i cursori che regolano la narrazione (tensione, temperatura, top-p, prolissità). <b>Come usarlo:</b> scrivi prima il Lore del mondo (ancora tutto), imposta l'atmosfera con la Tensione, poi lascia i cursori IA ai valori predefiniti a meno che la narrazione non suoni storta. Premi Informazioni per i dettagli di ogni campo."
doc_page_creator_stats_t = "Studio · Stats"
doc_page_creator_stats = "Definisce le statistiche che le entità possono portare — Salute, Monete, Reputazione, ciò che inventi. <b>Per ogni statistica:</b> un nome, un valore iniziale predefinito e limiti min/max opzionali. <b>Perché conta:</b> le statistiche sono ciò su cui ragionano il motore di regole e il narratore — una statistica definita qui può essere cambiata dalla storia e verificata dalle regole. <b>Esempio:</b> definisci 'Monete' (min 0) e il mondo può farti pagare una stanza; definisci 'Salute' (0–100) e la scheda Regole può rendere 0 la morte. <b>Nota:</b> i nuovi personaggi iniziano ogni statistica definita al suo valore predefinito."
doc_page_creator_entities_t = "Studio · Entità"
doc_page_creator_entities = "Il cast e gli oggetti del tuo mondo: personaggi (PNG), fazioni, oggetti e cose notevoli. <b>Per ogni entità:</b> un id, un nome, un tipo, una descrizione che il narratore legge e le sue statistiche. <b>Come usarlo:</b> dai ai PNG importanti qualche statistica e una descrizione netta — è ciò che li tiene coerenti in una campagna lunga. <b>Esempio:</b> un oste con una descrizione vivida e una statistica 'Indole' si comporta uguale ogni volta che la storia torna da lui. Puoi anche generare entità dalla scheda Populate."
doc_page_creator_map_t = "Studio · Mappa"
doc_page_creator_map = "I luoghi del tuo mondo e come si collegano. <b>Cosa definisci:</b> luoghi (con una scala — regione, città, punto d'interesse — e un genitore) e le connessioni tra essi. <b>Perché conta:</b> il narratore usa la mappa per tenere coerenti geografia e spostamenti, e l'orologio di gioco può usare le connessioni per stimare quanto dura un viaggio. <b>Come usarlo:</b> abbozza prima i grandi luoghi (un paese, le sue città), poi aggiungi le strade e le stanze che contano per il gioco. Populate può generare una mappa iniziale."
doc_page_creator_rules_t = "Studio · Regole"
doc_page_creator_rules = "Regole deterministiche che il motore applica a ogni turno — è ciò che tiene onesto il mondo mentre l'IA resta libera di narrare. <b>Come funziona una regola:</b> quando le statistiche di un'entità cambiano, le condizioni della regola vengono verificate; se valgono, le sue azioni scattano (cambiare una statistica, impostare uno stato…). <b>Ogni regola ha</b> una priorità, un bersaglio (un'entità o '*' per tutte), condizioni e azioni. <b>Esempio:</b> 'se Salute ≤ 0 → imposta Condizione = Ferito a morte' rende la morte vincolante qualunque cosa dica la prosa. <b>Suggerimento:</b> una statistica assente vale 0, quindi preferisci soglie '≥' per effetti pensati solo per entità che portano davvero la statistica."
doc_page_creator_events_t = "Studio · Eventi"
doc_page_creator_events = "Eventi programmati che scattano a un'ora di gioco scelta, indipendentemente da ciò che fa il giocatore. <b>Cosa imposti:</b> quando l'evento accade (in tempo di gioco) e cosa fa o segnala alla narrazione. <b>Perché conta:</b> gli eventi fanno avanzare il mondo a orologio — arriva una carovana, scade un termine, colpisce una tempesta — così l'ambientazione sembra viva invece di aspettarti. <b>Esempio:</b> programma 'il carico d'artiglieria arriva ai moli il giorno 3' e il mondo raggiungerà quel momento, che tu lo sorvegliassi o no."
doc_page_creator_setup_t = "Studio · Domande iniziali"
doc_page_creator_setup = "Le domande a cui un giocatore risponde iniziando una partita in questo universo. <b>Cosa definisci:</b> ogni domanda, il suo tipo (scelta singola, scelta multipla o testo libero) e le sue opzioni. <b>Perché conta:</b> le risposte vengono iniettate nel turno d'apertura, quindi decidono chi è il giocatore e dove inizia. <b>Esempio:</b> una scelta 'Da dove vieni?' può fissare la regione iniziale e colorare la prima scena. Tienile poche ed evocative — tre buone domande valgono più di dieci scialbe."
doc_page_creator_lore_t = "Studio · Lore Book"
doc_page_creator_lore = "L'enciclopedia del mondo: voci di lore ricercabili che il narratore richiama su richiesta (memoria aumentata dal recupero). <b>Cosa aggiungi:</b> articoli su storia, fazioni, magia, luoghi — ciascuno con parole chiave. <b>Perché conta:</b> a differenza del Lore del mondo sempre attivo (Metadata), queste vengono recuperate solo se rilevanti, così puoi conservare moltissimo sfondo senza appesantire ogni prompt. <b>Come usarlo:</b> una voce mirata per argomento; il motore fa emergere quelle giuste per la scena. Populate può abbozzare voci."
doc_page_creator_populate_t = "Studio · Populate"
doc_page_creator_populate = "Creazione assistita dall'IA: lascia che un modello generi parti del tuo universo. <b>Cosa fa:</b> crea entità, luoghi, voci di lore e altro dalla premessa del tuo mondo, con un'anteprima e un diff così approvi ogni modifica prima che venga scritta. <b>Come usarlo:</b> scrivi prima un buon Lore del mondo (Populate ci si appoggia), genera in piccoli lotti mirati, rivedi il diff e salva ciò che ti piace. <b>Perché conta:</b> trasforma un universo vuoto in uno giocabile in minuti — un punto di partenza che poi rifinisci a mano."
doc_page_creator_files_t = "Studio · File"
doc_page_creator_files = "La sorgente grezza del tuo universo, in testo. Axiom salva i mondi come <b>Universe-as-Code</b>: file TOML/Markdown leggibili che compilano in un database. <b>Cosa puoi fare:</b> aprire e modificare quei file sorgente direttamente, e convertire un vecchio database piatto nell'albero sorgente. <b>Perché conta:</b> poiché un universo è testo semplice, puoi versionarlo con Git, farne il diff e condividerlo come codice. <b>Avanzato:</b> tutto ciò che fanno le altre schede finisce in questi file — questa è la vista diretta."
doc_creator_meta_world_lore_d = "<b>Cosa fa:</b> questo testo è anteposto al contesto del narratore a ogni turno, è quindi la memoria permanente del mondo. <b>Metti qui:</b> il tono, la grande storia, le regole di magia/tecnologia e verità da non contraddire mai. <b>Lascia fuori:</b> il dettaglio enciclopedico lungo — va nel Lore Book (recuperato su richiesta) per tenere questo campo snello. <b>Esempio:</b> 'Gli dèi sono morti e dimenticati; la magia stanca chi la lancia come un muscolo; corre l'anno 5281.' <b>Effetto:</b> ogni scena rispetta questi fatti senza che tu li ripeta."
doc_creator_meta_system_prompt_d = "<b>Cosa fa:</b> sostituisce le istruzioni integrate del narratore per questo universo — la sostituzione più profonda e avanzata. <b>Quando usarlo:</b> solo per un comportamento narrativo radicalmente diverso (un formato preciso, una voce o regole inusuali). <b>Attenzione:</b> il prompt predefinito gestisce già stato, strumenti e coerenza; una sostituzione sbadata può romperli. <b>Raccomandazione:</b> lascialo vuoto e guida il mondo prima con il Lore e i cursori; ricorri a questo solo quando nient'altro ottiene il comportamento voluto."
doc_creator_meta_first_message_d = "<b>Cosa fa:</b> la narrazione d'apertura mostrata all'inizio di una partita nuova qui — il sipario si alza. <b>Metti qui:</b> una scena che fissa l'atmosfera e cala il giocatore in una situazione a cui reagire. <b>Come usarlo:</b> chiudi con un piccolo gancio (un colpo alla porta, una scelta) così la prima azione del giocatore ha presa. <b>Nota:</b> appare una volta all'avvio; i salvataggi ripresi mantengono il proprio storico. <b>Esempio:</b> un molo piovoso all'alba, uno sconosciuto che fa scivolare una lettera sigillata sul tavolo."
doc_creator_meta_companion_d = "<b>Cosa fa:</b> la modalità Compagno trasforma Axiom nel co-pilota di un Eroe principale scelto — l'IA aiuta a condurre quel personaggio invece di far girare un sandbox aperto. <b>Come usarlo:</b> spunta Attiva, poi scegli l'entità Eroe attorno a cui ruota l'esperienza. <b>Perché usarlo:</b> ideale per una storia guidata, centrata su un unico protagonista. <b>Lasciala spenta</b> per l'esperienza classica 'sei il giocatore, fai ciò che vuoi'."
doc_creator_meta_tension_d = "<b>Cosa fa:</b> un cursore 0.0–1.0 che dice al narratore quanto drammatico debba sembrare il mondo. <b>0.0</b> = quotidianità tranquilla; <b>1.0</b> = pericolo costante e posta alta. <b>Effetto:</b> colora quanto spesso i guai trovano il giocatore e quanto cariche sono le scene — cambia l'atmosfera, non le regole. <b>Esempio:</b> un giallo di paese accogliente sta intorno a 0.2, una città sull'orlo della guerra intorno a 0.7. <b>Suggerimento:</b> alimenta anche il Chronicler fuori scena, così un mondo teso evolve in modo più movimentato mentre sei via."
doc_creator_meta_llm_temp_d = "<b>Cosa fa:</b> la creatività dell'IA per questo universo, da 0.0 a 1.0. <b>Bassa</b> (≈0.2) = focalizzata, prevedibile, sui binari; <b>alta</b> (≈0.8) = inventiva, sorprendente, a volte sopra le righe. <b>Come regolarla:</b> se la narrazione si ripete, alzala; se divaga o si contraddice, abbassala. <b>Raccomandazione:</b> 0.6–0.8 va bene per la maggior parte dei racconti. Imposta il valore predefinito dell'universo; il valore globale delle Impostazioni vale se un universo non lo definisce."
doc_creator_meta_llm_top_p_d = "<b>Cosa fa:</b> campionamento a nucleo — un altro controllo di creatività che limita quanto del vocabolario dell'IA viene usato (0.0–1.0). <b>Alto</b> (≈0.95) = la tavolozza piena e varia; <b>basso</b> (≈0.5) = solo le parole più probabili, cioè prosa più piana e prudente. <b>Come usarlo:</b> di solito lascialo vicino a 0.9–1.0 e modella la creatività con la Temperatura; abbassalo solo se la scrittura si scioglie troppo. <b>Nota:</b> Temperatura e top-p interagiscono — cambiane uno alla volta."
doc_creator_meta_verbosity_d = "<b>Cosa fa:</b> quanta prosa scrive il narratore per turno. <b>Breve</b> = beat serrati e rapidi; <b>Bilanciato</b> = un buon paragrafo; <b>Loquace</b> = scene ricche e descrittive. <b>Come scegliere:</b> Breve per azione veloce o ritmo play-by-post, Loquace per sessioni immersive e romanzesche. <b>Effetto:</b> cambia lunghezza e dettaglio, non ciò che accade davvero. È il valore predefinito dell'universo."

