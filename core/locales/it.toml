doc_tabletop_chat_input = "Scrivi cosa dice o fa il tuo personaggio, poi premi Invio (Maiusc+Invio per una nuova riga)."
doc_tabletop_send_t = "Invia"
doc_tabletop_send = "Invia la tua azione al narratore (come premere Invio)."
