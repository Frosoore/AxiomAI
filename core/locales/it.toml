# -- pages ----------------------------------------------------------------
doc_page_hub_t = "Biblioteca degli universi"
doc_page_hub = "La schermata iniziale — la tua libreria di mondi. Ogni universo installato su questa macchina appare qui come una scheda. <b>Cosa puoi fare:</b> creare un nuovo universo, importarne uno (un pacchetto Axiom .axiom o una scheda personaggio di SillyTavern) o, su una scheda, Gioca, Modifica (apre il Creator Studio), Esporta (condividilo come file) o Elimina. <b>Suggerimento:</b> parti dall'universo Myria incluso per vedere come si incastra tutto prima di costruire il tuo."
doc_page_setup_t = "Preparazione della partita"
doc_page_setup = "Dove si prepara una sessione prima che la storia inizi. <b>Due strade:</b> riprendere un salvataggio, o ripartire da zero — scegliere un persona (il tuo profilo fuori personaggio), impostare il nome del personaggio e la difficoltà, e rispondere alle domande dell'universo. Premi <b>Avvia</b> quando sei pronto. <b>Perché conta:</b> le tue risposte vengono scritte nel primo turno, quindi decidono dove e chi sei all'apertura della narrazione."
doc_page_tabletop_t = "Tavolo di gioco"
doc_page_tabletop = "Il gioco vero e proprio. <b>Come si gioca:</b> scrivi cosa fa o dice il tuo personaggio nel riquadro centrale e invialo — l'IA narra la risposta del mondo, poi un motore di regole deterministico verifica le conseguenze (salute, inventario, denaro, tempo…) perché il mondo resti coerente. <b>Al tavolo:</b> statistiche e inventario a sinistra, l'enciclopedia di lore ricercabile a destra, lo storico dei turni al centro. <b>Esempio:</b> 'frugo nella scrivania in cerca di una chiave' può far avanzare l'orologio, rivelare un oggetto o cambiare una statistica — e il mondo lo ricorda al turno dopo."
doc_page_creator_t = "Creator Studio"
doc_page_creator = "Il Creator Studio — dove un universo si costruisce e si modifica. Il lavoro è organizzato in schede in alto, e <b>ogni scheda ha la propria pagina di Informazioni</b> (premi Informazioni o F1 sulla scheda in cui sei). <b>Regola d'oro:</b> nulla viene scritto finché non Salvi (Ctrl+S). <b>Da dove iniziare:</b> Metadata fissa identità e tono del mondo; Stats ed Entità gli danno sostanza; le altre schede (Mappa, Regole, Eventi, Setup, Lore, Populate, File) lo affinano e automatizzano."
doc_page_settings_t = "Impostazioni"
doc_page_settings = "Preferenze dell'intera applicazione, non legate a un universo. <b>Qui scegli:</b> quale IA scrive la storia (un modello locale via Ollama / LM Studio, o un provider cloud), la generazione di illustrazioni opzionale, la lingua dell'interfaccia, l'audio e lo schermo. <b>Importante:</b> la scheda del backend di testo selezionata quando premi <b>Salva</b> diventa il backend attivo — chiudi quindi su quella che vuoi davvero. Usa <b>Prova connessione</b> per confermare che l'IA risponde prima di giocare."
doc_page_app_t = "Finestra dell'applicazione"
doc_page_app = "La cornice attorno a ogni schermata. <b>Barra dei menu:</b> File e Aiuto — il tour rapido, questo indice della documentazione e lo strumento di Diagnostica stanno sotto Aiuto. <b>Barra di stato</b> (in basso): messaggi di avanzamento, il controllo del volume e — mentre l'IA scrive — un pulsante per annullare la generazione in corso. Sempre disponibili, qualunque schermata."

