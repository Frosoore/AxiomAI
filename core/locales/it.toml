doc_tabletop_sidebar_inventory = "Gli oggetti portati da ogni entità, aggiornati man mano che la storia evolve."
doc_tabletop_sidebar_timeline_t = "Pannello Cronologia"
doc_tabletop_sidebar_timeline = "Cronaca degli eventi notevoli del mondo, con l'ora di gioco in cui sono avvenuti."
doc_tabletop_chat_log_t = "Storia"
doc_tabletop_chat_log = "La storia fin qui. Il testo del narratore scorre qui; usa le frecce sotto una risposta per cambiare variante, o Rigenera per ottenerne una nuova."
