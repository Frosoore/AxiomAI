# -- pages ----------------------------------------------------------------
doc_page_hub_t = "Biblioteca degli universi"
doc_page_hub = "La schermata iniziale. Ogni universo installato su questa macchina appare qui come una scheda. Da qui puoi creare, importare, giocare, modificare, esportare o eliminare universi."
doc_page_setup_t = "Preparazione della partita"
doc_page_setup = "Prepara una sessione di gioco per l'universo scelto: riprendi un salvataggio esistente, oppure crea un nuovo personaggio (persona, nome, difficoltà), rispondi alle domande della storia e avvia."
doc_page_tabletop_t = "Tavolo di gioco"
doc_page_tabletop = "La schermata di gioco. Scrivi cosa fa il tuo personaggio nel pannello centrale e l'IA narra la risposta del mondo. Statistiche e inventario stanno a sinistra, l'enciclopedia del lore a destra."
doc_page_creator_t = "Creator Studio"
doc_page_creator = "L'editor di universi. Ogni scheda gestisce un aspetto del mondo: lore, statistiche, personaggi, mappa, regole, eventi, domande iniziali e file sorgente. Ricorda di salvare (Ctrl+S)."
doc_page_settings_t = "Impostazioni"
doc_page_settings = "Impostazioni globali dell'applicazione: quale IA usare (locale o cloud), generazione di illustrazioni, lingua, audio e preferenze dell'interfaccia. La scheda selezionata quando premi Salva diventa il backend di testo attivo."
doc_page_app_t = "Finestra dell'applicazione"
doc_page_app = "Gli elementi sempre disponibili attorno alle schermate: la barra dei menu (File, Aiuto) e la barra di stato in basso, che mostra i messaggi di avanzamento, il volume audio e un pulsante di annullamento mentre l'IA scrive."

