doc_page_hub_t = "Biblioteca de universos"
doc_page_hub = "La pantalla de inicio. Cada universo instalado en esta máquina aparece aquí como una tarjeta. Desde aquí puedes crear, importar, jugar, editar, exportar o eliminar universos."
doc_page_setup_t = "Preparación de partida"
doc_page_setup = "Prepara una sesión de juego para el universo elegido: retoma una partida guardada, o crea un nuevo personaje (persona, nombre, dificultad), responde las preguntas de historia y lanza."
doc_page_tabletop_t = "Mesa de juego"
doc_page_tabletop = "La pantalla de juego. Escribe lo que hace tu personaje en el panel central y la IA narra la respuesta del mundo. Las estadísticas y el inventario están a la izquierda, la enciclopedia del lore a la derecha."
doc_page_creator_t = "Creator Studio"
doc_page_creator = "El editor de universos. Cada pestaña gestiona un aspecto del mundo: su lore, estadísticas, personajes, mapa, reglas, eventos, preguntas iniciales y archivos fuente. Recuerda guardar (Ctrl+S)."
doc_page_settings_t = "Ajustes"
doc_page_settings = "Ajustes globales de la aplicación: qué IA usar (local o en la nube), generación de ilustraciones, idioma, audio y preferencias de interfaz. La pestaña seleccionada al pulsar Guardar se convierte en el backend de texto activo."
doc_page_app_t = "Ventana de la aplicación"
doc_page_app = "Los elementos siempre disponibles alrededor de las pantallas: la barra de menús (Archivo, Ayuda) y la barra de estado inferior, que muestra mensajes de progreso, el volumen de audio y un botón de cancelación mientras la IA escribe."

