# TICKET-057 — doc enrichment (Studio sub-pages + details)
doc_page_creator_meta_t = "Studio · Metadata"
doc_page_creator_meta = "The world's identity and global behaviour. <b>What lives here:</b> the background lore the narrator always remembers, an optional system-prompt override, the opening scene of a new game, Companion mode, and the dials that tune the narration (tension, temperature, top-p, verbosity). <b>How to use it:</b> write the World Lore first (it anchors everything), set the mood with Tension, then leave the AI dials at their defaults unless the narration feels off. Press Information for details on each field."
doc_page_creator_stats_t = "Studio · Stats"
doc_page_creator_stats = "Defines the stats entities can carry — Health, Coin, Reputation, anything you invent. <b>For each stat:</b> a name, a default starting value, and optional min/max bounds. <b>Why it matters:</b> stats are what the rules engine and the narrator reason about — a stat defined here can be changed by the story and checked by rules. <b>Example:</b> define 'Coin' (min 0) and the world can charge you for a room; define 'Health' (0–100) and the Rules tab can make 0 mean death. <b>Note:</b> new characters start every defined stat at its default value."
doc_page_creator_entities_t = "Studio · Entities"
doc_page_creator_entities = "The cast and objects of your world: characters (NPCs), factions, items and notable things. <b>For each entity:</b> an id, a name, a type, a description the narrator reads, and its own stats. <b>How to use it:</b> give important NPCs a few stats and a sharp description — that is what keeps them consistent across a long campaign. <b>Example:</b> a tavern-keeper with a vivid description and a 'Demeanor' stat behaves the same way every time the story returns to them. You can also generate entities from the Populate tab."
doc_page_creator_map_t = "Studio · Map"
doc_page_creator_map = "The places of your world and how they connect. <b>What you define:</b> locations (with a scale — region, city, point of interest — and a parent), and the connections between them. <b>Why it matters:</b> the narrator uses the map to keep geography and travel coherent, and the in-game clock can use connections to estimate how long a journey takes. <b>How to use it:</b> sketch the big places first (a country, its cities), then add the roads and rooms that matter to play. Populate can generate a starting map for you."
doc_page_creator_rules_t = "Studio · Rules"
doc_page_creator_rules = "Deterministic rules the engine enforces every turn — this is what keeps the world honest while the AI stays free to narrate. <b>How a rule works:</b> when an entity's stats change, the rule's conditions are checked; if they hold, its actions fire (change a stat, set a status…). <b>Each rule has</b> a priority, a target (one entity or '*' for all), conditions and actions. <b>Example:</b> 'if Health ≤ 0 → set Condition = Mortally wounded' makes death stick whatever the prose says. <b>Tip:</b> a missing stat reads as 0, so prefer '≥' thresholds for effects meant only for entities that really carry the stat."
doc_page_creator_events_t = "Studio · Events"
doc_page_creator_events = "Scheduled events that fire at a chosen in-game time, independently of what the player does. <b>What you set:</b> when the event happens (in in-game time) and what it does or signals to the narration. <b>Why it matters:</b> events let the world move on a clock — a caravan arrives, a deadline passes, a storm hits — so the setting feels alive instead of waiting for you. <b>Example:</b> schedule 'the artillery shipment reaches the docks on day 3' and the world will reach that moment whether or not you were watching."
doc_page_creator_setup_t = "Studio · Setup questions"
doc_page_creator_setup = "The questions a player answers when starting a new game in this universe. <b>What you define:</b> each question, its type (single choice, multiple choice or free text) and its options. <b>Why it matters:</b> the answers are injected into the opening turn, so they decide who the player is and where they begin. <b>Example:</b> a 'Where do you come from?' choice can set the starting region and colour the first scene. Keep them few and evocative — three good questions beat ten bland ones."
doc_page_creator_lore_t = "Studio · Lore Book"
doc_page_creator_lore = "The world's encyclopedia: searchable lore entries the narrator pulls in on demand (retrieval-augmented memory). <b>What you add:</b> articles on history, factions, magic, places — each with keywords. <b>Why it matters:</b> unlike the always-on World Lore in Metadata, these are fetched only when relevant, so you can store a huge amount of background without bloating every prompt. <b>How to use it:</b> one focused entry per topic; the engine surfaces the right ones for what's happening. Populate can draft entries for you."
doc_page_creator_populate_t = "Studio · Populate"
doc_page_creator_populate = "AI-assisted authoring: let a model generate parts of your universe. <b>What it does:</b> creates entities, locations, lore entries and more from your world's premise, with a preview and a diff so you approve every change before it's written. <b>How to use it:</b> write a strong World Lore first (Populate builds on it), generate in small targeted batches, review the diff, then save what you like. <b>Why it matters:</b> it turns a blank universe into a playable one in minutes — a starting point you then refine by hand."
doc_page_creator_files_t = "Studio · Files"
doc_page_creator_files = "The raw source of your universe, as text. Axiom stores worlds as <b>Universe-as-Code</b>: human-readable TOML/Markdown files that compile to a database. <b>What you can do:</b> open and edit those source files directly, and convert a flat legacy database into the source tree. <b>Why it matters:</b> because a universe is plain text, you can version it with Git, diff it and share it like source code. <b>Advanced:</b> everything the other tabs do ends up in these files — this is the direct view."
doc_creator_meta_world_lore_d = "<b>What it does:</b> this text is prepended to the narrator's context every single turn, so it is the world's permanent memory. <b>Put here:</b> tone, broad history, the rules of magic/technology, and truths that must never be contradicted. <b>Keep out:</b> long encyclopedic detail — that belongs in the Lore Book (fetched on demand) so this stays lean. <b>Example:</b> 'The gods are dead and forgotten; magic tires the caster like a muscle; the year is 5281.' <b>Effect:</b> every scene respects these facts without you repeating them."
doc_creator_meta_system_prompt_d = "<b>What it does:</b> replaces the narrator's built-in instructions for this universe — the deepest, most advanced override. <b>When to use it:</b> only for a fundamentally different storytelling behaviour (a specific format, an unusual narrator voice or ruleset). <b>Warning:</b> the default prompt already handles state, tools and consistency; a careless override can break them. <b>Recommendation:</b> leave it empty and steer the world through World Lore and the dials first; reach for this only when nothing else gets the behaviour you need."
doc_creator_meta_first_message_d = "<b>What it does:</b> the opening narration shown when a brand-new game starts here — the curtain-raiser. <b>Put here:</b> a scene that sets the mood and drops the player into a situation with something to react to. <b>How to use it:</b> end on a small hook (a knock at the door, a choice) so the player's first action has traction. <b>Note:</b> it shows once at game start; resumed saves keep their own history. <b>Example:</b> a rainy dock at dawn, a stranger sliding a sealed letter across the table."
doc_creator_meta_companion_d = "<b>What it does:</b> Companion mode turns Axiom into a co-pilot for one chosen main Hero — the AI helps drive that character rather than running a pure open sandbox. <b>How to use it:</b> tick Enable, then pick the Hero entity the experience centres on. <b>Why use it:</b> ideal for a guided, character-focused story with a single protagonist. <b>Leave it off</b> for the classic 'you are the player, do anything' experience."
doc_creator_meta_tension_d = "<b>What it does:</b> a 0.0–1.0 dial telling the narrator how dramatic the world should feel. <b>0.0</b> = calm everyday life; <b>1.0</b> = constant danger and high stakes. <b>Effect:</b> it colours how often trouble finds the player and how charged scenes are — it changes the mood, not the rules. <b>Example:</b> a cosy village mystery sits near 0.2, a city on the edge of war near 0.7. <b>Tip:</b> it also feeds the off-screen Chronicler, so a tense world evolves more eventfully while you are away."
doc_creator_meta_llm_temp_d = "<b>What it does:</b> the AI's creativity for this universe, 0.0 to 1.0. <b>Low</b> (≈0.2) = focused, predictable, on-the-rails; <b>high</b> (≈0.8) = inventive, surprising, occasionally off-the-wall. <b>How to tune it:</b> if the narration feels repetitive, raise it; if it drifts or contradicts itself, lower it. <b>Recommendation:</b> 0.6–0.8 suits most storytelling. This sets the universe default; the global Settings value applies when a universe leaves it unset."
doc_creator_meta_llm_top_p_d = "<b>What it does:</b> nucleus sampling — another creativity control that limits how much of the AI's vocabulary it draws from (0.0–1.0). <b>High</b> (≈0.95) = the full, varied palette; <b>low</b> (≈0.5) = only the most likely words, i.e. plainer, safer prose. <b>How to use it:</b> usually leave it near 0.9–1.0 and shape creativity with Temperature instead; lower it only if the writing gets too loose. <b>Note:</b> Temperature and top-p interact — change one at a time."
doc_creator_meta_verbosity_d = "<b>What it does:</b> how much prose the narrator writes per turn. <b>Short</b> = tight, fast-moving beats; <b>Balanced</b> = a healthy paragraph; <b>Talkative</b> = rich, descriptive scenes. <b>How to choose:</b> Short for snappy action or play-by-post pace, Talkative for immersive, novelistic sessions. <b>Effect:</b> it changes length and detail, not what actually happens. This is the universe's default."

