# -- pages ----------------------------------------------------------------
doc_page_hub_t = "Universe Library"
doc_page_hub = "The home screen — your library of worlds. Every universe installed on this machine appears here as a card. <b>What you can do:</b> create a brand-new universe, import one (an Axiom .axiom pack or a SillyTavern character card), or, on any card, Play, Edit (opens the Creator Studio), Export (share it as a file) or Delete. <b>Tip:</b> start with the bundled Myria universe to see how the pieces fit before building your own."
doc_page_setup_t = "Game Setup"
doc_page_setup = "Where a play session is prepared before the story begins. <b>Two paths:</b> resume an existing save, or start fresh — pick a persona (your out-of-character profile), set your character's name and the difficulty, then answer the universe's story questions. Press <b>Launch</b> when ready. <b>Why it matters:</b> your answers are written into the very first turn, so they shape where and who you are when the narration opens."
doc_page_tabletop_t = "Tabletop"
doc_page_tabletop = "The game itself. <b>How to play:</b> type what your character does or says in the central box and send it — the AI narrates the world's response, then a deterministic rules engine checks the consequences (health, inventory, money, time…) so the world stays consistent. <b>Around the table:</b> stats and inventory on the left, the searchable lore encyclopedia on the right, the turn history in the middle. <b>Example:</b> 'I search the desk for a key' may advance the clock, reveal an item or change a stat — and the world remembers it next turn."
doc_page_creator_t = "Creator Studio"
doc_page_creator = "The Creator Studio — where a universe is built and edited. Work is organised into tabs along the top, and <b>each tab has its own Information page</b> (press Information or F1 on the tab you're using). <b>Golden rule:</b> nothing is written until you Save (Ctrl+S). <b>Where to start:</b> Metadata sets the world's identity and tone; Stats and Entities give it substance; the other tabs (Map, Rules, Events, Setup, Lore, Populate, Files) refine and automate it."
doc_page_settings_t = "Settings"
doc_page_settings = "Application-wide preferences, not tied to one universe. <b>You choose here:</b> which AI writes the story (a local model via Ollama / LM Studio, or a cloud provider), optional illustration generation, the interface language, audio and display. <b>Important:</b> the text-backend tab selected when you press <b>Save</b> becomes the active backend — so end on the tab you actually want. Use <b>Test Connection</b> to confirm the AI answers before you play."
doc_page_app_t = "Application Window"
doc_page_app = "The frame around every screen. <b>Menu bar:</b> File and Help — the quick tour, this documentation directory and the Diagnostic tool all live under Help. <b>Status bar</b> (bottom): progress messages, the audio volume control, and — while the AI is writing — a button to cancel the current generation. These stay available whatever screen you are on."

