doc_settings_extraction_model_t = "Extraction Model"
doc_settings_extraction_model = "Smaller model used for structured JSON tasks (e.g. the Populate generators). It can be the same as the main model."
doc_settings_time_model_t = "Time Model"
doc_settings_time_model = "Tiny model used by the Timekeeper to estimate how much in-game time an action takes."
doc_settings_test_connection_t = "Test Connection"
doc_settings_test_connection = "Checks that the backend answers with the values entered above."
doc_settings_tab_cloud_t = "Cloud Tab"
doc_settings_tab_cloud = "Configures a cloud AI provider (Gemini, Claude, Venice AI, Fireworks AI, OpenAI, OpenRouter) as the text AI. This becomes the active backend if it is the selected tab when you press Save."
doc_settings_cloud_provider_t = "Cloud Provider"
doc_settings_cloud_provider = "Which cloud service to use for text generation. Each provider keeps its own API key and model, so switching never loses your keys."
doc_settings_cloud_key_t = "API Key"
doc_settings_cloud_key = "Your API key for the selected provider."
doc_settings_cloud_model_t = "Model"
doc_settings_cloud_model = "The model that narrates the story (e.g. gemini-2.0-flash, claude-opus-4-8)."
doc_settings_browse_models_t = "Browse models"
doc_settings_browse_models = "Fetches the list of models actually available on the selected provider so you can pick one. On the shared beta keys, only low-cost models are offered."
doc_settings_gemini_fallback_t = "Fallback Model"
doc_settings_gemini_fallback = "Optional model used automatically when the main one hits its quota (429 error), so the game can continue."
doc_settings_llm_rpm_t = "Requests per Minute"
doc_settings_llm_rpm = "Hard cap on AI requests per minute, to stay under free-tier quotas. 0 = unlimited."
doc_settings_tab_params_t = "Universe Parameters Tab"
doc_settings_tab_params = "Creativity settings stored inside the currently open universe (not global settings)."
doc_settings_llm_temp_t = "LLM Temperature"
doc_settings_llm_temp = "Creativity of the AI for the open universe (0 = predictable, 1 = adventurous)."
doc_settings_llm_top_p_t = "LLM Top P"
doc_settings_llm_top_p = "Advanced sampling parameter; lower values make the wording more focused. Leave at 1.0 unless you know you need it."
doc_settings_tab_personas_t = "Personas Tab"
doc_settings_tab_personas = "Manages your global personas (reusable player characters) — the same list offered on the Game Setup screen."
doc_settings_tab_image_t = "Illustration Tab"
doc_settings_tab_image = "Optional: generates an illustration for each story turn, locally (Stable Diffusion, ComfyUI) or in the cloud (Gemini)."
doc_settings_image_enable_t = "Enable Illustrations"
doc_settings_image_enable = "Turns automatic scene illustration on or off."
doc_settings_image_backend_t = "Image Backend"
doc_settings_image_backend = "Which image engine to use: a local Stable Diffusion WebUI, a local ComfyUI, Google Gemini in the cloud, or a mock for testing."
doc_settings_image_url_t = "Image API URL"
doc_settings_image_url = "Address of the local image engine (Stable Diffusion WebUI or ComfyUI)."
doc_settings_image_gemini_model_t = "Gemini Image Model"
doc_settings_image_gemini_model = "Gemini image model used when the backend is Google Gemini."
doc_settings_image_size_t = "Image Size"
doc_settings_image_size = "Width and height of the generated images, in pixels."
doc_settings_image_steps_t = "Diffusion Steps"
doc_settings_image_steps = "More steps = finer image but slower generation (local engines only)."
doc_settings_image_cfg_t = "CFG Scale"
doc_settings_image_cfg = "How strictly the image follows the prompt (local engines only). 7 is a good default."
doc_settings_image_timeout_t = "Image Timeout"
doc_settings_image_timeout = "Maximum seconds to wait for one image before giving up. A slow machine may need more."
doc_settings_image_workflow_t = "ComfyUI Workflow"
doc_settings_image_workflow = "ComfyUI only: path to (or raw JSON of) the workflow template. Leave empty to use the built-in default."
doc_settings_language_t = "Language"
doc_settings_language = "Display language of the interface (10 available)."
doc_settings_chronicler_t = "Chronicler Interval"
doc_settings_chronicler = "How often the world evolves on its own: every N in-game minutes, off-screen events are generated by the Chronicler."
doc_settings_font_size_t = "UI Font Size"
doc_settings_font_size = "Text size of the interface."
doc_settings_rag_chunks_t = "RAG Memory Chunks"
doc_settings_rag_chunks = "How many memory passages from past events are retrieved to feed the narrator each turn. More = better recall, but slower and costlier."
doc_settings_audio_t = "Background Audio"
doc_settings_audio = "Plays a background ambience loop that follows the mood of the scene."
doc_settings_timekeeper_t = "Timekeeper"
doc_settings_timekeeper = "Lets a small AI estimate how much in-game time each action takes. Disable it to save one AI call per turn (time then advances by a fixed step)."

# -- app chrome ---------------------------------------------------------------
doc_app_volume_t = "Volume"
doc_app_volume = "Background-music volume of the ambient audio (when enabled in Settings)."
doc_app_cancel_generation_t = "Cancel Generation"
doc_app_cancel_generation = "Appears while the AI is writing. Click it to cancel the generation(s) in progress."

# -- quick tour ---------------------------------------------------------------
doc_tour_welcome_t = "Welcome to Axiom AI!"
doc_tour_welcome = "Axiom AI is a role-playing sandbox where an AI narrates living worlds. This short tour shows you around — you can replay it anytime from Help → Quick Tour."
doc_tour_hub_t = "The Library"
doc_tour_hub = "The Library is your home: every universe (a world you can play in) appears as a card. Use Play to start a game, or Edit to open it in the Creator Studio."
doc_tour_create_t = "Getting Universes"
doc_tour_create = "Get content three ways: create your own universe (New Universe), import an .axiom file, or import a SillyTavern character card. The Creator Studio can even generate content with AI (Populate)."
doc_tour_setup_t = "Starting a Game"
doc_tour_setup = "Pressing Play opens Game Setup: resume a save, or pick a persona, a name and a difficulty, answer the story questions, then Launch."
doc_tour_tabletop_t = "Playing"
doc_tour_tabletop = "At the table, type what you do — the AI narrates the result. Stats and inventory live in the left panel, the lore encyclopedia on the right. You can rewind time whenever you like."
doc_tour_settings_t = "Connect an AI"
doc_tour_settings = "Before your first game, open File → Settings to connect an AI: a local one through Ollama, or Google Gemini in the cloud with an API key. The interface speaks 10 languages."
doc_tour_help_t = "Finding Help"
doc_tour_help = "Hover any control to learn what it does, press the ? button (or F1) to have the current page explained, and browse everything in Help → Documentation."

