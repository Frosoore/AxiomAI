# TICKET-057 — doc enrichment (Studio sub-pages + details)
doc_page_creator_meta_t = "Studio · Metadata"
doc_page_creator_meta = "L'identité et le comportement global du monde. <b>Ce qui vit ici :</b> le lore de fond que le narrateur garde toujours en tête, un remplacement de prompt système optionnel, la scène d'ouverture d'une nouvelle partie, le mode Compagnon, et les curseurs qui règlent la narration (tension, température, top-p, verbosité). <b>Comment l'utiliser :</b> écris d'abord le Lore du monde (il ancre tout), pose l'ambiance avec la Tension, puis laisse les curseurs IA par défaut sauf si la narration sonne faux. Appuie sur Information pour le détail de chaque champ."
doc_page_creator_stats_t = "Studio · Stats"
doc_page_creator_stats = "Définit les stats que les entités peuvent porter — Santé, Pièces, Réputation, tout ce que tu inventes. <b>Pour chaque stat :</b> un nom, une valeur de départ par défaut, et des bornes min/max optionnelles. <b>Pourquoi c'est important :</b> les stats sont ce sur quoi raisonnent le moteur de règles et le narrateur — une stat définie ici peut être modifiée par l'histoire et vérifiée par les règles. <b>Exemple :</b> définis « Pièces » (min 0) et le monde peut te facturer une chambre ; définis « Santé » (0–100) et l'onglet Règles peut faire de 0 la mort. <b>Note :</b> un nouveau personnage démarre chaque stat définie à sa valeur par défaut."
doc_page_creator_entities_t = "Studio · Entités"
doc_page_creator_entities = "Le casting et les objets de ton monde : personnages (PNJ), factions, objets et choses notables. <b>Pour chaque entité :</b> un id, un nom, un type, une description que le narrateur lit, et ses propres stats. <b>Comment l'utiliser :</b> donne aux PNJ importants quelques stats et une description nette — c'est ce qui les garde cohérents sur une longue campagne. <b>Exemple :</b> un tenancier de taverne avec une description vivante et une stat « Tempérament » se comportera pareil chaque fois que l'histoire revient à lui. Tu peux aussi générer des entités depuis l'onglet Populate."
doc_page_creator_map_t = "Studio · Carte"
doc_page_creator_map = "Les lieux de ton monde et leurs liaisons. <b>Ce que tu définis :</b> des lieux (avec une échelle — région, ville, point d'intérêt — et un parent), et les connexions entre eux. <b>Pourquoi c'est important :</b> le narrateur utilise la carte pour garder géographie et déplacements cohérents, et l'horloge in-game peut se servir des connexions pour estimer la durée d'un trajet. <b>Comment l'utiliser :</b> esquisse d'abord les grands lieux (un pays, ses villes), puis ajoute les routes et salles utiles au jeu. Populate peut générer une carte de départ."
doc_page_creator_rules_t = "Studio · Règles"
doc_page_creator_rules = "Des règles déterministes que le moteur applique à chaque tour — c'est ce qui garde le monde honnête pendant que l'IA reste libre de narrer. <b>Comment marche une règle :</b> quand les stats d'une entité changent, les conditions de la règle sont testées ; si elles tiennent, ses actions se déclenchent (changer une stat, poser un statut…). <b>Chaque règle a</b> une priorité, une cible (une entité ou « * » pour toutes), des conditions et des actions. <b>Exemple :</b> « si Santé ≤ 0 → poser Condition = Mortellement blessé » rend la mort effective quoi que dise la prose. <b>Astuce :</b> une stat absente vaut 0, donc préfère des seuils « ≥ » pour les effets réservés aux entités qui portent vraiment la stat."
doc_page_creator_events_t = "Studio · Événements"
doc_page_creator_events = "Des événements programmés qui se déclenchent à une heure in-game choisie, indépendamment des actions du joueur. <b>Ce que tu règles :</b> quand l'événement survient (en temps in-game) et ce qu'il fait ou signale à la narration. <b>Pourquoi c'est important :</b> les événements font avancer le monde sur une horloge — une caravane arrive, une échéance tombe, une tempête frappe — pour que le décor vive au lieu de t'attendre. <b>Exemple :</b> programme « la cargaison d'artillerie arrive aux docks le jour 3 » et le monde atteindra ce moment, que tu l'aies guetté ou non."
doc_page_creator_setup_t = "Studio · Questions de départ"
doc_page_creator_setup = "Les questions auxquelles un joueur répond en commençant une partie dans cet univers. <b>Ce que tu définis :</b> chaque question, son type (choix unique, choix multiple ou texte libre) et ses options. <b>Pourquoi c'est important :</b> les réponses sont injectées dans le tour d'ouverture, donc elles décident qui est le joueur et où il commence. <b>Exemple :</b> un choix « D'où viens-tu ? » peut fixer la région de départ et colorer la première scène. Garde-les peu nombreuses et évocatrices — trois bonnes questions valent mieux que dix fades."
doc_page_creator_lore_t = "Studio · Lore Book"
doc_page_creator_lore = "L'encyclopédie du monde : des entrées de lore cherchables que le narrateur va chercher à la demande (mémoire augmentée par récupération). <b>Ce que tu ajoutes :</b> des articles sur l'histoire, les factions, la magie, les lieux — chacun avec des mots-clés. <b>Pourquoi c'est important :</b> contrairement au Lore du monde toujours actif (Metadata), celles-ci ne sont récupérées que si pertinentes, donc tu peux stocker énormément de fond sans alourdir chaque prompt. <b>Comment l'utiliser :</b> une entrée ciblée par sujet ; le moteur fait remonter les bonnes selon la scène. Populate peut rédiger des entrées."
doc_page_creator_populate_t = "Studio · Populate"
doc_page_creator_populate = "Création assistée par IA : laisse un modèle générer des parties de ton univers. <b>Ce qu'il fait :</b> crée entités, lieux, entrées de lore et plus, à partir de la prémisse de ton monde, avec un aperçu et un diff pour que tu approuves chaque changement avant écriture. <b>Comment l'utiliser :</b> écris d'abord un bon Lore du monde (Populate s'appuie dessus), génère par petits lots ciblés, relis le diff, puis enregistre ce qui te plaît. <b>Pourquoi c'est important :</b> ça transforme un univers vide en univers jouable en quelques minutes — un point de départ que tu affines ensuite à la main."
doc_page_creator_files_t = "Studio · Fichiers"
doc_page_creator_files = "La source brute de ton univers, en texte. Axiom stocke les mondes en <b>Univers-as-Code</b> : des fichiers TOML/Markdown lisibles qui se compilent en base de données. <b>Ce que tu peux faire :</b> ouvrir et éditer ces fichiers source directement, et convertir une vieille base plate en arborescence source. <b>Pourquoi c'est important :</b> comme un univers est du texte, tu peux le versionner avec Git, le differ et le partager comme du code. <b>Avancé :</b> tout ce que font les autres onglets finit dans ces fichiers — c'est la vue directe."
doc_creator_meta_world_lore_d = "<b>Ce que ça fait :</b> ce texte est ajouté au contexte du narrateur à chaque tour, c'est donc la mémoire permanente du monde. <b>À mettre ici :</b> le ton, la grande histoire, les règles de la magie/technologie, et les vérités à ne jamais contredire. <b>À éviter ici :</b> le détail encyclopédique long — il va dans le Lore Book (récupéré à la demande) pour garder ce champ léger. <b>Exemple :</b> « Les dieux sont morts et oubliés ; la magie fatigue celui qui la lance comme un muscle ; on est en l'an 5281. » <b>Effet :</b> chaque scène respecte ces faits sans que tu les répètes."
doc_creator_meta_system_prompt_d = "<b>Ce que ça fait :</b> remplace les instructions intégrées du narrateur pour cet univers — le remplacement le plus profond et le plus avancé. <b>Quand l'utiliser :</b> seulement pour un comportement de narration fondamentalement différent (un format précis, une voix ou des règles inhabituelles). <b>Attention :</b> le prompt par défaut gère déjà l'état, les outils et la cohérence ; un remplacement maladroit peut les casser. <b>Recommandation :</b> laisse-le vide et pilote d'abord le monde via le Lore et les curseurs ; n'y touche que si rien d'autre n'obtient le comportement voulu."
doc_creator_meta_first_message_d = "<b>Ce que ça fait :</b> la narration d'ouverture affichée au tout début d'une nouvelle partie ici — le lever de rideau. <b>À mettre ici :</b> une scène qui pose l'ambiance et plonge le joueur dans une situation où réagir. <b>Comment l'utiliser :</b> finis sur une petite accroche (un coup à la porte, un choix) pour que la première action du joueur ait de la prise. <b>Note :</b> elle s'affiche une fois au lancement ; les sauvegardes reprises gardent leur propre historique. <b>Exemple :</b> un quai sous la pluie à l'aube, un inconnu glissant une lettre scellée sur la table."
doc_creator_meta_companion_d = "<b>Ce que ça fait :</b> le mode Compagnon fait d'Axiom un copilote pour un Héros principal choisi — l'IA aide à incarner ce personnage plutôt que de faire tourner un bac à sable ouvert. <b>Comment l'utiliser :</b> coche Activer, puis choisis l'entité Héros au centre de l'expérience. <b>Pourquoi l'utiliser :</b> idéal pour une histoire guidée, centrée sur un protagoniste unique. <b>Laisse-le désactivé</b> pour l'expérience classique « tu es le joueur, fais ce que tu veux »."
doc_creator_meta_tension_d = "<b>Ce que ça fait :</b> un curseur 0.0–1.0 qui dit au narrateur à quel point le monde doit sembler dramatique. <b>0.0</b> = vie quotidienne calme ; <b>1.0</b> = danger constant et enjeux élevés. <b>Effet :</b> il colore la fréquence des ennuis et l'intensité des scènes — il change l'ambiance, pas les règles. <b>Exemple :</b> une enquête villageoise paisible tourne autour de 0.2, une ville au bord de la guerre autour de 0.7. <b>Astuce :</b> il alimente aussi le Chronicler hors-champ, donc un monde tendu évolue de façon plus mouvementée pendant ton absence."
doc_creator_meta_llm_temp_d = "<b>Ce que ça fait :</b> la créativité de l'IA pour cet univers, de 0.0 à 1.0. <b>Bas</b> (≈0.2) = concentré, prévisible, sur des rails ; <b>haut</b> (≈0.8) = inventif, surprenant, parfois déjanté. <b>Comment régler :</b> si la narration se répète, monte-le ; si elle dérive ou se contredit, baisse-le. <b>Recommandation :</b> 0.6–0.8 convient à la plupart des récits. Ceci fixe le défaut de l'univers ; la valeur globale des Réglages s'applique si un univers ne le définit pas."
doc_creator_meta_llm_top_p_d = "<b>Ce que ça fait :</b> l'échantillonnage par noyau — un autre contrôle de créativité qui limite la part du vocabulaire de l'IA utilisée (0.0–1.0). <b>Haut</b> (≈0.95) = la palette complète et variée ; <b>bas</b> (≈0.5) = seulement les mots les plus probables, donc une prose plus plate et prudente. <b>Comment l'utiliser :</b> laisse-le en général vers 0.9–1.0 et règle la créativité via la Température ; baisse-le seulement si l'écriture part trop loin. <b>Note :</b> Température et top-p interagissent — change-en un à la fois."
doc_creator_meta_verbosity_d = "<b>Ce que ça fait :</b> la quantité de prose que le narrateur écrit par tour. <b>Court</b> = des beats serrés et rapides ; <b>Équilibré</b> = un bon paragraphe ; <b>Bavard</b> = des scènes riches et descriptives. <b>Comment choisir :</b> Court pour de l'action nerveuse ou un rythme play-by-post, Bavard pour des sessions immersives et romanesques. <b>Effet :</b> ça change la longueur et le détail, pas ce qui se passe réellement. C'est le défaut de l'univers."

