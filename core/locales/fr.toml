# --- Memory tab integrated doc (TICKET-057 / Phase 2) ---
doc_settings_tab_memory_t = "Mémoire"
doc_settings_tab_memory = "Comment le jeu se souvient de votre histoire : recherche hybride hors ligne (Léger), ou en plus des faits distillés par l'IA qui nourrissent les tours suivants (Vivant)."
doc_settings_memory_mode_t = "Mode mémoire"
doc_settings_memory_mode = "Léger garde la mémoire entièrement hors ligne et déterministe (recherche hybride seule). Vivant demande en plus à l'IA de distiller chaque tour en faits durables rappelés plus tard. Choisi par partie."
doc_settings_memory_interval_t = "Intervalle d'extraction des faits"
doc_settings_memory_interval = "En mode Vivant, extrait les faits tous les N tours (groupés pour limiter le coût). Mettre « Manuel seulement » pour extraire à la demande avec le bouton."
doc_settings_memory_model_t = "Modèle d'extraction des faits"
doc_settings_memory_model = "Modèle optionnel plus léger/rapide utilisé seulement pour distiller les faits. Laisser vide pour réutiliser le modèle principal du jeu."
doc_settings_memory_reranker_t = "Reclassement neuronal"
doc_settings_memory_reranker = "Reclasse la recherche mémoire avec un petit cross-encoder pour un rappel plus précis. Désactivé par défaut : télécharge un modèle d'environ 90 Mo et exige un runtime natif sain."
doc_settings_extract_now_t = "Extraire la mémoire maintenant"
doc_settings_extract_now = "Distille immédiatement les tours récents en faits et réinitialise le compteur d'intervalle. Actif seulement en mode Vivant pendant une partie."

# --- Settings per-tab help (TICKET-057 enrichment / Phase 2) ---
doc_page_settings_llm_t = "Paramètres — Moteur LLM"
doc_page_settings_llm = "Cet onglet branche Axiom sur l'IA qui écrit l'histoire. Sert pour un modèle local (ex. Ollama sur http://localhost:11434/v1) ou tout serveur compatible OpenAI. Le <b>modèle principal</b> gère la narration ; <b>Extraction</b> et <b>Temps</b> sont de petits modèles auxiliaires pour les tâches de fond (analyser ton action, déduire le temps écoulé) — un tout petit modèle comme llama3.2:1b suffit. Clique <b>Tester la connexion</b> pour vérifier que le serveur répond. Pour les clouds hébergés (Gemini, Claude…), utilise plutôt l'onglet Cloud."
doc_page_settings_cloud_t = "Paramètres — Fournisseurs Cloud"
doc_page_settings_cloud = "Choisis un fournisseur hébergé (Gemini, Claude, Venice, Fireworks, OpenAI, OpenRouter) et colle sa clé API. Chaque fournisseur garde sa clé et son modèle : passer de l'un à l'autre ne perd rien. <b>Exemple :</b> choisis Fireworks, clé fw_…, modèle accounts/fireworks/models/gpt-oss-120b, puis <b>Parcourir les modèles</b>. <b>Tester la connexion</b> fait un vrai appel d'un jeton pour attraper un mauvais nom de modèle. Le modèle de repli et les requêtes/minute ne concernent que Gemini."
doc_page_settings_params_t = "Paramètres — Génération"
doc_page_settings_params = "Ces réglages façonnent COMMENT le narrateur écrit pour l'univers courant. La <b>Température</b> (0–1) est la créativité : environ 0,2 = concentré et prévisible, environ 0,8 = inventif et surprenant ; 0,6–0,8 convient à la plupart des récits. Le <b>Top-p</b> limite le vocabulaire — laisse-le vers 0,9–1,0 et règle la créativité via la Température. Change un seul à la fois : si la prose se répète, monte la Température ; si elle dérive, baisse-la. Ce sont les défauts de l'univers."
doc_page_settings_personas_t = "Paramètres — Personas"
doc_page_settings_personas = "Les personas sont des fiches de personnage enregistrées que tu peux glisser dans n'importe quelle nouvelle partie, pour ne pas réécrire ton héros préféré à chaque fois. Édite ici le nom, la description et les traits d'un modèle ; il apparaît ensuite comme choix à la création de partie. <b>Exemple :</b> un persona Détective Bourru avec une histoire et une voix figées, réutilisé dans plusieurs univers noirs."
doc_page_settings_image_t = "Paramètres — Illustration"
doc_page_settings_image = "Transforme des moments du récit en images. Choisis un backend : <b>Gemini</b> (cloud, réutilise ta clé texte — le plus simple), un serveur local <b>Stable Diffusion</b> WebUI / <b>ComfyUI</b>, ou <b>mock</b> pour tester. Règle la taille (ex. 512×512), les étapes et le guidage (CFG) pour arbitrer qualité contre vitesse. <b>Délai max par image</b> protège les machines lentes. <b>Exemple :</b> un SD WebUI local lancé avec --api → mets l'URL http://127.0.0.1:7860 et choisis stable_diffusion."
doc_page_settings_memory_t = "Paramètres — Mémoire"
doc_page_settings_memory = "Contrôle comment Axiom se souvient de ton histoire sur de longues parties. <b>Léger</b> (défaut) est totalement hors ligne et déterministe : il retrouve les moments passés pertinents par le sens et les mots-clés, sans IA ni réseau. <b>Vivant</b> demande en plus à l'IA, en tâche de fond, de distiller chaque tour en <i>faits</i> durables (par exemple : Kael a brûlé le pont de Voss pour stopper l'armée) rappelés et fournis aux tours suivants — le monde reste cohérent des centaines de tours plus tard. <b>Extraire tous les N tours</b> regroupe ce travail ; le <b>modèle d'extraction</b> permet un modèle moins cher ; le <b>reclassement neuronal</b> affine la recherche. <b>Exemple :</b> une longue campagne où un PNJ doit se souvenir d'une trahison du tour 12 → choisis Vivant."
doc_page_settings_general_t = "Paramètres — Général"
doc_page_settings_general = "Options globales de l'app, toujours affichées sous les onglets. <b>Langue</b> change toute l'interface (10 langues). <b>Intervalle du Chroniqueur</b> = à quelle fréquence, en minutes de jeu, le monde simule des événements hors champ. <b>Fragments mémoire RAG</b> = combien de passages passés nourrissent le narrateur à chaque tour (plus = meilleur rappel, plus lent). <b>Gardien du temps IA</b> dépense un appel IA de plus par tour pour un temps précis. <b>Prompt de base</b> injecte tes consignes permanentes à chaque tour (ton, règles, style)."
doc_settings_memory_mode_d = "<b>Exemple :</b> dans une campagne de 300 tours, Léger fait quand même remonter la scène où tu as rencontré le marchand quand tu reviens à sa boutique, par correspondance de mots et de sens — instantanément et hors ligne. Vivant va plus loin : il a enregistré que le joueur a insulté le marchand comme un fait, donc ce fait ressort et l'IA peut lui en garder rancune. <b>Compromis :</b> Léger ne coûte rien et n'appelle jamais le réseau ; Vivant coûte des appels IA de fond et exige une clé/un réseau. <b>Astuce :</b> le mode est par sauvegarde."
doc_settings_memory_interval_d = "<b>Ce que N veut dire :</b> avec N=5, le jeu attend que 5 nouveaux tours aient eu lieu, puis distille ces 5 tours d'un coup (un appel IA au lieu de cinq). <b>0 / Manuel seulement :</b> rien d'automatique — clique Extraire la mémoire maintenant quand tu veux un point de faits. <b>Astuce :</b> un petit N (3–5) garde les faits frais dans les scènes rapides ; un grand N (10+) économise dans les passages lents et bavards."
doc_settings_memory_reranker_d = "<b>Ce que ça fait :</b> la recherche ordinaire classe les souvenirs par un score de similarité rapide. Un cross-encoder relit chaque candidat <i>conjointement</i> avec ta situation courante et les réordonne, si bien que le souvenir vraiment pertinent passe devant un autre qui partage seulement des mots. <b>Exemple :</b> pour une requête sur le serment brisé, la recherche simple pourrait mettre en tête n'importe quel passage citant serment, tandis que le reclasseur fait remonter la scène exacte où le serment a été rompu. <b>Coût :</b> il télécharge un modèle d'environ 90 Mo et tourne localement sur le CPU, ajoutant un peu de temps par recherche ; désactivé par défaut, il se désactive proprement si le runtime natif manque."

# --- Memory: evolving beliefs (Phase 3) ---
memory_beliefs_label = "Croyances évolutives (les personnages se souviennent et révisent)"
doc_settings_memory_beliefs_t = "Croyances évolutives"
doc_settings_memory_beliefs = "En plus des faits, les distille en croyances qui évoluent dans le temps (idée de Hindsight) : un personnage garde rancune ou révise son opinion. Nécessite le mode Vivant et ajoute une passe IA de fond après l'extraction des faits. Désactivé par défaut."
doc_settings_memory_beliefs_d = "<b>Comment ça marche :</b> une passe de fond regroupe les nouveaux faits en croyances durables (observations) — le marchand en veut au joueur — qui gagnent du poids (preuves) à mesure que des faits les soutiennent, et sont révisées ou abandonnées quand des faits les contredisent. Les croyances sont fournies à l'IA avant les souvenirs bruts, donc un PNJ réagit de façon cohérente à un acte commis des centaines de tours plus tôt. <b>Coût :</b> un second appel IA de fond après l'extraction des faits. <b>Rollback sûr :</b> rembobiner un tour fait reculer les croyances avec les faits dont elles viennent."

# --- Memory: mental models (§7.8) ---
memory_mental_models_label = "Profils vivants (fiches de perso/monde curées)"
doc_settings_memory_mental_models_t = "Profils vivants"
doc_settings_memory_mental_models = "Au-dessus des croyances, condense chaque personnage (et le monde) en une courte fiche vivante que l'IA lit en premier (une idée de Hindsight). Nécessite le mode Vivant avec les croyances activées, et ajoute une passe IA de fond supplémentaire. Désactivé par défaut."
doc_settings_memory_mental_models_d = "<b>Comment ça marche :</b> après la mise à jour des croyances, une passe de fond réécrit une fiche de 2 à 4 phrases pour chaque personnage dont les croyances ont changé — qui il est désormais, ses relations, ses rancunes. Cette fiche est placée tout en haut de ce qu'on dit à l'IA, si bien que la mémoire d'une longue partie arrive comme une note de personnage cohérente plutôt qu'en faits épars. <b>Nécessite les croyances :</b> une fiche est distillée à partir des croyances, donc cela ne fonctionne qu'avec « Croyances évolutives » activé. <b>Coût :</b> un appel IA de fond de plus par personnage modifié (plafonné par tour). <b>Compatible rembobinage :</b> revenir en arrière supprime les fiches formées plus tard et régénère les autres à partir des croyances rembobinées."

# --- Character memory styles (Phase 4 B-3) ---
belief_missions_title = "Styles de mémoire des personnages"
belief_missions_placeholder = "Un par ligne — ex. Marchand : retient les affronts et les dettes"
doc_creator_meta_belief_missions_t = "Styles de mémoire des personnages"
doc_creator_meta_belief_missions = "Pour la mémoire Vivante avec croyances, indique à l'IA comment chaque personnage se souvient. Un par ligne sous la forme Nom : ce qu'il retient. Un PNJ rancunier rumine les trahisons, un marchand les dettes — chacun forme ses croyances selon sa nature."
doc_creator_meta_belief_missions_d = "<b>Ce que ça fait :</b> en mémoire Vivante avec croyances, l'IA distille les événements en croyances durables par personnage ; ce champ lui dit COMMENT chacun se souvient, pour qu'il réagisse selon sa nature. <b>Format :</b> une ligne par personnage, Nom : ce qu'il retient. <b>Exemples :</b> Marchand : retient les affronts et les dettes — Capitaine : retient les serments et qui les a tenus — Voleur : retient les proies faciles et les issues. <b>Note :</b> les noms correspondent à tes entités ; sans ligne, le personnage prend la mission par défaut de l'univers. N'affecte que le mode Vivant."

# --- Prompt caching (Phase 4 B-4) ---
memory_prompt_cache_label = "Cache de prompt (Gemini, économie de coût)"
doc_settings_memory_prompt_cache_t = "Cache de prompt"
doc_settings_memory_prompt_cache = "Met en cache le prompt système stable côté Gemini pour réduire le coût en tokens d'entrée sur les appels répétés (ex. le travail de fond faits/croyances en mode Vivant). N'aide que si le prompt est assez gros pour être éligible — sinon ne fait rien sans risque — et seulement sur le backend Gemini. Désactivé par défaut."

