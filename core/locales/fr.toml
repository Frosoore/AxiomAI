# -- pages ----------------------------------------------------------------
doc_page_hub_t = "Bibliothèque d'univers"
doc_page_hub = "L'écran d'accueil — ta bibliothèque de mondes. Chaque univers installé sur cette machine apparaît ici sous forme de carte. <b>Ce que tu peux faire :</b> créer un univers, en importer un (un paquet Axiom .axiom ou une carte de personnage SillyTavern) ou, sur une carte, Jouer, Éditer (ouvre le Creator Studio), Exporter (le partager en fichier) ou Supprimer. <b>Astuce :</b> commence par l'univers Myria fourni pour voir comment tout s'articule avant de créer le tien."
doc_page_setup_t = "Préparation de partie"
doc_page_setup = "Là où une partie se prépare avant que l'histoire commence. <b>Deux chemins :</b> reprendre une sauvegarde, ou repartir de zéro — choisir un persona (ton profil hors-personnage), définir le nom de ton personnage et la difficulté, puis répondre aux questions de l'univers. Appuie sur <b>Lancer</b> quand tu es prêt. <b>Pourquoi c'est important :</b> tes réponses sont écrites dans le tout premier tour, donc elles déterminent où et qui tu es à l'ouverture de la narration."
doc_page_tabletop_t = "Table de jeu"
doc_page_tabletop = "Le jeu lui-même. <b>Comment jouer :</b> écris ce que ton personnage fait ou dit dans la zone centrale et envoie — l'IA narre la réponse du monde, puis un moteur de règles déterministe vérifie les conséquences (santé, inventaire, argent, temps…) pour que le monde reste cohérent. <b>Autour de la table :</b> stats et inventaire à gauche, l'encyclopédie de lore cherchable à droite, l'historique des tours au milieu. <b>Exemple :</b> « je fouille le bureau à la recherche d'une clé » peut faire avancer l'horloge, révéler un objet ou changer une stat — et le monde s'en souvient au tour suivant."
doc_page_creator_t = "Creator Studio"
doc_page_creator = "Le Creator Studio — là où un univers se construit et s'édite. Le travail est organisé en onglets en haut, et <b>chaque onglet a sa propre page d'Information</b> (appuie sur Information ou F1 sur l'onglet où tu es). <b>Règle d'or :</b> rien n'est écrit tant que tu n'as pas Enregistré (Ctrl+S). <b>Par où commencer :</b> Metadata pose l'identité et le ton du monde ; Stats et Entités lui donnent de la matière ; les autres onglets (Carte, Règles, Événements, Setup, Lore, Populate, Fichiers) l'affinent et l'automatisent."
doc_page_settings_t = "Réglages"
doc_page_settings = "Réglages globaux de l'application, indépendants d'un univers. <b>Tu choisis ici :</b> quelle IA écrit l'histoire (un modèle local via Ollama / LM Studio, ou un fournisseur cloud), la génération d'illustrations optionnelle, la langue de l'interface, l'audio et l'affichage. <b>Important :</b> l'onglet de backend texte sélectionné au moment où tu appuies sur <b>Enregistrer</b> devient le backend actif — termine donc sur celui que tu veux vraiment. Utilise <b>Tester la connexion</b> pour confirmer que l'IA répond avant de jouer."
doc_page_app_t = "Fenêtre de l'application"
doc_page_app = "Le cadre autour de chaque écran. <b>Barre de menus :</b> Fichier et Aide — le tour rapide, cet annuaire de documentation et l'outil de Diagnostic se trouvent sous Aide. <b>Barre d'état</b> (en bas) : messages de progression, contrôle du volume audio et — pendant que l'IA écrit — un bouton pour annuler la génération en cours. Toujours accessibles, quel que soit l'écran."

