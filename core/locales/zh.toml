# TICKET-057 — doc enrichment (Studio sub-pages + details)
doc_page_creator_meta_t = "Studio · Metadata"
doc_page_creator_meta = "世界的身份与全局行为。<b>这里有什么：</b>叙述者始终记住的背景设定、可选的系统提示覆盖、新游戏的开场场景、伙伴模式，以及调校叙事的旋钮（张力、温度、top-p、详尽度）。<b>怎么用：</b>先写世界设定（它锚定一切），用张力定下氛围，然后让 AI 旋钮保持默认，除非叙事不对味。按“信息”查看每个字段的细节。"
doc_page_creator_stats_t = "Studio · 属性"
doc_page_creator_stats = "定义实体可携带的属性——生命、金币、声望，凡你所创。<b>每项属性：</b>一个名称、一个默认起始值，以及可选的最小/最大上下限。<b>为何重要：</b>属性正是规则引擎与叙述者所推理的对象——这里定义的属性能被故事改变、被规则检查。<b>示例：</b>定义“金币”（最小 0），世界便能向你收取住宿费；定义“生命”（0–100），规则标签页便能让 0 代表死亡。<b>注意：</b>新角色的每项已定义属性都从其默认值开始。"
doc_page_creator_entities_t = "Studio · 实体"
doc_page_creator_entities = "你世界的角色与物件：角色（NPC）、阵营、物品与值得一提的事物。<b>每个实体：</b>一个 id、一个名称、一个类型、一段叙述者会读的描述，以及它自己的属性。<b>怎么用：</b>给重要 NPC 几项属性和一段鲜明描述——这正是让他们在长篇战役中保持一致的关键。<b>示例：</b>一位有生动描述与“脾性”属性的酒馆老板，每次故事回到他身上都会表现一致。你也可以在 Populate 标签页生成实体。"
doc_page_creator_map_t = "Studio · 地图"
doc_page_creator_map = "你世界的地点及其连接。<b>你定义：</b>地点（带一个尺度——地区、城市、兴趣点——和一个父级）以及它们之间的连接。<b>为何重要：</b>叙述者用地图保持地理与旅行一致，游戏时钟也能借连接估算路程时长。<b>怎么用：</b>先勾勒大地点（一个国家及其城市），再加入对游戏重要的道路与房间。Populate 可生成一张起始地图。"
doc_page_creator_rules_t = "Studio · 规则"
doc_page_creator_rules = "引擎每回合执行的确定性规则——这正是在 AI 自由叙事时让世界保持诚实的所在。<b>规则如何运作：</b>当一个实体的属性改变时，会检查该规则的条件；若成立，其动作便触发（改变属性、设置状态……）。<b>每条规则有</b>一个优先级、一个目标（某个实体或代表全部的“*”）、条件与动作。<b>示例：</b>“若 生命 ≤ 0 → 设置 状态 = 致命重伤”，无论文字怎么说都让死亡生效。<b>提示：</b>缺失的属性读作 0，所以对只想作用于真正拥有该属性的实体的效果，宜用“≥”阈值。"
doc_page_creator_events_t = "Studio · 事件"
doc_page_creator_events = "在选定的游戏时间触发的预定事件，与玩家所为无关。<b>你设定：</b>事件何时发生（以游戏时间计）以及它对叙事做什么或发出什么信号。<b>为何重要：</b>事件让世界按时钟前进——商队抵达、期限到期、风暴来袭——使背景显得鲜活，而非等你。<b>示例：</b>安排“炮兵物资在第 3 天抵达码头”，无论你是否留意，世界都会到达那一刻。"
doc_page_creator_setup_t = "Studio · 起始问题"
doc_page_creator_setup = "玩家在本宇宙开始新游戏时回答的问题。<b>你定义：</b>每个问题、其类型（单选、多选或自由文本）及其选项。<b>为何重要：</b>答案被注入开场回合，因此决定玩家是谁、从何处开始。<b>示例：</b>一个“你从何而来？”的选择可设定起始地区并为第一幕染色。少而有韵味——三个好问题胜过十个平淡的。"
doc_page_creator_lore_t = "Studio · Lore Book"
doc_page_creator_lore = "世界的百科：可搜索的设定条目，叙述者按需取用（检索增强记忆）。<b>你添加：</b>关于历史、阵营、魔法、地点的文章——每篇配关键词。<b>为何重要：</b>与始终生效的世界设定（Metadata）不同，这些只在相关时取用，因此你可存储海量背景而不臃肿每次提示。<b>怎么用：</b>每个主题一篇聚焦条目；引擎会按场景调出合适的。Populate 可起草条目。"
doc_page_creator_populate_t = "Studio · Populate"
doc_page_creator_populate = "AI 辅助创作：让模型生成你宇宙的部分内容。<b>它能做什么：</b>依据你世界的前提创建实体、地点、设定条目等，并附预览与差异（diff），让你在写入前批准每项更改。<b>怎么用：</b>先写好扎实的世界设定（Populate 以此为基），分小批定向生成，查看差异，再保存你喜欢的。<b>为何重要：</b>它能在几分钟内把空白宇宙变为可玩——一个你随后手动打磨的起点。"
doc_page_creator_files_t = "Studio · 文件"
doc_page_creator_files = "你宇宙的原始来源，以文本形式存在。Axiom 以 <b>Universe-as-Code</b> 存储世界：可读的 TOML/Markdown 文件，编译为数据库。<b>你可以：</b>直接打开并编辑这些源文件，并将旧的扁平数据库转换为源代码树。<b>为何重要：</b>因为宇宙是纯文本，你可用 Git 进行版本管理、做差异比较，并像代码一样分享。<b>进阶：</b>其他标签页所做的一切最终都落在这些文件里——这是直接视图。"
doc_creator_meta_world_lore_d = "<b>作用：</b>这段文本会在每个回合前置到叙述者的上下文里，因此是世界的永久记忆。<b>放这里：</b>基调、大历史、魔法/科技的规则，以及绝不可违背的真相。<b>不要放：</b>冗长的百科细节——那应放进 Lore Book（按需取用），让此处保持精简。<b>示例：</b>“诸神已死且被遗忘；魔法像肌肉一样消耗施法者；如今是 5281 年。”<b>效果：</b>每个场景都会遵守这些事实，无需你重复。"
doc_creator_meta_description_d = "<b>作用：</b>面向用户的宇宙描述。<b>重要性：</b>对AI叙事者没有影响，但在开始新游戏之前，帮助用户了解此宇宙的设定、主题或概念。"
doc_creator_meta_system_prompt_d = "<b>作用：</b>替换本宇宙叙述者的内置指令——最深层、最进阶的覆盖。<b>何时用：</b>仅当你要根本不同的叙事行为（特定格式、不寻常的口吻或规则）。<b>警告：</b>默认提示已处理状态、工具与一致性；草率的覆盖可能破坏它们。<b>建议：</b>先留空，通过世界设定与旋钮来引导世界；只有在别无他法时才动用它。"
doc_creator_meta_first_message_d = "<b>作用：</b>在此开始全新游戏时显示的开场叙述——拉开帷幕。<b>放这里：</b>一段定下氛围、把玩家投入可作反应之情境的场景。<b>怎么用：</b>以一个小钩子收尾（敲门声、一个抉择），让玩家的第一步有着力点。<b>注意：</b>仅在开局显示一次；继续的存档保留各自的历史。<b>示例：</b>黎明时分多雨的码头，一名陌生人把封口的信推过桌面。"
doc_creator_meta_companion_d = "<b>作用：</b>伙伴模式让 Axiom 成为某个选定主英雄的副驾——AI 帮助驾驭该角色，而非运行纯开放沙盒。<b>怎么用：</b>勾选启用，然后选择体验所围绕的英雄实体。<b>为何用：</b>适合以单一主角为中心的引导式故事。<b>保持关闭</b>则是经典的“你就是玩家，随你所为”。"
doc_creator_meta_tension_d = "<b>作用：</b>一个 0.0–1.0 的旋钮，告诉叙述者世界该有多戏剧化。<b>0.0</b>＝平静的日常；<b>1.0</b>＝危机四伏、利害攸关。<b>效果：</b>它影响麻烦找上玩家的频率以及场景的张力——改变氛围，而非规则。<b>示例：</b>温馨的乡村谜案约在 0.2，濒临战争的城市约在 0.7。<b>提示：</b>它也喂给幕后的 Chronicler，所以紧张的世界在你离开时会更多事地演化。"
doc_creator_meta_llm_temp_d = "<b>作用：</b>本宇宙 AI 的创造力，0.0 到 1.0。<b>低</b>（≈0.2）＝专注、可预测、循规蹈矩；<b>高</b>（≈0.8）＝富创意、出人意料、偶尔天马行空。<b>怎么调：</b>若叙事重复，调高；若离题或自相矛盾，调低。<b>建议：</b>0.6–0.8 适合大多数叙事。这设定宇宙默认值；当某宇宙未设定时采用设置里的全局值。"
doc_creator_meta_llm_top_p_d = "<b>作用：</b>核采样——另一个创造力控制，限制 AI 取用多少词汇（0.0–1.0）。<b>高</b>（≈0.95）＝完整而多样的调色板；<b>低</b>（≈0.5）＝只用最可能的词，即更平实、保守的文风。<b>怎么用：</b>通常保持在 0.9–1.0 附近，用温度来塑造创造力；仅当文字过散时才调低。<b>注意：</b>温度与 top-p 相互作用——一次只改一个。"
doc_creator_meta_verbosity_d = "<b>作用：</b>叙述者每回合写多少文字。<b>简短</b>＝紧凑、节奏快的片段；<b>均衡</b>＝一段扎实的文字；<b>健谈</b>＝丰富、描写性的场景。<b>怎么选：</b>简短适合利落的动作或论坛接力节奏，健谈适合沉浸、小说式的会话。<b>效果：</b>改变长度与细节，而非实际发生之事。这是宇宙的默认值。"

