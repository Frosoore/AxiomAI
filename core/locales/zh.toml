# -- pages ----------------------------------------------------------------
doc_page_hub_t = "宇宙库"
doc_page_hub = "主屏幕——你的世界库。本机安装的每个宇宙都在此以卡片形式显示。<b>你可以：</b>新建宇宙、导入宇宙（Axiom 的 .axiom 包或 SillyTavern 角色卡），或在任意卡片上进行游玩、编辑（打开 Creator Studio）、导出（作为文件分享）或删除。<b>提示：</b>先从内置的 Myria 宇宙开始，了解各部分如何衔接，再构建你自己的。"
doc_page_setup_t = "游戏准备"
doc_page_setup = "在故事开始前准备一局游戏的地方。<b>两条路：</b>继续已有存档，或全新开始——选择一个 persona（你的出戏档案），设定角色名字与难度，并回答宇宙的故事问题。准备好后按 <b>启动</b>。<b>为何重要：</b>你的回答会写入第一回合，因此决定叙事开场时你身处何地、是谁。"
doc_page_tabletop_t = "游戏桌面"
doc_page_tabletop = "游戏本身。<b>怎么玩：</b>在中间框里写下你的角色做什么或说什么并发送——AI 叙述世界的回应，随后一个确定性的规则引擎核对后果（生命、物品栏、金钱、时间……），让世界保持一致。<b>桌面四周：</b>属性与物品栏在左，可搜索的设定百科在右，回合历史在中间。<b>示例：</b>“我搜查书桌找钥匙”可能推进时钟、揭示一件物品或改变一项属性——下一回合世界会记得。"
doc_page_creator_t = "Creator Studio"
doc_page_creator = "Creator Studio——构建与编辑宇宙的地方。工作按顶部的标签页组织，<b>每个标签页都有自己的信息页</b>（在你所在的标签页上按“信息”或 F1）。<b>黄金法则：</b>不保存（Ctrl+S）就什么都不会写入。<b>从哪开始：</b>Metadata 设定世界的身份与基调；Stats 与实体赋予其实质；其余标签页（地图、规则、事件、Setup、Lore、Populate、文件）对其细化与自动化。"
doc_page_settings_t = "设置"
doc_page_settings = "全应用范围的偏好，不绑定某个宇宙。<b>在此选择：</b>由哪个 AI 写故事（通过 Ollama / LM Studio 的本地模型，或云端提供商）、可选的插图生成、界面语言、音频与显示。<b>重要：</b>按 <b>保存</b> 时所选中的文本后端标签会成为当前后端——所以请停在你真正想用的那一个。游玩前用 <b>测试连接</b> 确认 AI 能回应。"
doc_page_app_t = "应用窗口"
doc_page_app = "围绕每个屏幕的框架。<b>菜单栏：</b>文件与帮助——快速导览、本文档目录和诊断工具都在帮助下。<b>状态栏</b>（底部）：进度消息、音量控制，以及——当 AI 正在写作时——取消当前生成的按钮。无论在哪个屏幕都始终可用。"

