# --- Settings per-tab help (TICKET-057 enrichment / Phase 2) ---
doc_page_settings_llm_t = "设置 — LLM 后端"
doc_page_settings_llm = "此选项卡把 Axiom 指向编写故事的 AI。用于本地模型（如 http://localhost:11434/v1 的 Ollama）或任何兼容 OpenAI 的服务器。<b>主模型</b>负责叙事；<b>提取</b>和<b>时间</b>是用于后台任务（解析你的动作、推断流逝时间）的小型辅助模型——像 llama3.2:1b 这样的小模型就够了。点击<b>测试连接</b>确认服务器有响应。托管云（Gemini、Claude……）请用云选项卡。"
doc_page_settings_cloud_t = "设置 — 云服务商"
doc_page_settings_cloud = "选择一个托管服务商（Gemini、Claude、Venice、Fireworks、OpenAI、OpenRouter）并粘贴其 API 密钥。每个服务商各自保存密钥与模型，来回切换不会丢失。<b>示例：</b>选 Fireworks，密钥 fw_…，模型 accounts/fireworks/models/gpt-oss-120b，再点<b>浏览模型</b>。<b>测试连接</b>会发起一次真实的单 token 调用以捕捉错误的模型名。回退模型与每分钟请求仅对 Gemini 有效。"
doc_page_settings_params_t = "设置 — 生成"
doc_page_settings_params = "这些塑造叙述者为当前宇宙书写的<b>方式</b>。<b>温度</b>（0–1）即创造力：约 0.2 = 专注且可预测，约 0.8 = 富有创意且出人意料；0.6–0.8 适合大多数故事。<b>Top-p</b> 限制用词范围——通常保持在 0.9–1.0，用温度来调创造力。一次只改一个：若文字重复就提高温度；若跑题就降低。这些是宇宙的默认值。"
doc_page_settings_personas_t = "设置 — 角色档案"
doc_page_settings_personas = "角色档案是已保存的人物卡，可放入任何新游戏，免得每次重写你最爱的英雄。在此编辑模板的名称、描述和特征；它随后会在游戏设置时作为可选项出现。<b>示例：</b>一个有固定背景与口吻的“老练侦探”档案，在多个黑色宇宙中复用。"
doc_page_settings_image_t = "设置 — 插图"
doc_page_settings_image = "把叙事时刻变成图片。选择后端：<b>Gemini</b>（云，复用你的文本密钥——最简单）、本地 <b>Stable Diffusion</b> WebUI / <b>ComfyUI</b> 服务器，或用于测试的 <b>mock</b>。设置尺寸（如 512×512）、步数和引导（CFG）以在质量与速度间权衡。<b>每张图最大延时</b>保护慢机器。<b>示例：</b>以 --api 启动的本地 SD WebUI → URL 设为 http://127.0.0.1:7860 并选 stable_diffusion。"
doc_page_settings_memory_t = "设置 — 记忆"
doc_page_settings_memory = "控制 Axiom 在长会话中如何回忆你的故事。<b>轻量</b>（默认）完全离线且确定：按含义与关键词找到相关的过去时刻，无 AI、无网络。<b>活跃</b>还会在后台让 AI 把每个回合提炼为持久<i>事实</i>（例如：Kael 烧毁 Voss 的桥以阻止军队），在日后回合被回忆并供给——世界在数百回合后仍保持一致。<b>每 N 回合提取</b>会批量处理；<b>提取模型</b>可用更便宜的模型；<b>神经重排序</b>让搜索更精准。<b>示例：</b>一场长战役里，NPC 应记得第 12 回合的背叛 → 选活跃。"
doc_page_settings_general_t = "设置 — 通用"
doc_page_settings_general = "应用级选项，始终显示在选项卡下方。<b>语言</b>切换整个界面（10 种语言）。<b>编年史间隔</b>＝世界每隔多少游戏分钟模拟一次幕后事件。<b>RAG 记忆片段</b>＝每回合有多少过去段落供给叙述者（越多回忆越好，但更慢）。<b>AI 计时员</b>每回合多花一次 AI 调用以获得精确时间。<b>基础提示词</b>把你的常驻指令注入每个回合（语气、规则、风格）。"
doc_settings_memory_mode_d = "<b>示例：</b>在 300 回合的战役中，当你回到商人的店铺时，轻量仍能通过词语与含义匹配浮现你们初遇的场景——即时且离线。活跃更进一步：它把“玩家侮辱了商人”记录为事实，于是该事实重现，AI 可让他怀恨在心。<b>权衡：</b>轻量零成本且从不联网；活跃需要后台 AI 调用并需密钥/网络。<b>提示：</b>该模式按存档设定。"
doc_settings_memory_interval_d = "<b>N 的含义：</b>当 N=5 时，游戏会等到发生 5 个新回合，然后一次性提炼这 5 个回合（一次 AI 调用而非五次）。<b>0 / 仅手动：</b>不自动进行——当你想要一个事实检查点时按“立即提取记忆”。<b>提示：</b>较小的 N（3–5）在快节奏多事的场景中保持事实新鲜；较大的 N（10+）在缓慢多对话的段落中节省成本。"
doc_settings_memory_reranker_d = "<b>作用：</b>普通搜索按快速相似度分数对记忆排序。交叉编码器会把每个候选<i>连同</i>你当前的处境一起重读并重新排序，于是真正切题的记忆会超过只是共享词语的记忆。<b>示例：</b>对“破碎的誓言”的查询，普通搜索可能把任何提到“誓言”的段落排在前面，而重排序会提升誓言被打破的那一幕。<b>成本：</b>它会下载约 90 MB 的模型并在本地 CPU 运行，每次搜索增加少许时间；默认关闭，若缺少本地运行环境会安全地自行停用。"

# --- Memory: evolving beliefs (Phase 3) ---
memory_beliefs_label = "演化的信念（角色会记住并修正）"
doc_settings_memory_beliefs_t = "演化的信念"
doc_settings_memory_beliefs = "在事实之上，将其提炼为随时间演化的信念（Hindsight 的理念）：角色会怀恨在心或修正看法。需要活跃模式，并在事实提取后再增加一次后台 AI 处理。默认关闭。"
doc_settings_memory_beliefs_d = "<b>原理：</b>一次后台处理会把新事实归并为持久的信念（观察）——商人怀恨玩家——随着更多事实支持而增加权重（证据），当事实相抵触时被修正或丢弃。信念会先于原始记忆提供给 AI，因此 NPC 能对你数百回合前的行为作出一致反应。<b>成本：</b>事实提取后再进行一次后台 AI 调用。<b>回退安全：</b>回退某回合会连同信念所依据的事实一起回滚。"

# --- Memory: mental models (§7.8) ---
memory_mental_models_label = "动态档案（精选的角色/世界笔记）"
doc_settings_memory_mental_models_t = "动态档案"
doc_settings_memory_mental_models = "在信念之上，将每个角色（以及世界）浓缩成一份简短的动态档案，AI 会优先阅读（源自 Hindsight 的理念）。需要开启「活跃」模式并启用信念，并会额外增加一次后台 AI 处理。默认关闭。"
doc_settings_memory_mental_models_d = "<b>工作原理：</b>信念更新后，后台处理会为每个信念发生变化的角色重写一份 2 至 4 句的档案——他现在是谁、他的关系和恩怨。这份档案位于告知 AI 的内容的最前面，因此长期战役的记忆会以连贯的角色笔记呈现，而不是零散的事实。<b>需要信念：</b>档案是从信念中提炼出来的，因此仅在启用「演化信念」时有效。<b>成本：</b>每个发生变化的角色额外一次后台 AI 调用（每回合有上限）。<b>回溯安全：</b>回溯会删除之后形成的档案，并根据回溯后的信念重新生成其余档案。"

# --- Character memory styles (Phase 4 B-3) ---
belief_missions_title = "角色记忆风格"
belief_missions_placeholder = "每行一个——例如 商人：记住怠慢与欠债"
doc_creator_meta_belief_missions_t = "角色记忆风格"
doc_creator_meta_belief_missions = "在开启信念的活跃记忆下，告诉 AI 每个角色如何记忆。每行一个，形式为 名字：他倾向记住什么。记仇的 NPC 念念不忘背叛，商人在意欠债——于是各自按性格形成信念。"
doc_creator_meta_belief_missions_d = "<b>作用：</b>在开启信念的活跃记忆下，AI 会把事件提炼为每个角色的持久信念；此字段告诉它每个角色如何记忆，使其符合性格地反应。<b>格式：</b>每个角色一行，名字：倾向记住什么。<b>示例：</b>商人：记住怠慢与欠债——队长：记住誓言以及谁守住了——盗贼：记住易得目标与逃路。<b>注意：</b>名字需与你的实体一致；没有该行的角色使用宇宙默认值。仅影响活跃模式。"

# --- Prompt caching (Phase 4 B-4) ---
memory_prompt_cache_label = "提示词缓存（Gemini，省成本）"
doc_settings_memory_prompt_cache_t = "提示词缓存"
doc_settings_memory_prompt_cache = "在 Gemini 上缓存稳定的系统提示词，以降低重复调用的输入 token 成本（例如活跃模式下事实/信念的后台处理）。仅当提示词足够大时才有效——否则安全地不作任何事——且仅适用于 Gemini 后端。默认关闭。"

