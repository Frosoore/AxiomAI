doc_setup_add_persona_t = "Добавить персону"
doc_setup_add_persona = "Создаёт новую персону (имя + описание), хранится глобально и пригодна для любой вселенной."
doc_setup_player_name_t = "Имя персонажа"
doc_setup_player_name = "Имя вашего персонажа в этой новой игре. Оно же служит именем сохранения."
doc_setup_difficulty_t = "Сложность"
doc_setup_difficulty = "Обычная: стандартная игра. Хардкор: смерть необратима — при гибели сохранение удаляется. Спутник: историю ведёт герой-ИИ, а вы играете его спутника (только во вселенных, где это включено)."
doc_setup_tab_story_t = "Вкладка «Настройка»"
doc_setup_tab_story = "Вопросы, заданные создателем вселенной (стартовое место, фракция...). Ваши ответы вплетаются в вступительное повествование новой игры."
doc_setup_launch_t = "Запустить сессию"
doc_setup_launch = "Запускает игру: продолжает сохранение, выбранное на вкладке «Сохранения», либо создаёт новую игру с вашей персоной, именем, сложностью и ответами."
doc_setup_back_t = "Назад в библиотеку"
doc_setup_back = "Возвращает в библиотеку вселенных без запуска игры."

# -- tabletop ---------------------------------------------------------------
doc_tabletop_turn_time_t = "Сессия, ход и часы"
doc_tabletop_turn_time = "Показывает активное сохранение, номер текущего хода и внутриигровые дату и время. Часы мира идут вперёд по мере развития истории."
doc_tabletop_player_selector_t = "Активный игрок"
doc_tabletop_player_selector = "Если во вселенной несколько персонажей-игроков, выбирает, от чьего лица будет ваше следующее сообщение."
