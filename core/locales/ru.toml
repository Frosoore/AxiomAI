doc_tabletop_chat_input_t = "Ввод действия"
doc_tabletop_chat_input = "Напишите, что говорит или делает ваш персонаж, и нажмите Enter (Shift+Enter — новая строка)."
doc_tabletop_send_t = "Отправить"
doc_tabletop_send = "Отправляет ваше действие рассказчику (то же, что Enter)."
