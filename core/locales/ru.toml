doc_page_hub_t = "Библиотека вселенных"
doc_page_hub = "Главный экран — твоя библиотека миров. Каждая установленная на этой машине вселенная показана здесь карточкой. <b>Что можно сделать:</b> создать новую вселенную, импортировать (пакет Axiom .axiom или карточку персонажа SillyTavern) или на любой карточке: Играть, Редактировать (откроет Creator Studio), Экспортировать (поделиться файлом) или Удалить. <b>Совет:</b> начни с прилагаемой вселенной Myria, чтобы увидеть, как всё устроено, прежде чем строить свою."
doc_page_setup_t = "Подготовка игры"
doc_page_setup = "Где готовится сессия до начала истории. <b>Два пути:</b> продолжить сохранение или начать заново — выбрать персону (твой профиль вне роли), задать имя персонажа и сложность и ответить на вопросы вселенной. Нажми <b>Запустить</b>, когда будешь готов. <b>Почему это важно:</b> твои ответы вписываются в самый первый ход, поэтому они задают, где и кто ты в начале повествования."
doc_page_tabletop_t = "Игровой стол"
doc_page_tabletop = "Сама игра. <b>Как играть:</b> напиши в центральном поле, что делает или говорит твой персонаж, и отправь — ИИ опишет ответ мира, затем детерминированный движок правил проверит последствия (здоровье, инвентарь, деньги, время…), чтобы мир оставался согласованным. <b>За столом:</b> характеристики и инвентарь слева, искомая энциклопедия лора справа, история ходов посередине. <b>Пример:</b> 'обыскиваю стол в поисках ключа' может продвинуть часы, открыть предмет или изменить характеристику — и мир запомнит это к следующему ходу."
doc_page_creator_t = "Creator Studio"
doc_page_creator = "Creator Studio — где вселенная создаётся и редактируется. Работа разбита на вкладки сверху, и <b>у каждой вкладки своя страница Информации</b> (нажми Информация или F1 на той вкладке, где ты находишься). <b>Золотое правило:</b> ничего не записывается, пока не Сохранишь (Ctrl+S). <b>С чего начать:</b> Metadata задаёт личность и тон мира; Stats и Сущности придают ему плоть; остальные вкладки (Карта, Правила, События, Setup, Lore, Populate, Файлы) уточняют и автоматизируют его."
doc_page_settings_t = "Настройки"
doc_page_settings = "Настройки всего приложения, не привязанные к одной вселенной. <b>Здесь ты выбираешь:</b> какой ИИ пишет историю (локальная модель через Ollama / LM Studio или облачный провайдер), необязательную генерацию иллюстраций, язык интерфейса, звук и экран. <b>Важно:</b> вкладка текстового бэкенда, выбранная при нажатии <b>Сохранить</b>, становится активным бэкендом — заканчивай на той, что действительно нужна. Используй <b>Проверить подключение</b>, чтобы убедиться, что ИИ отвечает, до игры."
doc_page_app_t = "Окно приложения"
doc_page_app = "Рамка вокруг каждого экрана. <b>Строка меню:</b> Файл и Справка — быстрый тур, этот каталог документации и инструмент Диагностики находятся в Справке. <b>Строка состояния</b> (внизу): сообщения о ходе, регулятор громкости и — пока ИИ пишет — кнопка отмены текущей генерации. Всегда доступны, на любом экране."

