doc_tabletop_rewind = "Путешествие назад во времени: выберите прошлый ход — и всё состояние мира восстановится в точности (Ctrl+Z)."
doc_tabletop_back_t = "Назад в библиотеку"
doc_tabletop_back = "Покидает стол и возвращает в библиотеку. Прогресс уже сохранён после каждого хода — ничего не теряется."
doc_tabletop_sidebar_stats_t = "Панель характеристик"
doc_tabletop_sidebar_stats = "Живой лист каждой отслеживаемой сущности: характеристики обновляются автоматически после каждого хода."
doc_tabletop_sidebar_inventory_t = "Панель инвентаря"
doc_tabletop_sidebar_inventory = "Предметы каждой сущности, обновляются по ходу истории."
doc_tabletop_sidebar_timeline_t = "Панель хроники"
doc_tabletop_sidebar_timeline = "Хроника заметных событий мира с внутриигровым временем, когда они произошли."
