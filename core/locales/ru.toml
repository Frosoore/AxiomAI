# TICKET-057 — doc enrichment (Studio sub-pages + details)
doc_page_creator_meta_t = "Studio · Metadata"
doc_page_creator_meta = "Личность и общее поведение мира. <b>Что здесь живёт:</b> фоновый лор, который рассказчик всегда помнит, необязательная замена системного промпта, открывающая сцена новой игры, режим Спутника и регуляторы, настраивающие повествование (напряжение, температура, top-p, многословность). <b>Как использовать:</b> сначала напиши Лор мира (он всё закрепляет), задай настроение Напряжением, затем оставь регуляторы ИИ по умолчанию, если повествование не звучит фальшиво. Нажми Информация для деталей по каждому полю."
doc_page_creator_stats_t = "Studio · Stats"
doc_page_creator_stats = "Задаёт характеристики, которые могут нести сущности — Здоровье, Монеты, Репутация, что угодно. <b>Для каждой характеристики:</b> имя, стартовое значение по умолчанию и необязательные границы мин/макс. <b>Почему важно:</b> о характеристиках рассуждают движок правил и рассказчик — заданную здесь характеристику может менять история и проверять правила. <b>Пример:</b> задай 'Монеты' (мин 0), и мир сможет брать с тебя плату за комнату; задай 'Здоровье' (0–100), и вкладка Правила сможет сделать 0 смертью. <b>Примечание:</b> новые персонажи начинают каждую заданную характеристику с её значения по умолчанию."
doc_page_creator_entities_t = "Studio · Сущности"
doc_page_creator_entities = "Действующие лица и предметы твоего мира: персонажи (NPC), фракции, предметы и заметные вещи. <b>Для каждой сущности:</b> id, имя, тип, описание, которое читает рассказчик, и собственные характеристики. <b>Как использовать:</b> дай важным NPC несколько характеристик и чёткое описание — это держит их согласованными в долгой кампании. <b>Пример:</b> трактирщик с ярким описанием и характеристикой 'Нрав' ведёт себя одинаково каждый раз, когда история к нему возвращается. Сущности можно генерировать и на вкладке Populate."
doc_page_creator_map_t = "Studio · Карта"
doc_page_creator_map = "Места твоего мира и как они связаны. <b>Что ты задаёшь:</b> локации (с масштабом — регион, город, точка интереса — и родителем) и связи между ними. <b>Почему важно:</b> рассказчик использует карту, чтобы держать географию и перемещения согласованными, а игровые часы могут по связям оценивать длительность пути. <b>Как использовать:</b> сначала набросай крупные места (страну, её города), затем добавь дороги и комнаты, важные для игры. Populate может сгенерировать стартовую карту."
doc_page_creator_rules_t = "Studio · Правила"
doc_page_creator_rules = "Детерминированные правила, которые движок применяет каждый ход — именно это держит мир честным, пока ИИ свободно повествует. <b>Как работает правило:</b> когда характеристики сущности меняются, проверяются условия правила; если они выполняются, срабатывают его действия (изменить характеристику, установить статус…). <b>У каждого правила есть</b> приоритет, цель (одна сущность или '*' для всех), условия и действия. <b>Пример:</b> 'если Здоровье ≤ 0 → установить Состояние = Смертельно ранен' делает смерть обязательной, что бы ни говорила проза. <b>Совет:</b> отсутствующая характеристика читается как 0, поэтому для эффектов, нужных только сущностям с этой характеристикой, предпочитай пороги '≥'."
doc_page_creator_events_t = "Studio · События"
doc_page_creator_events = "Запланированные события, срабатывающие в выбранное игровое время, независимо от действий игрока. <b>Что ты задаёшь:</b> когда событие происходит (в игровом времени) и что оно делает или сообщает повествованию. <b>Почему важно:</b> события двигают мир по часам — прибывает караван, истекает срок, бьёт буря — так мир кажется живым, а не ждёт тебя. <b>Пример:</b> запланируй 'груз артиллерии прибывает в доки на день 3', и мир дойдёт до этого момента, следил ты за ним или нет."
doc_page_creator_setup_t = "Studio · Стартовые вопросы"
doc_page_creator_setup = "Вопросы, на которые игрок отвечает, начиная игру в этой вселенной. <b>Что ты задаёшь:</b> каждый вопрос, его тип (один выбор, несколько выборов или свободный текст) и его варианты. <b>Почему важно:</b> ответы вписываются в открывающий ход, поэтому решают, кто игрок и где он начинает. <b>Пример:</b> выбор 'Откуда ты?' может задать стартовый регион и окрасить первую сцену. Держи их немногими и образными — три хороших вопроса лучше десяти пресных."
doc_page_creator_lore_t = "Studio · Lore Book"
doc_page_creator_lore = "Энциклопедия мира: искомые статьи лора, которые рассказчик подтягивает по требованию (память с дополнением через поиск). <b>Что ты добавляешь:</b> статьи об истории, фракциях, магии, местах — каждую с ключевыми словами. <b>Почему важно:</b> в отличие от всегда активного Лора мира (Metadata), эти подтягиваются только при уместности, так что можно хранить огромный фон, не раздувая каждый промпт. <b>Как использовать:</b> одна сфокусированная статья на тему; движок выводит нужные под сцену. Populate может набросать статьи."
doc_page_creator_populate_t = "Studio · Populate"
doc_page_creator_populate = "Создание с помощью ИИ: пусть модель сгенерирует части твоей вселенной. <b>Что делает:</b> создаёт сущности, локации, статьи лора и прочее из предпосылки твоего мира, с предпросмотром и диффом, чтобы ты одобрял каждое изменение до записи. <b>Как использовать:</b> сначала напиши крепкий Лор мира (Populate опирается на него), генерируй маленькими целевыми партиями, просматривай дифф и сохраняй понравившееся. <b>Почему важно:</b> превращает пустую вселенную в играбельную за минуты — отправную точку, которую ты затем дорабатываешь вручную."
doc_page_creator_files_t = "Studio · Файлы"
doc_page_creator_files = "Сырой исходник твоей вселенной, текстом. Axiom хранит миры как <b>Universe-as-Code</b>: читаемые файлы TOML/Markdown, компилируемые в базу данных. <b>Что можно сделать:</b> открывать и редактировать эти исходные файлы напрямую и преобразовывать старую плоскую базу в дерево исходников. <b>Почему важно:</b> поскольку вселенная — это обычный текст, её можно версионировать в Git, сравнивать и делиться как кодом. <b>Для продвинутых:</b> всё, что делают другие вкладки, оказывается в этих файлах — это прямой вид."
doc_creator_meta_world_lore_d = "<b>Что делает:</b> этот текст добавляется в контекст рассказчика каждый ход, поэтому это постоянная память мира. <b>Сюда:</b> тон, большая история, правила магии/техники и истины, которым нельзя противоречить. <b>Не сюда:</b> длинные энциклопедические детали — им место в Lore Book (подтягивается по требованию), чтобы это поле оставалось лёгким. <b>Пример:</b> 'Боги мертвы и забыты; магия утомляет заклинателя, как мышцу; идёт 5281 год.' <b>Эффект:</b> каждая сцена соблюдает эти факты без твоих повторов."
doc_creator_meta_system_prompt_d = "<b>Что делает:</b> заменяет встроенные инструкции рассказчика для этой вселенной — самая глубокая, продвинутая замена. <b>Когда использовать:</b> только для принципиально иного поведения повествования (особый формат, необычный голос или правила). <b>Предупреждение:</b> промпт по умолчанию уже управляет состоянием, инструментами и согласованностью; небрежная замена может их сломать. <b>Рекомендация:</b> оставь его пустым и сначала направляй мир через Лор и регуляторы; берись за это, только когда ничто иное не даёт нужного поведения."
doc_creator_meta_first_message_d = "<b>Что делает:</b> открывающее повествование, показываемое в начале новой игры здесь — поднятие занавеса. <b>Сюда:</b> сцена, задающая настроение и помещающая игрока в ситуацию, на которую можно реагировать. <b>Как использовать:</b> заканчивай небольшим крючком (стук в дверь, выбор), чтобы первое действие игрока имело опору. <b>Примечание:</b> показывается один раз при старте; продолженные сохранения хранят свою историю. <b>Пример:</b> дождливый причал на рассвете, незнакомец двигает по столу запечатанное письмо."
doc_creator_meta_companion_d = "<b>Что делает:</b> режим Спутника превращает Axiom в со-пилота для выбранного главного Героя — ИИ помогает вести этого персонажа, а не запускает чистую открытую песочницу. <b>Как использовать:</b> отметь Включить, затем выбери сущность-Героя, вокруг которой строится опыт. <b>Зачем:</b> идеально для направляемой истории, сосредоточенной на единственном протагонисте. <b>Оставь выключенным</b> для классики 'ты игрок, делай что хочешь'."
doc_creator_meta_tension_d = "<b>Что делает:</b> регулятор 0.0–1.0, говорящий рассказчику, насколько драматичным должен ощущаться мир. <b>0.0</b> = спокойная повседневность; <b>1.0</b> = постоянная опасность и высокие ставки. <b>Эффект:</b> окрашивает, как часто беда находит игрока и насколько заряжены сцены — меняет настроение, не правила. <b>Пример:</b> уютная деревенская загадка около 0.2, город на грани войны около 0.7. <b>Совет:</b> он также питает закадрового Chronicler, поэтому напряжённый мир развивается насыщеннее, пока тебя нет."
doc_creator_meta_llm_temp_d = "<b>Что делает:</b> креативность ИИ для этой вселенной, от 0.0 до 1.0. <b>Низкая</b> (≈0.2) = сосредоточенно, предсказуемо, по рельсам; <b>высокая</b> (≈0.8) = изобретательно, неожиданно, иногда чудаковато. <b>Как настроить:</b> если повествование повторяется, повысь; если уплывает или противоречит себе, понизь. <b>Рекомендация:</b> 0.6–0.8 подходит большинству историй. Это задаёт значение вселенной по умолчанию; глобальное значение из Настроек применяется, если вселенная его не задаёт."
doc_creator_meta_llm_top_p_d = "<b>Что делает:</b> ядерное семплирование — ещё один регулятор креативности, ограничивающий, сколько словаря ИИ используется (0.0–1.0). <b>Высокий</b> (≈0.95) = полная, разнообразная палитра; <b>низкий</b> (≈0.5) = только самые вероятные слова, то есть проще и безопаснее проза. <b>Как использовать:</b> обычно держи около 0.9–1.0 и формируй креативность Температурой; понижай, только если письмо слишком расхлябано. <b>Примечание:</b> Температура и top-p взаимодействуют — меняй по одному."
doc_creator_meta_verbosity_d = "<b>Что делает:</b> сколько прозы рассказчик пишет за ход. <b>Кратко</b> = плотные, быстрые биты; <b>Сбалансированно</b> = добротный абзац; <b>Разговорчиво</b> = богатые, описательные сцены. <b>Как выбрать:</b> Кратко для резкого экшена или темпа play-by-post, Разговорчиво для погружных, романных сессий. <b>Эффект:</b> меняет длину и детальность, не само происходящее. Это значение вселенной по умолчанию."