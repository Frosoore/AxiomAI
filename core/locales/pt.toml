# -- quick tour ---------------------------------------------------------------
doc_tour_welcome_t = "Bem-vindo ao Axiom AI!"
doc_tour_welcome = "O Axiom AI é um sandbox de RPG onde uma IA narra mundos vivos. Este breve tour mostra tudo — você pode repeti-lo a qualquer momento em Ajuda → Tour rápido."
doc_tour_hub_t = "A biblioteca"
doc_tour_hub = "A biblioteca é a sua casa: cada universo (um mundo jogável) aparece como um cartão. Use Jogar para começar uma partida, ou Editar para abri-lo no Creator Studio."
doc_tour_create_t = "Obter universos"
doc_tour_create = "Três formas de obter conteúdo: criar seu próprio universo (Novo universo), importar um arquivo .axiom, ou importar um cartão de personagem do SillyTavern. O Creator Studio pode até gerar conteúdo com IA (Populate)."
doc_tour_setup_t = "Começar um jogo"
doc_tour_setup = "Pressionar Jogar abre a preparação da partida: retome um jogo salvo, ou escolha uma persona, um nome e uma dificuldade, responda às perguntas da história e Inicie."
doc_tour_tabletop_t = "Jogar"
doc_tour_tabletop = "Na mesa, digite o que você faz — a IA narra o resultado. Estatísticas e inventário ficam no painel esquerdo, a enciclopédia do lore à direita. Você pode retroceder o tempo quando quiser."
doc_tour_settings_t = "Conectar uma IA"
doc_tour_settings = "Antes do seu primeiro jogo, abra Arquivo → Configurações para conectar uma IA: uma local via Ollama, ou o Google Gemini na nuvem com uma chave de API. A interface fala 10 idiomas."
doc_tour_help_t = "Encontrar ajuda"
doc_tour_help = "Passe o mouse sobre qualquer controle para saber o que ele faz, pressione o botão ? (ou F1) para uma explicação da página atual, e explore tudo em Ajuda → Documentação."

