doc_page_hub_t = "Biblioteca de universos"
doc_page_hub = "A tela inicial. Cada universo instalado nesta máquina aparece aqui como um cartão. Daqui você pode criar, importar, jogar, editar, exportar ou excluir universos."
doc_page_setup_t = "Preparação da partida"
doc_page_setup = "Prepara uma sessão de jogo para o universo escolhido: retome um jogo salvo, ou crie um novo personagem (persona, nome, dificuldade), responda às perguntas da história e inicie."
doc_page_tabletop_t = "Mesa de jogo"
doc_page_tabletop = "A tela de jogo. Digite o que seu personagem faz no painel central e a IA narra a resposta do mundo. Estatísticas e inventário ficam à esquerda, a enciclopédia do lore à direita."
doc_page_creator_t = "Creator Studio"
doc_page_creator = "O editor de universos. Cada aba gerencia um aspecto do mundo: lore, estatísticas, personagens, mapa, regras, eventos, perguntas iniciais e arquivos-fonte. Lembre-se de salvar (Ctrl+S)."
doc_page_settings_t = "Configurações"
doc_page_settings = "Configurações globais do aplicativo: qual IA usar (local ou na nuvem), geração de ilustrações, idioma, áudio e preferências de interface. A aba selecionada ao pressionar Salvar torna-se o backend de texto ativo."
doc_page_app_t = "Janela do aplicativo"
doc_page_app = "Os elementos sempre disponíveis em volta das telas: a barra de menus (Arquivo, Ajuda) e a barra de status embaixo, que mostra mensagens de progresso, o volume do áudio e um botão de cancelamento enquanto a IA escreve."

