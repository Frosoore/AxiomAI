doc_tabletop_back = "Sai da mesa e volta à biblioteca. O progresso já está salvo a cada turno — nada se perde."
doc_tabletop_sidebar_stats_t = "Painel de estatísticas"
doc_tabletop_sidebar_stats = "Ficha ao vivo de cada entidade acompanhada: as estatísticas se atualizam automaticamente após cada turno."
doc_tabletop_sidebar_inventory_t = "Painel de inventário"
doc_tabletop_sidebar_inventory = "Os itens carregados por cada entidade, atualizados conforme a história evolui."
doc_tabletop_sidebar_timeline_t = "Painel de cronologia"
doc_tabletop_sidebar_timeline = "Crônica dos eventos marcantes do mundo, com a hora do jogo em que aconteceram."
doc_tabletop_chat_log_t = "História"
doc_tabletop_chat_log = "A história até aqui. O texto do narrador flui aqui; use as setas sob uma resposta para trocar de variante, ou Regenerar para obter uma nova."
doc_tabletop_chat_input_t = "Entrada de ação"
doc_tabletop_chat_input = "Digite o que seu personagem diz ou faz e pressione Enter (Shift+Enter para nova linha)."
doc_tabletop_send_t = "Enviar"
doc_tabletop_send = "Envia sua ação ao narrador (o mesmo que pressionar Enter)."
doc_tabletop_mini_dico_t = "Mini-Dico (enciclopédia do lore)"
doc_tabletop_mini_dico = "Faça qualquer pergunta sobre o mundo (lugares, pessoas, história). Ele responde apenas a partir do lore do universo — nunca vê o seu jogo e não o influencia."

# -- creator ----------------------------------------------------------------
doc_creator_save_t = "Salvar alterações"
doc_creator_save = "Grava as alterações de todas as abas no universo (Ctrl+S)."
doc_creator_back_t = "Voltar à biblioteca"
doc_creator_back = "Volta à biblioteca. Salve suas alterações primeiro (Ctrl+S) — sair não as salva."
doc_creator_tab_meta_t = "Aba Mundo"
doc_creator_tab_meta = "A identidade do universo: texto de ambientação, instruções do narrador, cena de abertura e parâmetros globais da história."
doc_creator_world_lore_t = "Lore do mundo"
doc_creator_world_lore = "Texto livre que o narrador sempre mantém em mente: tom, história do mundo, verdades importantes."
doc_creator_system_prompt_t = "Substituição do prompt de sistema"
doc_creator_system_prompt = "Avançado: substitui as instruções padrão do narrador para este universo. Deixe vazio para manter o comportamento padrão."
doc_creator_first_message_t = "Narração inicial"
doc_creator_first_message = "A narração de abertura de cada novo jogo. Escreva várias alternativas separadas por ---VARIANT--- para oferecer uma escolha; as tags @id_pergunta são substituídas pelas respostas do jogador."
doc_creator_companion_t = "Modo Companheiro"
doc_creator_companion = "A história segue um herói principal controlado pela IA (escolhido aqui) e o jogador interpreta seu companheiro. Ativa a dificuldade «Companheiro» na tela de preparação."
doc_creator_tension_t = "Tensão do mundo"
doc_creator_tension = "Quão dramático o mundo parece (0 = cotidiano tranquilo, 1 = perigo constante). O narrador o usa para calibrar os eventos."
doc_creator_llm_temp_t = "Temperatura LLM"
doc_creator_llm_temp = "Criatividade da IA para este universo (0 = previsível, 1 = aventureira)."
doc_creator_llm_top_p_t = "Top P LLM"
doc_creator_llm_top_p = "Parâmetro de amostragem avançado; valores mais baixos tornam a redação mais focada. Deixe em 1.0 salvo necessidade específica."
doc_creator_verbosity_t = "Verbosidade padrão"
doc_creator_verbosity = "Comprimento padrão das respostas do narrador para novos jogos deste universo."
doc_creator_tab_stats_t = "Aba Estatísticas"
doc_creator_tab_stats = "Define as estatísticas numéricas que as entidades podem carregar (saúde, ouro...): nome, valor padrão, mínimo e máximo."
doc_creator_tab_entities_t = "Aba Entidades"
doc_creator_tab_entities = "O elenco e os objetos do mundo: personagens, criaturas, itens, com suas descrições e valores de estatísticas."
doc_creator_tab_map_t = "Aba Mapa"
doc_creator_tab_map = "Os lugares e as conexões entre eles, usados pelo narrador para manter viagens e geografia coerentes."
doc_creator_tab_rules_t = "Aba Regras"
doc_creator_tab_rules = "Regras mecânicas que reagem à história (ex.: «quando a saúde chega a 0...»). Elas limitam o que a IA pode mudar."
doc_creator_tab_events_t = "Aba Eventos"
doc_creator_tab_events = "Eventos programados que disparam em uma data ou hora do jogo, além da configuração do calendário do universo."
doc_creator_tab_setup_t = "Aba Configuração"
doc_creator_tab_setup = "As perguntas feitas ao jogador na tela de preparação antes do início de um novo jogo."
doc_creator_tab_lore_t = "Aba Lore Book"
doc_creator_tab_lore = "Entradas de enciclopédia: conhecimento acionado por palavras-chave, injetado na narração quando relevante, e usado pelo Mini-Dico."
doc_creator_tab_populate_t = "Aba Populate"
doc_creator_tab_populate = "Assistência de IA: gera ou completa o conteúdo do universo (entidades, regras, lore...) a partir das suas instruções, com pré-visualização opcional das mudanças."
doc_creator_tab_files_t = "Aba Arquivos"
doc_creator_tab_files = "O universo como arquivos de texto (Universe-as-Code): edite diretamente as fontes TOML/Markdown, ou converta um universo de arquivo único em uma pasta de arquivos."

# -- settings -----------------------------------------------------------------
doc_settings_tab_llm_t = "Aba Backend LLM"
doc_settings_tab_llm = "Configura a IA de texto principal por meio de qualquer API compatível com OpenAI (Ollama, LM Studio, vLLM, OpenAI...). Torna-se o backend ativo se for a aba selecionada ao pressionar Salvar."
