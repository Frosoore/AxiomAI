doc_settings_cloud_key_t = "Chave de API"
doc_settings_cloud_key = "Sua chave de API do provedor selecionado."
doc_settings_cloud_model_t = "Modelo"
doc_settings_cloud_model = "O modelo que narra a história (ex.: gemini-2.0-flash, claude-opus-4-8)."
doc_settings_browse_models_t = "Procurar modelos"
