doc_settings_memory_prompt_cache = "Coloca em cache o prompt de sistema estável no Gemini para reduzir o custo de tokens de entrada em chamadas repetidas (ex. o trabalho de fundo de fatos/crenças no modo Vivo). Só ajuda se o prompt for grande o suficiente — senão não faz nada com segurança — e só no backend Gemini. Desligado por padrão."

