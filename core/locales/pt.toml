# -- pages ----------------------------------------------------------------
doc_page_hub_t = "Biblioteca de universos"
doc_page_hub = "O ecrã inicial — a tua biblioteca de mundos. Cada universo instalado nesta máquina aparece aqui como um cartão. <b>O que podes fazer:</b> criar um novo universo, importar um (um pacote Axiom .axiom ou um cartão de personagem do SillyTavern) ou, em qualquer cartão, Jogar, Editar (abre o Creator Studio), Exportar (partilhar como ficheiro) ou Eliminar. <b>Dica:</b> começa pelo universo Myria incluído para ver como tudo encaixa antes de construíres o teu."
doc_page_setup_t = "Preparação da partida"
doc_page_setup = "Onde uma sessão é preparada antes de a história começar. <b>Dois caminhos:</b> retomar um jogo guardado, ou começar do zero — escolher um persona (o teu perfil fora da personagem), definir o nome da personagem e a dificuldade, e responder às perguntas do universo. Carrega em <b>Iniciar</b> quando estiveres pronto. <b>Porque importa:</b> as tuas respostas são escritas no primeiro turno, por isso decidem onde e quem és quando a narração abre."
doc_page_tabletop_t = "Mesa de jogo"
doc_page_tabletop = "O jogo em si. <b>Como jogar:</b> escreve o que a tua personagem faz ou diz na caixa central e envia — a IA narra a resposta do mundo, depois um motor de regras determinista verifica as consequências (saúde, inventário, dinheiro, tempo…) para o mundo se manter coerente. <b>À volta da mesa:</b> estatísticas e inventário à esquerda, a enciclopédia de lore pesquisável à direita, o histórico de turnos no meio. <b>Exemplo:</b> 'reviro a secretária à procura de uma chave' pode adiantar o relógio, revelar um objeto ou mudar uma estatística — e o mundo lembra-se disso no turno seguinte."
doc_page_creator_t = "Creator Studio"
doc_page_creator = "O Creator Studio — onde um universo se constrói e edita. O trabalho está organizado em separadores no topo, e <b>cada separador tem a sua própria página de Informação</b> (carrega em Informação ou F1 no separador em que estás). <b>Regra de ouro:</b> nada é escrito até Guardares (Ctrl+S). <b>Por onde começar:</b> Metadata fixa a identidade e o tom do mundo; Stats e Entidades dão-lhe substância; os outros separadores (Mapa, Regras, Eventos, Setup, Lore, Populate, Ficheiros) afinam-no e automatizam-no."
doc_page_settings_t = "Configurações"
doc_page_settings = "Preferências de toda a aplicação, não ligadas a um universo. <b>Aqui escolhes:</b> que IA escreve a história (um modelo local via Ollama / LM Studio, ou um fornecedor na nuvem), a geração de ilustrações opcional, o idioma da interface, o áudio e o ecrã. <b>Importante:</b> o separador de backend de texto selecionado quando carregas em <b>Guardar</b> passa a ser o backend ativo — termina no que realmente queres. Usa <b>Testar ligação</b> para confirmar que a IA responde antes de jogar."
doc_page_app_t = "Janela do aplicativo"
doc_page_app = "A moldura à volta de cada ecrã. <b>Barra de menus:</b> Ficheiro e Ajuda — o passeio rápido, este diretório de documentação e a ferramenta de Diagnóstico estão em Ajuda. <b>Barra de estado</b> (em baixo): mensagens de progresso, o controlo de volume e — enquanto a IA escreve — um botão para cancelar a geração atual. Sempre disponíveis, seja qual for o ecrã."

