doc_settings_tab_cloud_t = "Aba Nuvem"
doc_settings_tab_cloud = "Configura um provedor de IA na nuvem (Gemini, Claude, Venice AI, Fireworks AI, OpenAI, OpenRouter) como IA de texto. Torna-se o backend ativo se for a aba selecionada ao Salvar."
