# TICKET-057 — doc enrichment (Studio sub-pages + details)
doc_page_creator_meta_t = "Studio · Metadata"
doc_page_creator_meta = "A identidade e o comportamento global do mundo. <b>O que vive aqui:</b> o lore de fundo que o narrador recorda sempre, uma substituição opcional do prompt de sistema, a cena de abertura de um novo jogo, o modo Companheiro e os cursores que afinam a narração (tensão, temperatura, top-p, verbosidade). <b>Como usar:</b> escreve primeiro o Lore do mundo (ancora tudo), define o tom com a Tensão e deixa os cursores de IA por omissão a não ser que a narração soe mal. Carrega em Informação para o detalhe de cada campo."
doc_page_creator_stats_t = "Studio · Stats"
doc_page_creator_stats = "Define as estatísticas que as entidades podem ter — Saúde, Moedas, Reputação, o que inventares. <b>Para cada estatística:</b> um nome, um valor inicial por omissão e limites mín/máx opcionais. <b>Porque importa:</b> as estatísticas são aquilo sobre que raciocinam o motor de regras e o narrador — uma estatística definida aqui pode ser mudada pela história e verificada por regras. <b>Exemplo:</b> define 'Moedas' (mín 0) e o mundo pode cobrar-te um quarto; define 'Saúde' (0–100) e o separador Regras pode tornar 0 a morte. <b>Nota:</b> as personagens novas começam cada estatística no seu valor por omissão."
doc_page_creator_entities_t = "Studio · Entidades"
doc_page_creator_entities = "O elenco e os objetos do teu mundo: personagens (NPCs), fações, objetos e coisas notáveis. <b>Para cada entidade:</b> um id, um nome, um tipo, uma descrição que o narrador lê e as suas estatísticas. <b>Como usar:</b> dá aos NPCs importantes algumas estatísticas e uma descrição nítida — é o que os mantém coerentes numa campanha longa. <b>Exemplo:</b> um taberneiro com uma descrição vívida e uma estatística 'Temperamento' comporta-se igual sempre que a história volta a ele. Também podes gerar entidades no separador Populate."
doc_page_creator_map_t = "Studio · Mapa"
doc_page_creator_map = "Os lugares do teu mundo e como se ligam. <b>O que defines:</b> locais (com uma escala — região, cidade, ponto de interesse — e um pai) e as ligações entre eles. <b>Porque importa:</b> o narrador usa o mapa para manter coerentes a geografia e as viagens, e o relógio de jogo pode usar as ligações para estimar quanto demora um trajeto. <b>Como usar:</b> esboça primeiro os grandes lugares (um país, as suas cidades) e depois acrescenta as estradas e salas que importam ao jogo. Populate pode gerar um mapa inicial."
doc_page_creator_rules_t = "Studio · Regras"
doc_page_creator_rules = "Regras deterministas que o motor aplica a cada turno — é o que mantém o mundo honesto enquanto a IA narra livremente. <b>Como funciona uma regra:</b> quando as estatísticas de uma entidade mudam, as condições da regra são verificadas; se valerem, as suas ações disparam (mudar uma estatística, definir um estado…). <b>Cada regra tem</b> uma prioridade, um alvo (uma entidade ou '*' para todas), condições e ações. <b>Exemplo:</b> 'se Saúde ≤ 0 → definir Condição = Mortalmente ferido' torna a morte firme diga o que disser a prosa. <b>Dica:</b> uma estatística ausente vale 0, por isso prefere limiares '≥' para efeitos só para entidades que realmente têm a estatística."
doc_page_creator_events_t = "Studio · Eventos"
doc_page_creator_events = "Eventos programados que disparam a uma hora de jogo escolhida, independentemente do que o jogador faz. <b>O que defines:</b> quando o evento acontece (em tempo de jogo) e o que faz ou sinaliza à narração. <b>Porque importa:</b> os eventos fazem o mundo avançar ao relógio — chega uma caravana, esgota-se um prazo, rebenta uma tempestade — para o cenário parecer vivo em vez de esperar por ti. <b>Exemplo:</b> programa 'o carregamento de artilharia chega às docas no dia 3' e o mundo chegará a esse momento, quer o vigiasses quer não."
doc_page_creator_setup_t = "Studio · Perguntas iniciais"
doc_page_creator_setup = "As perguntas a que um jogador responde ao iniciar um jogo neste universo. <b>O que defines:</b> cada pergunta, o seu tipo (escolha única, escolha múltipla ou texto livre) e as suas opções. <b>Porque importa:</b> as respostas são injetadas no turno de abertura, por isso decidem quem é o jogador e onde começa. <b>Exemplo:</b> uma escolha 'De onde vens?' pode fixar a região inicial e dar cor à primeira cena. Mantém-nas poucas e evocativas — três boas perguntas valem mais que dez insípidas."
doc_page_creator_lore_t = "Studio · Lore Book"
doc_page_creator_lore = "A enciclopédia do mundo: entradas de lore pesquisáveis que o narrador busca a pedido (memória aumentada por recuperação). <b>O que acrescentas:</b> artigos sobre história, fações, magia, lugares — cada um com palavras-chave. <b>Porque importa:</b> ao contrário do Lore do mundo sempre ativo (Metadata), estas só são recuperadas quando relevantes, por isso podes guardar imenso fundo sem sobrecarregar cada prompt. <b>Como usar:</b> uma entrada focada por tema; o motor traz as certas para a cena. Populate pode redigir entradas."
doc_page_creator_populate_t = "Studio · Populate"
doc_page_creator_populate = "Criação assistida por IA: deixa um modelo gerar partes do teu universo. <b>O que faz:</b> cria entidades, locais, entradas de lore e mais a partir da premissa do teu mundo, com uma pré-visualização e um diff para aprovares cada mudança antes de ser escrita. <b>Como usar:</b> escreve primeiro um bom Lore do mundo (Populate apoia-se nele), gera em pequenos lotes dirigidos, revê o diff e guarda o que gostares. <b>Porque importa:</b> transforma um universo vazio num jogável em minutos — um ponto de partida que depois afinas à mão."
doc_page_creator_files_t = "Studio · Ficheiros"
doc_page_creator_files = "A fonte bruta do teu universo, em texto. O Axiom guarda os mundos como <b>Universe-as-Code</b>: ficheiros TOML/Markdown legíveis que compilam para uma base de dados. <b>O que podes fazer:</b> abrir e editar esses ficheiros fonte diretamente, e converter uma base de dados plana antiga na árvore fonte. <b>Porque importa:</b> como um universo é texto simples, podes versioná-lo com Git, fazer-lhe diff e partilhá-lo como código. <b>Avançado:</b> tudo o que os outros separadores fazem acaba nestes ficheiros — esta é a vista direta."
doc_creator_meta_world_lore_d = "<b>O que faz:</b> este texto é anteposto ao contexto do narrador em cada turno, logo é a memória permanente do mundo. <b>Põe aqui:</b> o tom, a grande história, as regras da magia/tecnologia e verdades que nunca devem ser contraditas. <b>Deixa de fora:</b> o detalhe enciclopédico longo — esse vai para o Lore Book (recuperado a pedido) para isto ficar leve. <b>Exemplo:</b> 'Os deuses estão mortos e esquecidos; a magia cansa quem a lança como um músculo; corre o ano 5281.' <b>Efeito:</b> cada cena respeita estes factos sem os repetires."
doc_creator_meta_system_prompt_d = "<b>O que faz:</b> substitui as instruções integradas do narrador para este universo — a substituição mais profunda e avançada. <b>Quando usar:</b> só para um comportamento narrativo radicalmente diferente (um formato específico, uma voz ou regras invulgares). <b>Aviso:</b> o prompt por omissão já trata do estado, das ferramentas e da coerência; uma substituição descuidada pode quebrá-los. <b>Recomendação:</b> deixa-o vazio e guia o mundo primeiro pelo Lore e pelos cursores; recorre a isto só quando mais nada obtém o comportamento que queres."
doc_creator_meta_first_message_d = "<b>O que faz:</b> a narração de abertura mostrada ao iniciar um jogo novo aqui — o pano que se levanta. <b>Põe aqui:</b> uma cena que fixa o tom e mete o jogador numa situação a que reagir. <b>Como usar:</b> termina com um pequeno gancho (uma batida à porta, uma escolha) para a primeira ação do jogador ter tração. <b>Nota:</b> aparece uma vez no início; os jogos retomados mantêm o seu próprio histórico. <b>Exemplo:</b> uma doca chuvosa ao amanhecer, um desconhecido a deslizar uma carta selada sobre a mesa."
doc_creator_meta_companion_d = "<b>O que faz:</b> o modo Companheiro torna o Axiom num co-piloto de um Herói principal escolhido — a IA ajuda a conduzir essa personagem em vez de correr um sandbox aberto. <b>Como usar:</b> marca Ativar e depois escolhe a entidade Herói em torno da qual gira a experiência. <b>Porquê usar:</b> ideal para uma história guiada, centrada num único protagonista. <b>Deixa-o desligado</b> para a experiência clássica 'és o jogador, faz o que quiseres'."
doc_creator_meta_tension_d = "<b>O que faz:</b> um cursor 0.0–1.0 que diz ao narrador quão dramático o mundo deve parecer. <b>0.0</b> = vida quotidiana calma; <b>1.0</b> = perigo constante e muito em jogo. <b>Efeito:</b> colore com que frequência os problemas encontram o jogador e quão carregadas são as cenas — muda o tom, não as regras. <b>Exemplo:</b> um mistério de aldeia acolhedor anda por 0.2, uma cidade à beira da guerra por 0.7. <b>Dica:</b> também alimenta o Chronicler fora de cena, por isso um mundo tenso evolui de forma mais movimentada enquanto estás fora."
doc_creator_meta_llm_temp_d = "<b>O que faz:</b> a criatividade da IA para este universo, de 0.0 a 1.0. <b>Baixa</b> (≈0.2) = focada, previsível, nos carris; <b>alta</b> (≈0.8) = inventiva, surpreendente, por vezes disparatada. <b>Como afinar:</b> se a narração se repete, sobe-a; se divaga ou se contradiz, baixa-a. <b>Recomendação:</b> 0.6–0.8 serve para a maioria das histórias. Isto fixa o valor por omissão do universo; o valor global das Definições aplica-se se um universo não o definir."
doc_creator_meta_llm_top_p_d = "<b>O que faz:</b> amostragem por núcleo — outro controlo de criatividade que limita quanto do vocabulário da IA é usado (0.0–1.0). <b>Alto</b> (≈0.95) = a paleta completa e variada; <b>baixo</b> (≈0.5) = só as palavras mais prováveis, ou seja prosa mais plana e segura. <b>Como usar:</b> normalmente deixa-o perto de 0.9–1.0 e molda a criatividade com a Temperatura; baixa-o só se a escrita se soltar demais. <b>Nota:</b> Temperatura e top-p interagem — muda um de cada vez."
doc_creator_meta_verbosity_d = "<b>O que faz:</b> quanta prosa o narrador escreve por turno. <b>Curto</b> = beats apertados e ágeis; <b>Equilibrado</b> = um bom parágrafo; <b>Tagarela</b> = cenas ricas e descritivas. <b>Como escolher:</b> Curto para ação rápida ou ritmo play-by-post, Tagarela para sessões imersivas e romanescas. <b>Efeito:</b> muda o comprimento e o detalhe, não o que de facto acontece. É o valor por omissão do universo."

