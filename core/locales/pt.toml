doc_settings_tab_params = "Configurações de criatividade armazenadas dentro do universo atualmente aberto (não são configurações globais)."
doc_settings_llm_temp_t = "Temperatura LLM"
doc_settings_llm_temp = "Criatividade da IA para o universo aberto (0 = previsível, 1 = aventureira)."
doc_settings_llm_top_p_t = "Top P LLM"
doc_settings_llm_top_p = "Parâmetro de amostragem avançado; valores mais baixos tornam a redação mais focada. Deixe em 1.0 salvo necessidade específica."
