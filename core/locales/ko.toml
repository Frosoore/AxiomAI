# TICKET-057 — doc enrichment (Studio sub-pages + details)
doc_page_creator_meta_t = "Studio · Metadata"
doc_page_creator_meta = "세계의 정체성과 전반적 동작. <b>여기 있는 것:</b> 서술자가 항상 기억하는 배경 로어, 선택적 시스템 프롬프트 교체, 새 게임의 도입 장면, 동반자 모드, 그리고 서술을 조정하는 다이얼(긴장도, 온도, top-p, 장황함). <b>사용법:</b> 먼저 World Lore를 쓰고(모든 것을 고정), 긴장도로 분위기를 정한 뒤, 서술이 어색하지 않다면 AI 다이얼은 기본값으로 두세요. 각 항목의 자세한 설명은 정보를 누르세요."
doc_page_creator_stats_t = "Studio · 스탯"
doc_page_creator_stats = "엔티티가 가질 수 있는 스탯을 정의합니다 — 체력, 코인, 평판 등 무엇이든. <b>각 스탯:</b> 이름, 기본 시작값, 선택적 최소/최대 범위. <b>왜 중요한가:</b> 스탯은 규칙 엔진과 서술자가 추론하는 대상입니다 — 여기서 정의한 스탯은 이야기로 바뀌고 규칙으로 검사됩니다. <b>예:</b> ‘코인’(최소 0)을 정의하면 세계가 방값을 청구할 수 있고, ‘체력’(0–100)을 정의하면 규칙 탭에서 0을 죽음으로 만들 수 있습니다. <b>참고:</b> 새 캐릭터는 정의된 각 스탯을 기본값에서 시작합니다."
doc_page_creator_entities_t = "Studio · 엔티티"
doc_page_creator_entities = "세계의 등장인물과 사물: 캐릭터(NPC), 세력, 아이템, 주목할 만한 것들. <b>각 엔티티:</b> id, 이름, 종류, 서술자가 읽는 설명, 그리고 자체 스탯. <b>사용법:</b> 중요한 NPC에게는 몇 개의 스탯과 날카로운 설명을 주세요 — 긴 캠페인에서 일관성을 지키는 핵심입니다. <b>예:</b> 생생한 설명과 ‘성정’ 스탯을 가진 여관 주인은 이야기가 그에게 돌아올 때마다 같게 행동합니다. Populate 탭에서 엔티티를 생성할 수도 있습니다."
doc_page_creator_map_t = "Studio · 지도"
doc_page_creator_map = "세계의 장소들과 그 연결. <b>정의하는 것:</b> 장소(규모 — 지역, 도시, 관심 지점 — 와 상위 장소를 가짐)와 그들 사이의 연결. <b>왜 중요한가:</b> 서술자는 지도로 지리와 이동을 일관되게 유지하고, 게임 시계는 연결로 이동 시간을 추정할 수 있습니다. <b>사용법:</b> 먼저 큰 장소(나라와 그 도시들)를 스케치하고, 플레이에 중요한 길과 방을 더하세요. Populate가 시작 지도를 생성할 수 있습니다."
doc_page_creator_rules_t = "Studio · 규칙"
doc_page_creator_rules = "엔진이 매 턴 적용하는 결정론적 규칙 — AI가 자유롭게 서술하는 동안 세계를 정직하게 유지하는 장치입니다. <b>규칙의 작동:</b> 엔티티의 스탯이 바뀌면 규칙의 조건이 검사되고, 충족되면 그 동작이 발동합니다(스탯 변경, 상태 설정…). <b>각 규칙에는</b> 우선순위, 대상(특정 엔티티 또는 전체를 뜻하는 ‘*’), 조건, 동작이 있습니다. <b>예:</b> ‘체력 ≤ 0 이면 → 상태 = 치명상’으로 하면 문장이 뭐라 하든 죽음이 확정됩니다. <b>팁:</b> 없는 스탯은 0으로 읽히므로, 해당 스탯을 실제로 가진 엔티티에게만 적용할 효과에는 ‘≥’ 임계값을 권합니다."
doc_page_creator_events_t = "Studio · 이벤트"
doc_page_creator_events = "플레이어의 행동과 무관하게, 선택한 게임 내 시각에 발동하는 예약 이벤트. <b>설정하는 것:</b> 이벤트가 언제 일어나는지(게임 내 시간)와 무엇을 하거나 서술에 무엇을 알리는지. <b>왜 중요한가:</b> 이벤트는 세계를 시계로 움직입니다 — 대상(隊商)이 도착하고, 기한이 지나고, 폭풍이 닥칩니다 — 그래서 배경이 당신을 기다리지 않고 살아 있게 느껴집니다. <b>예:</b> ‘포병 화물이 3일째에 부두에 도착’을 예약하면, 당신이 지켜보든 아니든 세계는 그 순간에 이릅니다."
doc_page_creator_setup_t = "Studio · 시작 질문"
doc_page_creator_setup = "이 유니버스에서 새 게임을 시작할 때 플레이어가 답하는 질문들. <b>정의하는 것:</b> 각 질문, 그 유형(단일 선택, 다중 선택, 자유 텍스트)과 선택지. <b>왜 중요한가:</b> 답변은 시작 턴에 주입되어 플레이어가 누구이며 어디서 시작하는지를 정합니다. <b>예:</b> ‘어디 출신인가?’ 선택은 시작 지역을 정하고 첫 장면에 색을 입힙니다. 적고 환기적으로 — 좋은 질문 셋이 밋밋한 열보다 낫습니다."
doc_page_creator_lore_t = "Studio · Lore Book"
doc_page_creator_lore = "세계의 백과: 서술자가 필요할 때 끌어오는 검색 가능한 로어 항목(검색 증강 기억). <b>추가하는 것:</b> 역사, 세력, 마법, 장소에 관한 글 — 각각 키워드 포함. <b>왜 중요한가:</b> 항상 켜져 있는 World Lore(Metadata)와 달리, 이것들은 관련 있을 때만 불러오므로 매 프롬프트를 부풀리지 않고 방대한 배경을 저장할 수 있습니다. <b>사용법:</b> 주제별로 초점 맞춘 한 항목; 엔진이 장면에 맞는 것을 끌어올립니다. Populate가 항목 초안을 만들 수 있습니다."
doc_page_creator_populate_t = "Studio · Populate"
doc_page_creator_populate = "AI 보조 저작: 모델이 당신 유니버스의 일부를 생성하게 합니다. <b>하는 일:</b> 세계의 전제로부터 엔티티, 장소, 로어 항목 등을 만들고, 미리보기와 차이(diff)를 함께 보여 기록 전에 모든 변경을 승인하게 합니다. <b>사용법:</b> 먼저 탄탄한 World Lore를 쓰고(Populate가 그 위에 쌓습니다), 작고 표적화된 묶음으로 생성하고, 차이를 검토한 뒤 마음에 드는 것을 저장하세요. <b>왜 중요한가:</b> 빈 유니버스를 몇 분 만에 플레이 가능한 것으로 바꿔 줍니다 — 이후 손으로 다듬을 출발점입니다."
doc_page_creator_files_t = "Studio · 파일"
doc_page_creator_files = "당신 유니버스의 원본 소스, 텍스트로. Axiom은 세계를 <b>Universe-as-Code</b>로 저장합니다: 데이터베이스로 컴파일되는, 사람이 읽을 수 있는 TOML/Markdown 파일. <b>할 수 있는 일:</b> 이 소스 파일들을 직접 열어 편집하고, 오래된 평면 데이터베이스를 소스 트리로 변환합니다. <b>왜 중요한가:</b> 유니버스가 평문이므로 Git으로 버전 관리하고, 차이를 보고, 코드처럼 공유할 수 있습니다. <b>고급:</b> 다른 탭이 하는 모든 일이 이 파일들에 담깁니다 — 이것은 직접 보기입니다."
doc_creator_meta_world_lore_d = "<b>하는 일:</b> 이 텍스트는 매 턴 서술자의 맥락 앞에 붙으므로 세계의 영구 기억입니다. <b>여기에:</b> 분위기, 큰 역사, 마법/기술의 규칙, 그리고 결코 어겨선 안 될 진실. <b>여기엔 말 것:</b> 긴 백과식 세부는 Lore Book(필요할 때 불러옴)으로 — 이 칸은 가볍게. <b>예:</b> ‘신들은 죽고 잊혔다; 마법은 근육처럼 시전자를 지치게 한다; 지금은 5281년이다.’ <b>효과:</b> 반복하지 않아도 모든 장면이 이 사실을 지킵니다."
doc_creator_meta_system_prompt_d = "<b>하는 일:</b> 이 유니버스에 대한 서술자의 내장 지시를 교체합니다 — 가장 깊고 고급의 덮어쓰기. <b>언제 쓰나:</b> 근본적으로 다른 서술 동작(특정 형식, 독특한 어조나 규칙)이 필요할 때만. <b>경고:</b> 기본 프롬프트는 이미 상태, 도구, 일관성을 다룹니다; 부주의한 교체는 그것들을 망칠 수 있습니다. <b>권장:</b> 비워 두고 먼저 World Lore와 다이얼로 세계를 이끄세요; 다른 무엇으로도 원하는 동작이 안 될 때만 손대세요."
doc_creator_meta_first_message_d = "<b>하는 일:</b> 여기서 완전히 새 게임을 시작할 때 보이는 도입 서술 — 막이 오릅니다. <b>여기에:</b> 분위기를 정하고 플레이어를 반응할 수 있는 상황에 던지는 장면. <b>사용법:</b> 작은 갈고리(문 두드림, 선택)로 끝내 플레이어의 첫 행동에 발판을 주세요. <b>참고:</b> 시작 시 한 번 표시됩니다; 이어가는 저장은 각자의 기록을 유지합니다. <b>예:</b> 동틀 녘 비 내리는 부두, 낯선 이가 봉인된 편지를 탁자 위로 밀어 보낸다."
doc_creator_meta_companion_d = "<b>하는 일:</b> 동반자 모드는 Axiom을 선택한 주인공(영웅)의 부조종사로 만듭니다 — 순수한 개방형 샌드박스를 돌리는 대신 AI가 그 캐릭터를 함께 이끕니다. <b>사용법:</b> 활성화를 체크한 뒤 경험의 중심이 될 영웅 엔티티를 고릅니다. <b>왜 쓰나:</b> 단일 주인공에 초점을 둔 안내형 이야기에 이상적. <b>꺼 두면</b> 고전적인 ‘당신이 플레이어, 무엇이든 하라’입니다."
doc_creator_meta_tension_d = "<b>하는 일:</b> 세계가 얼마나 극적으로 느껴져야 하는지를 서술자에게 알리는 0.0–1.0 다이얼. <b>0.0</b>＝차분한 일상, <b>1.0</b>＝끊임없는 위험과 높은 판돈. <b>효과:</b> 곤경이 플레이어를 찾는 빈도와 장면의 긴장감을 좌우합니다 — 바꾸는 것은 분위기이지 규칙이 아닙니다. <b>예:</b> 아늑한 마을 미스터리는 0.2 부근, 전쟁 직전의 도시는 0.7 부근. <b>팁:</b> 무대 뒤의 Chronicler에도 공급되므로, 긴장된 세계는 당신이 없는 동안 더 다사다난하게 전개됩니다."
doc_creator_meta_llm_temp_d = "<b>하는 일:</b> 이 유니버스에서의 AI 창의성, 0.0에서 1.0까지. <b>낮음</b>(≈0.2)＝집중적, 예측 가능, 정해진 길; <b>높음</b>(≈0.8)＝독창적, 의외, 때로 엉뚱. <b>조정:</b> 서술이 반복되면 올리고, 헤매거나 모순되면 내리세요. <b>권장:</b> 대부분의 이야기에 0.6–0.8. 이는 유니버스 기본값을 정하며, 유니버스가 지정하지 않으면 설정의 전역 값이 적용됩니다."
doc_creator_meta_llm_top_p_d = "<b>하는 일:</b> 뉴클리어스 샘플링 — AI가 어휘를 얼마나 끌어다 쓰는지 제한하는 또 다른 창의성 조절(0.0–1.0). <b>높음</b>(≈0.95)＝가득 찬 다채로운 팔레트; <b>낮음</b>(≈0.5)＝가장 그럴듯한 단어만, 즉 더 담백하고 안전한 문체. <b>사용법:</b> 보통 0.9–1.0 부근에 두고 창의성은 온도로 빚으세요; 글이 너무 풀릴 때만 내리세요. <b>참고:</b> 온도와 top-p는 상호작용합니다 — 한 번에 하나만 바꾸세요."
doc_creator_meta_verbosity_d = "<b>하는 일:</b> 서술자가 한 턴에 쓰는 산문의 양. <b>짧게</b>＝촘촘하고 빠른 전개; <b>균형</b>＝탄탄한 한 단락; <b>수다스럽게</b>＝풍부하고 묘사적인 장면. <b>선택:</b> 날렵한 액션이나 플레이 바이 포스트 속도엔 짧게, 몰입적이고 소설 같은 세션엔 수다스럽게. <b>효과:</b> 길이와 디테일을 바꾸지, 실제로 일어나는 일은 바꾸지 않습니다. 이는 유니버스의 기본값입니다."