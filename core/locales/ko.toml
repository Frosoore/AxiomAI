# -- pages ----------------------------------------------------------------
doc_page_hub_t = "유니버스 라이브러리"
doc_page_hub = "홈 화면 — 당신의 세계 라이브러리. 이 컴퓨터에 설치된 모든 유니버스가 카드로 표시됩니다. <b>할 수 있는 일:</b> 새 유니버스 만들기, 가져오기(Axiom의 .axiom 팩이나 SillyTavern 캐릭터 카드), 또는 각 카드에서 플레이/편집(Creator Studio 열기)/내보내기(파일로 공유)/삭제. <b>팁:</b> 먼저 기본 제공되는 Myria 유니버스로 전체가 어떻게 맞물리는지 익힌 뒤 자신의 세계를 만드세요."
doc_page_setup_t = "게임 준비"
doc_page_setup = "이야기가 시작되기 전에 세션을 준비하는 곳. <b>두 가지 길:</b> 기존 저장을 이어가거나 새로 시작 — 페르소나(캐릭터 밖 프로필)를 고르고, 캐릭터 이름과 난이도를 정하고, 유니버스의 이야기 질문에 답합니다. 준비되면 <b>시작</b>을 누르세요. <b>왜 중요한가:</b> 당신의 답변은 바로 첫 턴에 기록되므로, 서사가 열릴 때 당신이 어디에 있고 누구인지를 결정합니다."
doc_page_tabletop_t = "게임 테이블"
doc_page_tabletop = "게임 그 자체. <b>플레이 방법:</b> 가운데 칸에 캐릭터가 하는 일이나 말을 써서 보내세요 — AI가 세계의 반응을 서술하고, 이어서 결정론적 규칙 엔진이 결과(체력, 인벤토리, 돈, 시간…)를 검증해 세계의 일관성을 지킵니다. <b>탁상 주변:</b> 왼쪽에 스탯과 인벤토리, 오른쪽에 검색 가능한 로어 백과, 가운데에 턴 기록. <b>예:</b> ‘책상을 뒤져 열쇠를 찾는다’는 시계를 진행시키거나 아이템을 드러내거나 스탯을 바꿀 수 있으며, 다음 턴에도 세계는 그것을 기억합니다."
doc_page_creator_t = "Creator Studio"
doc_page_creator = "Creator Studio — 유니버스를 만들고 편집하는 곳. 작업은 상단의 탭으로 정리되며, <b>각 탭은 자체 정보 페이지</b>를 가집니다(사용 중인 탭에서 정보 또는 F1을 누르세요). <b>철칙:</b> 저장(Ctrl+S)하기 전엔 아무것도 기록되지 않습니다. <b>어디서 시작할까:</b> Metadata는 세계의 정체성과 분위기를 정하고, Stats와 엔티티가 실체를 주며, 나머지 탭(지도, 규칙, 이벤트, Setup, Lore, Populate, 파일)이 다듬고 자동화합니다."
doc_page_settings_t = "설정"
doc_page_settings = "특정 유니버스에 묶이지 않은 앱 전역 설정. <b>여기서 선택:</b> 어떤 AI가 이야기를 쓸지(Ollama / LM Studio를 통한 로컬 모델, 또는 클라우드 제공자), 선택적 삽화 생성, 인터페이스 언어, 오디오와 화면. <b>중요:</b> <b>저장</b>을 누를 때 선택되어 있던 텍스트 백엔드 탭이 활성 백엔드가 됩니다 — 정말 쓰고 싶은 탭에서 끝내세요. 플레이 전 <b>연결 테스트</b>로 AI가 응답하는지 확인하세요."
doc_page_app_t = "애플리케이션 창"
doc_page_app = "모든 화면을 감싸는 틀. <b>메뉴 막대:</b> 파일과 도움말 — 빠른 둘러보기, 이 문서 디렉터리, 진단 도구가 모두 도움말 아래에 있습니다. <b>상태 표시줄</b>(하단): 진행 메시지, 음량 조절, 그리고 — AI가 쓰는 동안 — 현재 생성을 취소하는 버튼. 어느 화면에서나 항상 사용할 수 있습니다."

