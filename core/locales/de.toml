doc_settings_main_model_t = "Hauptmodell"
doc_settings_main_model = "Das Modell, das die Geschichte erzählt."
doc_settings_extraction_model_t = "Extraktionsmodell"
doc_settings_extraction_model = "Kleineres Modell für strukturierte JSON-Aufgaben (z. B. die Populate-Generatoren). Kann dasselbe wie das Hauptmodell sein."
doc_settings_time_model_t = "Zeitmodell"
doc_settings_time_model = "Winziges Modell, mit dem der Timekeeper schätzt, wie viel Spielzeit eine Aktion benötigt."
doc_settings_test_connection_t = "Verbindung testen"
doc_settings_test_connection = "Prüft, ob das Backend mit den oben eingegebenen Werten antwortet."
doc_settings_tab_cloud_t = "Cloud-Tab"
doc_settings_tab_cloud = "Konfiguriert einen Cloud-KI-Anbieter (Gemini, Claude, Venice AI, Fireworks AI, OpenAI, OpenRouter) als Text-KI. Wird zum aktiven Backend, wenn dieser Tab beim Speichern ausgewählt ist."
doc_settings_cloud_provider_t = "Cloud-Anbieter"
doc_settings_cloud_provider = "Der Cloud-Dienst für die Texterzeugung. Jeder Anbieter behält seinen eigenen API-Key und sein eigenes Modell – ein Wechsel verliert nie deine Keys."
