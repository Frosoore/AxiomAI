doc_settings_tab_llm_t = "Tab LLM-Backend"
doc_settings_tab_llm = "Konfiguriert die Haupt-Text-KI über jede OpenAI-kompatible API (Ollama, LM Studio, vLLM, OpenAI...). Wird das aktive Backend, wenn dieser Tab beim Speichern ausgewählt ist."
