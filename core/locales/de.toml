doc_creator_meta_companion = "Die Geschichte folgt einem KI-gesteuerten Haupthelden (hier gewählt) und der Spieler spielt seinen Gefährten. Aktiviert die Schwierigkeit „Gefährte“ in der Spielvorbereitung."
