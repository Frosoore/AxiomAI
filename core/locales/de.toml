doc_setup_add_persona_t = "Persona hinzufügen"
doc_setup_add_persona = "Erstellt eine neue Persona (Name + Beschreibung), global gespeichert und in jedem Universum wiederverwendbar."
doc_setup_player_name_t = "Charaktername"
