doc_settings_image_cfg_t = "CFG-Skala"
doc_settings_image_cfg = "Wie streng das Bild dem Prompt folgt (nur lokale Engines). 7 ist ein guter Standard."
doc_settings_image_timeout_t = "Max. Wartezeit pro Bild"
doc_settings_image_timeout = "Maximale Sekunden, die auf ein Bild gewartet wird, bevor aufgegeben wird. Ein langsamer Rechner braucht eventuell mehr."
doc_settings_image_workflow_t = "ComfyUI-Workflow"
doc_settings_image_workflow = "Nur ComfyUI: Pfad zur (oder rohes JSON der) Workflow-Vorlage. Leer lassen für die eingebaute Standardvorlage."
doc_settings_language_t = "Sprache"
doc_settings_language = "Anzeigesprache der Oberfläche (10 verfügbar)."
doc_settings_chronicler_t = "Chronisten-Intervall"
doc_settings_chronicler = "Wie oft sich die Welt von selbst weiterentwickelt: alle N Spielminuten erzeugt der Chronist Ereignisse abseits des Bildschirms."
doc_settings_font_size_t = "Schriftgröße"
doc_settings_font_size = "Textgröße der Oberfläche."
doc_settings_rag_chunks_t = "RAG-Speicherfragmente"
doc_settings_rag_chunks = "Wie viele Erinnerungspassagen aus vergangenen Ereignissen pro Zug für den Erzähler abgerufen werden. Mehr = besseres Gedächtnis, aber langsamer und teurer."
doc_settings_audio_t = "Hintergrund-Audio"
