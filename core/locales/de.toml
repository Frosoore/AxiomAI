# -- pages ----------------------------------------------------------------
doc_page_hub_t = "Universums-Bibliothek"
doc_page_hub = "Der Startbildschirm. Jedes auf diesem Rechner installierte Universum erscheint hier als Karte. Von hier aus kannst du Universen erstellen, importieren, spielen, bearbeiten, exportieren oder löschen."
doc_page_setup_t = "Spielvorbereitung"
doc_page_setup = "Bereitet eine Spielsitzung für das gewählte Universum vor: Setze einen Spielstand fort, oder erstelle einen neuen Charakter (Persona, Name, Schwierigkeit), beantworte die Story-Fragen und starte."
doc_page_tabletop_t = "Spieltisch"
doc_page_tabletop = "Der Spielbildschirm. Tippe im mittleren Bereich, was dein Charakter tut, und die KI erzählt die Antwort der Welt. Werte und Inventar stehen links, die Lore-Enzyklopädie rechts."
doc_page_creator_t = "Creator Studio"
doc_page_creator = "Der Universums-Editor. Jeder Tab verwaltet einen Aspekt der Welt: Lore, Werte, Charaktere, Karte, Regeln, Ereignisse, Startfragen und Quelldateien. Denk ans Speichern (Strg+S)."
doc_page_settings_t = "Einstellungen"
doc_page_settings = "Globale Anwendungseinstellungen: welche KI verwendet wird (lokal oder Cloud), Illustrationsgenerierung, Sprache, Audio und Oberflächen-Einstellungen. Der beim Speichern ausgewählte Tab wird das aktive Text-Backend."
doc_page_app_t = "Anwendungsfenster"
doc_page_app = "Die stets verfügbaren Elemente rund um die Bildschirme: die Menüleiste (Datei, Hilfe) und die Statusleiste unten, die Fortschrittsmeldungen, die Audio-Lautstärke und einen Abbrechen-Knopf zeigt, während die KI schreibt."

