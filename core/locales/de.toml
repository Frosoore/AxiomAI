doc_tabletop_player_selector_t = "Aktiver Spieler"
doc_tabletop_player_selector = "Wenn das Universum mehrere Spielercharaktere definiert, wählt dies, für wen deine nächste Nachricht spricht."
doc_tabletop_verbosity_t = "Ausführlichkeit"
doc_tabletop_verbosity = "Länge der Antworten des Erzählers: Kurz, Ausgewogen oder Gesprächig. Wird mit dem Universum gespeichert."
doc_tabletop_canon_auto_t = "Auto-Kanon"
doc_tabletop_canon_auto = "Wenn angehakt, werden nach jedem Zug die wichtigen Fakten der Geschichte still in die Universums-Definition (seinen Kanon) geschrieben."
doc_tabletop_canonize_t = "Kanonisieren"
doc_tabletop_canonize = "Extrahiert die wichtigen Fakten der jüngsten Geschichte und schlägt sie als Änderungen an der Universums-Definition vor — du prüfst ein Diff, bevor etwas angewendet wird."
doc_tabletop_rewind_t = "Zurückspulen"
doc_tabletop_rewind = "Reise in der Zeit zurück: Wähle einen früheren Zug und der gesamte Weltzustand wird exakt wiederhergestellt (Strg+Z)."
doc_tabletop_back_t = "Zurück zur Bibliothek"
doc_tabletop_back = "Verlässt den Tisch und kehrt zur Bibliothek zurück. Der Fortschritt ist nach jedem Zug bereits gespeichert — nichts geht verloren."
doc_tabletop_sidebar_stats_t = "Werte-Panel"
doc_tabletop_sidebar_stats = "Live-Blatt jeder verfolgten Entität: Ihre Werte aktualisieren sich nach jedem Zug automatisch."
doc_tabletop_sidebar_inventory_t = "Inventar-Panel"
doc_tabletop_sidebar_inventory = "Die von jeder Entität getragenen Gegenstände, aktualisiert im Lauf der Geschichte."
doc_tabletop_sidebar_timeline_t = "Chronik-Panel"
doc_tabletop_sidebar_timeline = "Chronik bemerkenswerter Weltereignisse, mit der Spielzeit, zu der sie geschahen."
doc_tabletop_chat_log_t = "Geschichte"
doc_tabletop_chat_log = "Die bisherige Geschichte. Der Text des Erzählers erscheint hier fortlaufend; nutze die Pfeile unter einer Antwort, um Varianten zu wechseln, oder Neu generieren für eine neue."
doc_tabletop_chat_input_t = "Aktionseingabe"
doc_tabletop_chat_input = "Tippe, was dein Charakter sagt oder tut, und drücke Eingabe (Umschalt+Eingabe für eine neue Zeile)."
doc_tabletop_send_t = "Senden"
doc_tabletop_send = "Sendet deine Aktion an den Erzähler (wie die Eingabetaste)."
doc_tabletop_mini_dico_t = "Mini-Dico (Lore-Enzyklopädie)"
doc_tabletop_mini_dico = "Stelle jede Frage über die Welt (Orte, Personen, Geschichte). Es antwortet nur aus dem Lore des Universums — es sieht dein Spiel nie und beeinflusst es nicht."

# -- creator ----------------------------------------------------------------
doc_creator_save_t = "Änderungen speichern"
doc_creator_save = "Schreibt die Änderungen aller Tabs in das Universum (Strg+S)."
doc_creator_back_t = "Zurück zur Bibliothek"
doc_creator_back = "Kehrt zur Bibliothek zurück. Speichere zuerst deine Änderungen (Strg+S) — Verlassen speichert sie nicht."
doc_creator_tab_meta_t = "Tab Welt"
doc_creator_tab_meta = "Die Identität des Universums: Stimmungstext, Erzähler-Anweisungen, Eröffnungsszene und globale Story-Parameter."
doc_creator_world_lore_t = "Welt-Lore"
doc_creator_world_lore = "Freier Hintergrundtext, den der Erzähler stets im Kopf behält: Ton, Weltgeschichte, wichtige Wahrheiten."
doc_creator_system_prompt_t = "System-Prompt-Überschreibung"
doc_creator_system_prompt = "Fortgeschritten: Ersetzt die Standard-Anweisungen des Erzählers für dieses Universum. Leer lassen, um das Standardverhalten zu behalten."
doc_creator_first_message_t = "Anfangserzählung"
doc_creator_first_message = "Die Eröffnungserzählung jedes neuen Spiels. Schreibe mehrere Alternativen, getrennt durch ---VARIANT---, um eine Auswahl zu bieten; @frage_id-Platzhalter werden durch die Antworten des Spielers ersetzt."
doc_creator_companion_t = "Gefährten-Modus"
doc_creator_companion = "Die Geschichte folgt einem KI-gesteuerten Haupthelden (hier gewählt) und der Spieler spielt seinen Gefährten. Aktiviert die Schwierigkeit „Gefährte“ in der Spielvorbereitung."
doc_creator_tension_t = "Weltspannung"
doc_creator_tension = "Wie dramatisch sich die Welt anfühlt (0 = friedlicher Alltag, 1 = ständige Gefahr). Der Erzähler kalibriert damit die Ereignisse."
doc_creator_llm_temp_t = "LLM-Temperatur"
doc_creator_llm_temp = "Kreativität der KI für dieses Universum (0 = vorhersehbar, 1 = abenteuerlustig)."
doc_creator_llm_top_p_t = "LLM Top P"
doc_creator_llm_top_p = "Fortgeschrittener Sampling-Parameter; niedrigere Werte machen die Formulierung fokussierter. Bei 1.0 lassen, außer du brauchst es wirklich."
doc_creator_verbosity_t = "Standard-Ausführlichkeit"
doc_creator_verbosity = "Standardlänge der Erzähler-Antworten für neue Spiele in diesem Universum."
doc_creator_tab_stats_t = "Tab Werte"
doc_creator_tab_stats = "Definiert die numerischen Werte, die Entitäten tragen können (Gesundheit, Gold...): Name, Standardwert, Minimum und Maximum."
doc_creator_tab_entities_t = "Tab Entitäten"
doc_creator_tab_entities = "Die Besetzung und Objekte der Welt: Charaktere, Kreaturen, Gegenstände, mit Beschreibungen und Wertangaben."
doc_creator_tab_map_t = "Tab Karte"
doc_creator_tab_map = "Orte und die Verbindungen zwischen ihnen, vom Erzähler genutzt, um Reisen und Geografie kohärent zu halten."
doc_creator_tab_rules_t = "Tab Regeln"
doc_creator_tab_rules = "Mechanische Regeln, die auf die Geschichte reagieren (z. B. „wenn die Gesundheit 0 erreicht...“). Sie begrenzen, was die KI ändern darf."
doc_creator_tab_events_t = "Tab Ereignisse"
doc_creator_tab_events = "Geplante Ereignisse, die zu einem bestimmten Spieldatum oder einer Spielzeit eintreten, plus die Kalenderkonfiguration des Universums."
doc_creator_tab_setup_t = "Tab Einrichtung"
doc_creator_tab_setup = "Die Fragen, die dem Spieler auf dem Vorbereitungsbildschirm vor einem neuen Spiel gestellt werden."
doc_creator_tab_lore_t = "Tab Lore Book"
doc_creator_tab_lore = "Enzyklopädie-Einträge: durch Schlüsselwörter ausgelöstes Wissen, das bei Relevanz in die Erzählung einfließt und vom Mini-Dico genutzt wird."
doc_creator_tab_populate_t = "Tab Populate"
doc_creator_tab_populate = "KI-Unterstützung: erzeugt oder vervollständigt Universums-Inhalte (Entitäten, Regeln, Lore...) nach deinen Anweisungen, mit optionaler Vorschau der Änderungen."
doc_creator_tab_files_t = "Tab Dateien"
doc_creator_tab_files = "Das Universum als Textdateien (Universe-as-Code): Bearbeite die TOML/Markdown-Quellen direkt, oder wandle ein Ein-Datei-Universum in einen Dateiordner um."

