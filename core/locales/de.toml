doc_creator_meta_llm_temp = "Kreativität der KI für dieses Universum (0 = vorhersehbar, 1 = abenteuerlustig)."
doc_creator_meta_llm_top_p_t = "LLM Top P"
doc_creator_meta_llm_top_p = "Fortgeschrittener Sampling-Parameter; niedrigere Werte machen die Formulierung fokussierter. Bei 1.0 lassen, außer du brauchst es wirklich."
doc_creator_meta_verbosity_t = "Standard-Ausführlichkeit"
doc_creator_meta_verbosity = "Standardlänge der Erzähler-Antworten für neue Spiele in diesem Universum."
doc_creator_tab_stats_t = "Tab Werte"
doc_creator_tab_stats = "Definiert die numerischen Werte, die Entitäten tragen können (Gesundheit, Gold...): Name, Standardwert, Minimum und Maximum."
