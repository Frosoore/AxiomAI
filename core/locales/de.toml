doc_app_volume_t = "Lautstärke"
doc_app_volume = "Lautstärke der Hintergrundmusik (wenn in den Einstellungen aktiviert)."
doc_app_cancel_generation_t = "Generierung abbrechen"
doc_app_cancel_generation = "Erscheint, während die KI schreibt. Klicke, um die laufende(n) Generierung(en) abzubrechen."

# -- quick tour ---------------------------------------------------------------
doc_tour_welcome_t = "Willkommen bei Axiom AI!"
doc_tour_welcome = "Axiom AI ist eine Rollenspiel-Sandbox, in der eine KI lebendige Welten erzählt. Diese kurze Tour zeigt dir alles — du kannst sie jederzeit über Hilfe → Schnelltour wiederholen."
doc_tour_hub_t = "Die Bibliothek"
doc_tour_hub = "Die Bibliothek ist dein Zuhause: Jedes Universum (eine bespielbare Welt) erscheint als Karte. Mit Spielen startest du ein Spiel, mit Bearbeiten öffnest du es im Creator Studio."
doc_tour_create_t = "Universen beschaffen"
doc_tour_create = "Drei Wege zu Inhalten: ein eigenes Universum erstellen (Neues Universum), eine .axiom-Datei importieren oder eine SillyTavern-Charakterkarte importieren. Das Creator Studio kann Inhalte sogar mit KI erzeugen (Populate)."
doc_tour_setup_t = "Ein Spiel starten"
doc_tour_setup = "Spielen öffnet die Spielvorbereitung: Setze einen Spielstand fort, oder wähle Persona, Name und Schwierigkeit, beantworte die Story-Fragen und starte."
doc_tour_tabletop_t = "Spielen"
doc_tour_tabletop = "Am Tisch tippst du, was du tust — die KI erzählt das Ergebnis. Werte und Inventar stehen im linken Panel, die Lore-Enzyklopädie rechts. Du kannst die Zeit jederzeit zurückspulen."
doc_tour_settings_t = "Eine KI verbinden"
doc_tour_settings = "Öffne vor deinem ersten Spiel Datei → Einstellungen, um eine KI zu verbinden: eine lokale über Ollama oder Google Gemini in der Cloud mit einem API-Schlüssel. Die Oberfläche spricht 10 Sprachen."
doc_tour_help_t = "Hilfe finden"
doc_tour_help = "Fahre über ein beliebiges Element, um zu erfahren, was es tut, drücke den ?-Knopf (oder F1) für eine Erklärung der aktuellen Seite, und stöbere in Hilfe → Dokumentation."

