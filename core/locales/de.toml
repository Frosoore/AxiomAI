doc_settings_timekeeper_t = "Timekeeper"
doc_settings_timekeeper = "Lässt eine kleine KI schätzen, wie viel Spielzeit jede Aktion benötigt. Deaktivieren spart einen KI-Aufruf pro Zug (die Zeit schreitet dann in festen Schritten voran)."

