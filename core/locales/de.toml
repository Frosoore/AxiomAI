doc_settings_cloud_key = "Dein API-Key für den ausgewählten Anbieter."
doc_settings_cloud_model_t = "Modell"
doc_settings_cloud_model = "Das Modell, das die Geschichte erzählt (z. B. gemini-2.0-flash, claude-opus-4-8)."
doc_settings_browse_models_t = "Modelle durchsuchen"
doc_settings_browse_models = "Ruft die Liste der beim ausgewählten Anbieter tatsächlich verfügbaren Modelle ab, damit Sie eines auswählen können. Mit den gemeinsamen Beta-Schlüsseln werden nur günstige Modelle angeboten."
doc_settings_gemini_fallback_t = "Ausweichmodell"
doc_settings_gemini_fallback = "Optionales Modell, das automatisch einspringt, wenn das Hauptmodell sein Kontingent erreicht (Fehler 429), damit das Spiel weiterläuft."
doc_settings_llm_rpm_t = "Anfragen pro Minute"
doc_settings_llm_rpm = "Hartes Limit der KI-Anfragen pro Minute, um unter den Gratis-Kontingenten zu bleiben. 0 = unbegrenzt."
doc_settings_tab_params_t = "Tab Universums-Parameter"
doc_settings_tab_params = "Kreativitätseinstellungen, die im aktuell geöffneten Universum gespeichert werden (keine globalen Einstellungen)."
doc_settings_llm_temp_t = "LLM-Temperatur"
doc_settings_llm_temp = "Kreativität der KI für das geöffnete Universum (0 = vorhersehbar, 1 = abenteuerlustig)."
doc_settings_llm_top_p_t = "LLM Top P"
doc_settings_llm_top_p = "Fortgeschrittener Sampling-Parameter; niedrigere Werte machen die Formulierung fokussierter. Bei 1.0 lassen, außer du brauchst es wirklich."
doc_settings_tab_personas_t = "Tab Personas"
doc_settings_tab_personas = "Verwaltet deine globalen Personas (wiederverwendbare Spielercharaktere) — dieselbe Liste wie auf dem Vorbereitungsbildschirm."
doc_settings_tab_image_t = "Tab Illustration"
doc_settings_tab_image = "Optional: erzeugt zu jedem Story-Zug eine Illustration, lokal (Stable Diffusion, ComfyUI) oder in der Cloud (Gemini)."
doc_settings_image_enable_t = "Illustrationen aktivieren"
doc_settings_image_enable = "Schaltet die automatische Szenenillustration ein oder aus."
doc_settings_image_backend_t = "Bild-Backend"
doc_settings_image_backend = "Welche Bild-Engine verwendet wird: ein lokales Stable Diffusion WebUI, ein lokales ComfyUI, Google Gemini in der Cloud oder ein Mock zum Testen."
doc_settings_image_url_t = "Bild-API-URL"
doc_settings_image_url = "Adresse der lokalen Bild-Engine (Stable Diffusion WebUI oder ComfyUI)."
doc_settings_image_gemini_model_t = "Gemini-Bildmodell"
doc_settings_image_gemini_model = "Gemini-Bildmodell, das verwendet wird, wenn das Backend Google Gemini ist."
doc_settings_image_size_t = "Bildgröße"
