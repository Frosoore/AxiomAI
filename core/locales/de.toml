doc_tour_welcome_t = "Willkommen bei Axiom AI!"
doc_tour_welcome = "Axiom AI ist eine Rollenspiel-Sandbox, in der eine KI lebendige Welten erzählt. Diese kurze Tour zeigt dir alles — du kannst sie jederzeit über Hilfe → Schnelltour wiederholen."
doc_tour_hub_t = "Die Bibliothek"
doc_tour_hub = "Die Bibliothek ist dein Zuhause: Jedes Universum (eine bespielbare Welt) erscheint als Karte. Mit Spielen startest du ein Spiel, mit Bearbeiten öffnest du es im Creator Studio."
doc_tour_create_t = "Universen beschaffen"
doc_tour_create = "Drei Wege zu Inhalten: ein eigenes Universum erstellen (Neues Universum), eine .axiom-Datei importieren oder eine SillyTavern-Charakterkarte importieren. Das Creator Studio kann Inhalte sogar mit KI erzeugen (Populate)."
doc_tour_setup_t = "Ein Spiel starten"
doc_tour_setup = "Spielen öffnet die Spielvorbereitung: Setze einen Spielstand fort, oder wähle Persona, Name und Schwierigkeit, beantworte die Story-Fragen und starte."
