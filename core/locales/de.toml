doc_tour_tabletop = "Am Tisch tippst du, was du tust — die KI erzählt das Ergebnis. Werte und Inventar stehen im linken Panel, die Lore-Enzyklopädie rechts. Du kannst die Zeit jederzeit zurückspulen."
doc_tour_settings_t = "Eine KI verbinden"
doc_tour_settings = "Öffne vor deinem ersten Spiel Datei → Einstellungen, um eine KI zu verbinden: eine lokale über Ollama oder Google Gemini in der Cloud mit einem API-Schlüssel. Die Oberfläche spricht 10 Sprachen."
doc_tour_help_t = "Hilfe finden"
