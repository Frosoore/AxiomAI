# TICKET-057 — doc enrichment (Studio sub-pages + details)
doc_page_creator_meta_t = "Studio · Metadata"
doc_page_creator_meta = "Die Identität und das globale Verhalten der Welt. <b>Was hier lebt:</b> die Hintergrund-Lore, die der Erzähler immer erinnert, ein optionaler System-Prompt-Ersatz, die Eröffnungsszene eines neuen Spiels, der Begleiter-Modus und die Regler, die die Erzählung justieren (Spannung, Temperatur, Top-p, Ausführlichkeit). <b>Wie man es nutzt:</b> schreibe zuerst die Welt-Lore (sie verankert alles), setze die Stimmung mit der Spannung und lass die KI-Regler auf Standard, außer die Erzählung wirkt falsch. Drücke Information für Details zu jedem Feld."
doc_page_creator_stats_t = "Studio · Stats"
doc_page_creator_stats = "Definiert die Werte, die Entitäten tragen können — Gesundheit, Münzen, Ruf, was du erfindest. <b>Pro Wert:</b> ein Name, ein Standard-Startwert und optionale Min/Max-Grenzen. <b>Warum es zählt:</b> Werte sind das, worüber Regel-Engine und Erzähler nachdenken — ein hier definierter Wert kann von der Geschichte geändert und von Regeln geprüft werden. <b>Beispiel:</b> definiere 'Münzen' (min 0) und die Welt kann dir ein Zimmer berechnen; definiere 'Gesundheit' (0–100) und der Regeln-Reiter kann 0 zum Tod machen. <b>Hinweis:</b> neue Figuren starten jeden definierten Wert auf seinem Standard."
doc_page_creator_entities_t = "Studio · Entitäten"
doc_page_creator_entities = "Die Besetzung und Objekte deiner Welt: Figuren (NSCs), Fraktionen, Gegenstände und bemerkenswerte Dinge. <b>Pro Entität:</b> eine id, ein Name, ein Typ, eine Beschreibung, die der Erzähler liest, und eigene Werte. <b>Wie man es nutzt:</b> gib wichtigen NSCs ein paar Werte und eine prägnante Beschreibung — das hält sie über eine lange Kampagne stimmig. <b>Beispiel:</b> ein Wirt mit lebendiger Beschreibung und einem Wert 'Gemüt' verhält sich gleich, sooft die Geschichte zu ihm zurückkehrt. Du kannst Entitäten auch über den Populate-Reiter erzeugen."
doc_page_creator_map_t = "Studio · Karte"
doc_page_creator_map = "Die Orte deiner Welt und wie sie verbunden sind. <b>Was du definierst:</b> Orte (mit einer Skala — Region, Stadt, Punkt von Interesse — und einem Elternort) und die Verbindungen dazwischen. <b>Warum es zählt:</b> der Erzähler nutzt die Karte, um Geografie und Reisen stimmig zu halten, und die Spieluhr kann mit Verbindungen schätzen, wie lange eine Reise dauert. <b>Wie man es nutzt:</b> skizziere zuerst die großen Orte (ein Land, seine Städte), dann füge die Wege und Räume hinzu, die fürs Spiel zählen. Populate kann eine Startkarte erzeugen."
doc_page_creator_rules_t = "Studio · Regeln"
doc_page_creator_rules = "Deterministische Regeln, die die Engine jeden Zug durchsetzt — das hält die Welt ehrlich, während die KI frei erzählt. <b>Wie eine Regel wirkt:</b> ändern sich die Werte einer Entität, werden die Bedingungen der Regel geprüft; treffen sie zu, feuern ihre Aktionen (einen Wert ändern, einen Status setzen…). <b>Jede Regel hat</b> eine Priorität, ein Ziel (eine Entität oder '*' für alle), Bedingungen und Aktionen. <b>Beispiel:</b> 'wenn Gesundheit ≤ 0 → setze Zustand = Tödlich verwundet' macht den Tod verbindlich, egal was die Prosa sagt. <b>Tipp:</b> ein fehlender Wert gilt als 0, bevorzuge also '≥'-Schwellen für Effekte, die nur für Entitäten gedacht sind, die den Wert wirklich tragen."
doc_page_creator_events_t = "Studio · Ereignisse"
doc_page_creator_events = "Geplante Ereignisse, die zu einer gewählten Spielzeit auslösen, unabhängig vom Spieler. <b>Was du festlegst:</b> wann das Ereignis geschieht (in Spielzeit) und was es tut oder der Erzählung signalisiert. <b>Warum es zählt:</b> Ereignisse lassen die Welt nach der Uhr laufen — eine Karawane kommt an, eine Frist verstreicht, ein Sturm trifft — so wirkt die Welt lebendig, statt auf dich zu warten. <b>Beispiel:</b> plane 'die Artillerielieferung erreicht die Docks an Tag 3', und die Welt erreicht diesen Moment, ob du ihn beobachtet hast oder nicht."
doc_page_creator_setup_t = "Studio · Startfragen"
doc_page_creator_setup = "Die Fragen, die ein Spieler beim Start einer neuen Partie in diesem Universum beantwortet. <b>Was du definierst:</b> jede Frage, ihren Typ (Einfachauswahl, Mehrfachauswahl oder Freitext) und ihre Optionen. <b>Warum es zählt:</b> die Antworten werden in den Eröffnungszug eingespeist und entscheiden, wer der Spieler ist und wo er beginnt. <b>Beispiel:</b> eine Auswahl 'Woher kommst du?' kann die Startregion festlegen und die erste Szene färben. Halte sie wenige und stimmungsvoll — drei gute Fragen schlagen zehn farblose."
doc_page_creator_lore_t = "Studio · Lore Book"
doc_page_creator_lore = "Die Enzyklopädie der Welt: durchsuchbare Lore-Einträge, die der Erzähler bei Bedarf abruft (abruf-erweitertes Gedächtnis). <b>Was du hinzufügst:</b> Artikel zu Geschichte, Fraktionen, Magie, Orten — jeder mit Stichwörtern. <b>Warum es zählt:</b> anders als die stets aktive Welt-Lore (Metadata) werden diese nur bei Relevanz abgerufen, du kannst also riesige Hintergründe speichern, ohne jeden Prompt zu überladen. <b>Wie man es nutzt:</b> ein fokussierter Eintrag pro Thema; die Engine bringt die passenden zur Szene hervor. Populate kann Einträge entwerfen."
doc_page_creator_populate_t = "Studio · Populate"
doc_page_creator_populate = "KI-gestütztes Erstellen: lass ein Modell Teile deines Universums erzeugen. <b>Was es tut:</b> erstellt Entitäten, Orte, Lore-Einträge und mehr aus der Prämisse deiner Welt, mit Vorschau und Diff, sodass du jede Änderung vor dem Schreiben freigibst. <b>Wie man es nutzt:</b> schreibe zuerst eine starke Welt-Lore (Populate baut darauf auf), erzeuge in kleinen, gezielten Stapeln, prüfe den Diff und speichere, was dir gefällt. <b>Warum es zählt:</b> es macht aus einem leeren Universum in Minuten ein spielbares — ein Ausgangspunkt, den du dann von Hand verfeinerst."
doc_page_creator_files_t = "Studio · Dateien"
doc_page_creator_files = "Die Rohquelle deines Universums, als Text. Axiom speichert Welten als <b>Universe-as-Code</b>: lesbare TOML/Markdown-Dateien, die zu einer Datenbank kompilieren. <b>Was du tun kannst:</b> diese Quelldateien direkt öffnen und bearbeiten und eine flache Alt-Datenbank in den Quellbaum umwandeln. <b>Warum es zählt:</b> weil ein Universum reiner Text ist, kannst du es mit Git versionieren, diffen und wie Code teilen. <b>Fortgeschritten:</b> alles, was die anderen Reiter tun, landet in diesen Dateien — das ist die direkte Sicht."
doc_creator_meta_world_lore_d = "<b>Was es tut:</b> dieser Text wird dem Kontext des Erzählers in jedem Zug vorangestellt, er ist also das Dauergedächtnis der Welt. <b>Hierhin:</b> Ton, große Geschichte, die Regeln von Magie/Technik und Wahrheiten, die nie widersprochen werden dürfen. <b>Nicht hierhin:</b> langes enzyklopädisches Detail — das gehört ins Lore Book (bei Bedarf abgerufen), damit dies schlank bleibt. <b>Beispiel:</b> 'Die Götter sind tot und vergessen; Magie ermüdet den Wirker wie einen Muskel; man schreibt das Jahr 5281.' <b>Effekt:</b> jede Szene achtet diese Fakten, ohne dass du sie wiederholst."
doc_creator_meta_description_d = "<b>Was es tut:</b> Eine benutzerseitige Beschreibung des Universums. <b>Warum es wichtig ist:</b> Sie hat keinen Einfluss auf den KI-Erzähler, hilft aber den Benutzern, die Umgebung, das Thema oder das Konzept dieses Universums zu verstehen, bevor sie ein neues Spiel starten."
doc_creator_meta_system_prompt_d = "<b>Was es tut:</b> ersetzt die eingebauten Anweisungen des Erzählers für dieses Universum — der tiefste, fortgeschrittenste Eingriff. <b>Wann nutzen:</b> nur für ein grundlegend anderes Erzählverhalten (ein bestimmtes Format, eine ungewöhnliche Stimme oder Regeln). <b>Warnung:</b> der Standard-Prompt regelt bereits Zustand, Werkzeuge und Stimmigkeit; ein unbedachter Ersatz kann sie brechen. <b>Empfehlung:</b> lass es leer und steuere die Welt zuerst über Lore und Regler; greif nur darauf zurück, wenn nichts anderes das gewünschte Verhalten bringt."
doc_creator_meta_first_message_d = "<b>Was es tut:</b> die Eröffnungserzählung beim Start eines brandneuen Spiels hier — der Vorhang hebt sich. <b>Hierhin:</b> eine Szene, die die Stimmung setzt und den Spieler in eine Lage bringt, auf die er reagieren kann. <b>Wie man es nutzt:</b> ende mit einem kleinen Haken (ein Klopfen an der Tür, eine Wahl), damit die erste Handlung des Spielers Halt hat. <b>Hinweis:</b> sie erscheint einmal beim Start; fortgesetzte Spielstände behalten ihren eigenen Verlauf. <b>Beispiel:</b> ein regnerischer Kai im Morgengrauen, ein Fremder schiebt einen versiegelten Brief über den Tisch."
doc_creator_meta_companion_d = "<b>Was es tut:</b> der Begleiter-Modus macht Axiom zum Co-Piloten für einen gewählten Haupt-Helden — die KI hilft, diese Figur zu führen, statt ein offenes Sandbox laufen zu lassen. <b>Wie man es nutzt:</b> hake Aktivieren an und wähle dann die Helden-Entität, um die sich alles dreht. <b>Warum nutzen:</b> ideal für eine geführte, auf einen einzigen Protagonisten zentrierte Geschichte. <b>Lass es aus</b> für das klassische 'du bist der Spieler, tu, was du willst'."
doc_creator_meta_tension_d = "<b>Was es tut:</b> ein Regler 0.0–1.0, der dem Erzähler sagt, wie dramatisch sich die Welt anfühlen soll. <b>0.0</b> = ruhiger Alltag; <b>1.0</b> = ständige Gefahr und hoher Einsatz. <b>Effekt:</b> es färbt, wie oft Ärger den Spieler findet und wie aufgeladen Szenen sind — es ändert die Stimmung, nicht die Regeln. <b>Beispiel:</b> ein gemütliches Dorfrätsel liegt um 0.2, eine Stadt am Rande des Krieges um 0.7. <b>Tipp:</b> es speist auch den Chronicler hinter den Kulissen, sodass eine angespannte Welt sich in deiner Abwesenheit ereignisreicher entwickelt."
doc_creator_meta_llm_temp_d = "<b>Was es tut:</b> die Kreativität der KI für dieses Universum, 0.0 bis 1.0. <b>Niedrig</b> (≈0.2) = fokussiert, vorhersehbar, auf Schienen; <b>hoch</b> (≈0.8) = einfallsreich, überraschend, mitunter schräg. <b>Wie einstellen:</b> wirkt die Erzählung repetitiv, erhöhe sie; driftet sie ab oder widerspricht sich, senke sie. <b>Empfehlung:</b> 0.6–0.8 passt für die meisten Erzählungen. Dies setzt den Universums-Standard; der globale Wert aus den Einstellungen gilt, wenn ein Universum ihn nicht festlegt."
doc_creator_meta_llm_top_p_d = "<b>Was es tut:</b> Nucleus-Sampling — eine weitere Kreativitätssteuerung, die begrenzt, wie viel vom Wortschatz der KI genutzt wird (0.0–1.0). <b>Hoch</b> (≈0.95) = die volle, vielfältige Palette; <b>niedrig</b> (≈0.5) = nur die wahrscheinlichsten Wörter, also schlichtere, sicherere Prosa. <b>Wie man es nutzt:</b> lass es meist nahe 0.9–1.0 und forme die Kreativität über die Temperatur; senke es nur, wenn der Text zu locker wird. <b>Hinweis:</b> Temperatur und Top-p wirken zusammen — ändere nur eines zugleich."
doc_creator_meta_verbosity_d = "<b>Was es tut:</b> wie viel Prosa der Erzähler pro Zug schreibt. <b>Kurz</b> = knappe, flott bewegte Beats; <b>Ausgewogen</b> = ein solider Absatz; <b>Gesprächig</b> = reiche, beschreibende Szenen. <b>Wie wählen:</b> Kurz für schnelle Action oder Play-by-Post-Tempo, Gesprächig für immersive, romanhafte Sitzungen. <b>Effekt:</b> es ändert Länge und Detail, nicht das tatsächliche Geschehen. Dies ist der Standard des Universums."

