# -- pages ----------------------------------------------------------------
doc_page_hub_t = "Universums-Bibliothek"
doc_page_hub = "Der Startbildschirm — deine Bibliothek der Welten. Jedes auf diesem Rechner installierte Universum erscheint hier als Karte. <b>Was du tun kannst:</b> ein neues Universum erstellen, eines importieren (ein Axiom-.axiom-Paket oder eine SillyTavern-Charakterkarte) oder auf jeder Karte: Spielen, Bearbeiten (öffnet das Creator Studio), Exportieren (als Datei teilen) oder Löschen. <b>Tipp:</b> Beginne mit dem mitgelieferten Universum Myria, um zu sehen, wie alles zusammenpasst, bevor du dein eigenes baust."
doc_page_setup_t = "Spielvorbereitung"
doc_page_setup = "Wo eine Sitzung vorbereitet wird, bevor die Geschichte beginnt. <b>Zwei Wege:</b> einen Spielstand fortsetzen oder neu anfangen — eine Persona wählen (dein Profil außerhalb der Rolle), den Namen deiner Figur und den Schwierigkeitsgrad festlegen und die Fragen des Universums beantworten. Drücke <b>Starten</b>, wenn du bereit bist. <b>Warum es zählt:</b> deine Antworten werden in den allerersten Zug geschrieben und bestimmen so, wo und wer du bist, wenn die Erzählung beginnt."
doc_page_tabletop_t = "Spieltisch"
doc_page_tabletop = "Das Spiel selbst. <b>Wie man spielt:</b> Schreibe ins mittlere Feld, was deine Figur tut oder sagt, und sende es — die KI erzählt die Antwort der Welt, dann prüft eine deterministische Regel-Engine die Folgen (Gesundheit, Inventar, Geld, Zeit…), damit die Welt stimmig bleibt. <b>Am Tisch:</b> Werte und Inventar links, die durchsuchbare Lore-Enzyklopädie rechts, der Zugverlauf in der Mitte. <b>Beispiel:</b> 'Ich durchsuche den Schreibtisch nach einem Schlüssel' kann die Uhr vorrücken, einen Gegenstand zeigen oder einen Wert ändern — und die Welt merkt es sich für den nächsten Zug."
doc_page_creator_t = "Creator Studio"
doc_page_creator = "Das Creator Studio — wo ein Universum gebaut und bearbeitet wird. Die Arbeit ist oben in Reiter gegliedert, und <b>jeder Reiter hat seine eigene Informationsseite</b> (drücke Information oder F1 auf dem Reiter, den du nutzt). <b>Goldene Regel:</b> nichts wird geschrieben, bis du Speicherst (Strg+S). <b>Wo anfangen:</b> Metadata legt Identität und Ton der Welt fest; Stats und Entitäten geben ihr Substanz; die übrigen Reiter (Karte, Regeln, Ereignisse, Setup, Lore, Populate, Dateien) verfeinern und automatisieren sie."
doc_page_settings_t = "Einstellungen"
doc_page_settings = "Anwendungsweite Einstellungen, nicht an ein Universum gebunden. <b>Hier wählst du:</b> welche KI die Geschichte schreibt (ein lokales Modell über Ollama / LM Studio oder ein Cloud-Anbieter), optionale Bildgenerierung, die Oberflächensprache, Audio und Anzeige. <b>Wichtig:</b> der Text-Backend-Reiter, der beim <b>Speichern</b> ausgewählt ist, wird zum aktiven Backend — beende also auf dem, den du wirklich willst. Nutze <b>Verbindung testen</b>, um vor dem Spielen zu prüfen, ob die KI antwortet."
doc_page_app_t = "Anwendungsfenster"
doc_page_app = "Der Rahmen um jeden Bildschirm. <b>Menüleiste:</b> Datei und Hilfe — die Kurztour, dieses Dokumentationsverzeichnis und das Diagnose-Werkzeug liegen unter Hilfe. <b>Statusleiste</b> (unten): Fortschrittsmeldungen, die Lautstärkeregelung und — während die KI schreibt — eine Schaltfläche zum Abbrechen der laufenden Generierung. Immer verfügbar, egal auf welchem Bildschirm."

