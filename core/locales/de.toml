doc_setup_difficulty_t = "Schwierigkeit"
doc_setup_difficulty = "Normal: gewöhnliches Spiel. Hardcore: Der Tod ist endgültig — der Spielstand wird beim Tod gelöscht. Gefährte: Ein KI-Held führt die Geschichte und du spielst seinen Gefährten (nur in Universen, die es aktivieren)."
doc_setup_tab_story_t = "Tab Einrichtung"
