# High Notoriety (>= 80) is "the wrong kind of attention": you are now hunted.
# Sets a canonical Reputation the narrator must respect. Runs after notoriety_known
# (higher priority value) so it wins the Reputation slot when both apply.
rule_id = "notoriety_hunted"
priority = 40
target_entity = "*"

[conditions]
operator = "AND"
[[conditions.clauses]]
stat = "Notoriety"
comparator = ">="
value = 80

[[actions]]
type = "set_status"
stat = "Reputation"
value = "Hunted"
