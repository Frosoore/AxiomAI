# Run the Axiom AI test suite on every push / pull request.
#
# The suite is split into TWO batches on purpose: loading PySide6 QtMultimedia
# (tests/test_ambiance_manager.py) before importing torch → triton makes the
# native triton dlopen crash on some setups (TICKET-067). Keeping the audio
# test in its own pytest process sidesteps that, and both batches must pass.

name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    env:
      # PySide6 has no display in CI; render off-screen.
      QT_QPA_PLATFORM: offscreen
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      # System libraries PySide6 needs to import head-less.
      - name: Install headless Qt system libraries
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3 libpulse0

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      # Batch 1 — everything except the Qt-multimedia test.
      - name: Run tests (main batch)
        run: pytest tests/ --ignore=tests/test_ambiance_manager.py -q

      # Batch 2 — the Qt-multimedia test, in its own process. `always()` so it
      # runs even when batch 1 failed, giving a full picture; the job still
      # fails if either batch fails.
      - name: Run tests (audio batch)
        if: always()
        run: pytest tests/test_ambiance_manager.py -q
