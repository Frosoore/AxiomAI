# Build & deploy the Axiom AI landing page (landing/) and the axiomai-engine
# documentation site (docs/) to GitHub Pages.
#
# Publishes:
#   https://<owner>.github.io/AxiomAI/        -> landing page (landing/)
#   https://<owner>.github.io/AxiomAI/en/     English documentation
#   https://<owner>.github.io/AxiomAI/fr/     French documentation
#
# One-time setup: in the repo Settings -> Pages, set "Source" to
# "GitHub Actions". Nothing else to do; every push to main redeploys.

name: docs

on:
  push:
    branches: [main]
    paths:
      - "docs/**"
      - "landing/**"
      - "axiom/**"
      - ".github/workflows/docs.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      # Heavy runtime deps (chromadb, torch, the Gemini SDK...) are NOT
      # installed: docs/conf.py mocks them for autodoc.
      - name: Install Sphinx toolchain
        # markdown-it-py also powers the blog renderer in landing/build_site.py
        # (it ships with myst-parser, but we pin it explicitly to be safe).
        run: pip install sphinx furo myst-parser markdown-it-py

      - name: Build English site
        run: sphinx-build -b html -W docs site/en

      - name: Build French site
        run: sphinx-build -b html -W -D language=fr docs site/fr

      # Regenerate the data-driven parts of the landing site (roadmap + dev log
      # from landing/content/*.toml, plus the build-stamped version/date) so the
      # published pages stay in sync with the TOML. Stdlib only (tomllib).
      - name: Build landing content
        run: python landing/build_site.py

      # The landing page (landing/) becomes the Pages root, sitting next to
      # the /en/ and /fr/ documentation builds. The content/ folder holds only
      # build-time *sources* (TOML data, Markdown article sources, the authoring
      # README); they're compiled into the pages above, so we keep them out of the
      # published site (not indexed, no duplicate content). They stay in the repo.
      - name: Add landing page at the site root
        run: |
          cp -r landing/. site/
          rm -rf site/content

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
